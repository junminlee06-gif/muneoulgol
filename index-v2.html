<!doctype html><html lang=ko><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>무너울골 보고서 루프</title><style>body{margin:0;background:#0b0907;color:#e7dcc7;font-family:system-ui,sans-serif;line-height:1.55}.wrap{max-width:1120px;margin:auto;padding:18px;display:grid;grid-template-columns:2fr 1fr;gap:14px}header{grid-column:1/-1;border-bottom:1px solid #4a3b2c;padding-bottom:10px}h1{margin:0;font-size:24px}.sub,.small{color:#aa9c86;font-size:13px}.panel{background:#17130f;border:1px solid #4a3b2c;padding:16px}.main{min-height:560px;display:flex;flex-direction:column}.k{color:#d3ad70;font-weight:800}.t{font-size:22px;font-weight:900;margin:4px 0 10px}.x{white-space:pre-wrap}.opts{display:grid;gap:8px;margin-top:auto}.btn{display:block;width:100%;background:#35291f;color:#e7dcc7;border:1px solid #6e5a40;padding:10px;text-align:left;cursor:pointer}.btn:hover{background:#493728}.primary{background:#5a442b}.tag{font-size:11px;border:1px solid #d3ad70;color:#f0dfbd;padding:1px 5px;margin-right:6px}.pill{display:inline-block;border:1px solid #4a3b2c;padding:2px 6px;margin:2px;color:#cfbf9d;font-size:12px}li{margin:4px 0;font-size:13px}.meter{display:flex;justify-content:space-between;border-bottom:1px solid #302820;font-size:13px}@media(max-width:880px){.wrap{grid-template-columns:1fr}}</style></head><body><div class=wrap><header><h1>무너울골: 보고서 루프 원형</h1><div class=sub>1장 2일 구조 · 선택지-단서-보고서-다음 날 변화 검증판</div></header><main class='panel main'><div class=k id=k></div><div class=t id=t></div><div class=x id=x></div><div class=opts id=o></div></main><aside><div class=panel><b>진행</b><div id=p class=small></div><div id=m></div></div><div class=panel><b>세계 변화</b><ul id=w></ul></div><div class=panel><b>공식 기록</b><ul id=f></ul></div><div class=panel><b>비공식 기록</b><ul id=u></ul></div><div class=panel><b>단서 / 의례</b><div id=c></div></div><div class=panel><b>보고서 이력</b><ul id=r></ul></div></aside></div><script>const $=id=>document.getElementById(id);const S={d:1,ph:`아침`,act:0,max:3,route:null,off:[],un:[],cl:[],ri:[],world:[],rep:[],used:[],st:{기록:0,조사:0,결이해:0,애도:0,마을신뢰:0,을파신뢰:0,막례신뢰:0,월선신뢰:0,관아신뢰:1,경계:3,한:1}};const R={tiger:{l:`범의 습격 가능성이 높다`,s:`범`,rec:`1일차 보고: 범의 습격 가능성`,w:[`관아가 사냥꾼 사량을 부름`,`마을은 잠시 안심함`,`막례가 입을 닫음`],st:{마을신뢰:1,막례신뢰:-1,조사:-1},am:`관아는 사건을 산짐승 문제로 좁혔다. 사냥꾼 사량이 우물가에 서고 주민들은 이제 끝나겠다고 말한다. 그러나 막례는 당신을 보자 금줄을 문 안쪽으로 거둔다.`,un:`사량 대면`},human:{l:`사람이 아이를 산 쪽으로 데려간 흔적이 있다`,s:`유괴`,rec:`1일차 보고: 사람 또는 마을 내부자 개입 가능성`,w:[`관아 병졸이 마을 내부자를 의심함`,`을파가 방어적으로 변함`,`월선이 몰래 접근함`],st:{기록:1,마을신뢰:-1,을파신뢰:-1,월선신뢰:1},am:`관아 병졸 둘이 촌장집 앞에 선다. 을파는 장부를 닫고 주민들은 서로를 의심한다. 해질녘 전 월선이 당신에게만 할 말이 있다고 눈짓한다.`,un:`월선 밀담`},ritual:{l:`산제와 관련된 흔적이 있다`,s:`산제`,rec:`1일차 보고: 산제 관련 흔적`,w:[`관아는 미신이라며 보고를 낮게 봄`,`막례가 비밀 제문을 내어 줌`,`밤 산제단 접근 가능`],st:{관아신뢰:-1,막례신뢰:2,결이해:1},am:`관아 서리는 제사는 기록할 수 없다고 말한다. 그러나 막례는 새벽에 찢어진 제문 한 장을 건넨다. 관아가 안 믿는 말이라면 이제 산이 들을 차례다.`,un:`밤 산제단`},conceal:{l:`마을 내부 은폐 가능성이 있다`,s:`은폐`,rec:`1일차 보고: 마을 내부 은폐 가능성`,w:[`을파가 플레이어를 감시함`,`촌장집 조사 난이도 상승`,`숨겨진 장부 단서가 열림`],st:{기록:1,을파신뢰:-2,마을신뢰:-1,조사:1},am:`을파는 예를 갖추지만 당신 뒤에 청년 하나를 붙인다. 마을은 입을 다문다. 대신 너무 빨리 치워진 흔적과 너무 반듯한 장부가 눈에 들어온다.`,un:`감시 돌파`}};const C=[{id:`well`,ty:`단서`,l:`우물가에서 짚신을 보인다`,txt:`월선은 짚신을 보고 더는 부정하지 못한다. 도리 것입니다. 그래도 아직 죽었다고 쓰지는 말아 주세요.`,g:{off:[`도리 이름 공식 확인`],cl:[`도리의 이름`],st:{애도:1,월선신뢰:1}}},{id:`shaman`,ty:`단서`,l:`찢어진 금줄을 막례에게 보인다`,txt:`막례는 금줄을 손끝으로 문지른다. 이건 막는 줄이다. 부르는 줄이 아니다. 누가 문을 열어 둔 게야.`,g:{ri:[`산제 목적: 문을 닫는 의례`],un:[`산제는 산군을 부르는 의식이 아님`],st:{결이해:1,막례신뢰:1}}},{id:`chief`,ty:`태도`,l:`을파에게 실종자 명단을 다시 요구한다`,txt:`을파는 이름을 말하지만 아이 이름에서 멈춘다. 명단은 맞다. 그러나 적힌 순서가 실종 순서와 다르다.`,g:{off:[`실종자 명단 재확인`],cl:[`이름 순서가 바뀐 명단`],st:{기록:1,을파신뢰:-1}}}];const D={tiger:[{id:`hunter`,ty:`사실`,l:`사량에게 검은 털을 보인다`,txt:`사량은 털을 문지른다. 범 털이면 마른 냄새가 납니다. 이건 물에서 나온 냄새요.`,g:{cl:[`사량: 젖은 짐승 냄새 증언`],un:[`범 단정에 균열`],st:{조사:1,마을신뢰:-1}}}],human:[{id:`wol`,ty:`태도`,l:`월선의 밀담을 듣는다`,txt:`월선은 병졸 눈을 피해 말한다. 도리는 누가 데려간 게 아닙니다. 부르면 따라가는 아이였어요. 물소리 쪽으로요.`,g:{cl:[`도리는 물소리를 따라감`],st:{애도:1,월선신뢰:1}}}],ritual:[{id:`prayer`,ty:`단서`,l:`막례의 비밀 제문을 읽는다`,txt:`제문은 산군에게 바치는 말이 아니다. 이름은 마을에 두고 발은 산으로 보내지 말라. 문을 닫는 주문이다.`,g:{ri:[`비밀 제문: 이름은 마을에 둔다`],st:{결이해:2,관아신뢰:-1}}}],conceal:[{id:`ledger`,ty:`위험`,l:`감시를 피해 장부 뒷장을 본다`,txt:`장부 뒷장에는 산제 비용을 줄인 해부터 금지된 숲 벌목량이 늘어난 기록이 있다. 을파는 이것을 숨기려 했다.`,g:{cl:[`산제 장부`],un:[`산제 비용 중단과 벌목 증가 연결`],st:{조사:1,을파신뢰:-1}}}]};function add(a,v){if(!a.includes(v))a.push(v)}function st(o){Object.entries(o||{}).forEach(([k,v])=>S.st[k]=(S.st[k]||0)+v)}function gain(g={}){(g.off||[]).forEach(v=>add(S.off,v));(g.un||[]).forEach(v=>add(S.un,v));(g.cl||[]).forEach(v=>add(S.cl,v));(g.ri||[]).forEach(v=>add(S.ri,v));st(g.st)}function side(){$(`p`).textContent=`1장 / ${S.d}일차 / ${S.ph} / 낮 조사 ${S.act}/${S.max}`;$(`m`).innerHTML=Object.entries(S.st).map(([k,v])=>`<div class=meter><span>${k}</span><b>${v}</b></div>`).join(``);$(`w`).innerHTML=S.world.map(v=>`<li>${v}</li>`).join(``)||`<li class=small>아직 없음</li>`;$(`f`).innerHTML=S.off.map(v=>`<li>${v}</li>`).join(``)||`<li class=small>아직 없음</li>`;$(`u`).innerHTML=S.un.map(v=>`<li>${v}</li>`).join(``)||`<li class=small>아직 없음</li>`;$(`c`).innerHTML=[...S.cl.map(v=>`<span class=pill>단서: ${v}</span>`),...S.ri.map(v=>`<span class=pill>의례: ${v}</span>`)].join(``)||`<span class=small>아직 없음</span>`;$(`r`).innerHTML=S.rep.map(v=>`<li>${v}</li>`).join(``)||`<li class=small>아직 없음</li>`}function btn(ty,l,fn,pri){let b=document.createElement(`button`);b.className=`btn ${pri?`primary`:``}`;b.innerHTML=`<span class=tag>${ty}</span>${l}`;b.onclick=fn;$(`o`).appendChild(b)}function scene(k,t,x){$(`k`).textContent=k;$(`t`).textContent=t;$(`x`).textContent=x;$(`o`).innerHTML=``;side()}function intro(){scene(`1장 1일차 · 아침`,`남쪽 고갯길`,`무너울골 길목에 작은 짚신 한 짝이 떨어져 있다. 피는 말랐고 발자국은 마을에서 산 쪽으로 향한다. 이번 원형은 단서를 줍는 것이 아니라, 단서를 어떤 공식 진실로 바꿀지 결정하게 만든다.`);btn(`사실`,`짚신과 피를 확인한다`,()=>{gain({cl:[`아이의 짚신`],off:[`아이 실종 흔적`],st:{조사:1,애도:1}});day1()})}function day1(){S.ph=`낮`;scene(`1장 1일차 · 낮`,`무너울골 첫 진입`,`촌장 을파는 범의 습격이라 말한다. 월선은 아이 이름을 부정하고, 막례는 산제가 끊긴 뒤 길이 틀어졌다고 말한다. 낮 조사는 세 번 가능하다.`);btn(`태도`,`을파의 범 습격 주장을 듣는다`,()=>d1(`chief`));btn(`태도`,`월선에게 짚신을 조심스럽게 보인다`,()=>d1(`wol`));btn(`사실`,`막례에게 금줄 조각을 묻는다`,()=>d1(`shaman`));btn(`기록`,`관아 임시처소에서 1일차 보고서를 쓴다`,report1,1)}function d1(id){if(S.act>=S.max)return report1();S.act++;if(id==`chief`)gain({off:[`촌장 진술: 범 습격 가능성`],cl:[`실종자 명단`],st:{기록:1,을파신뢰:1}});if(id==`wol`)gain({cl:[`아이의 짚신 확인 보류`],un:[`월선은 짚신을 도리 것이라 부정`],st:{애도:1,월선신뢰:1}});if(id==`shaman`)gain({cl:[`끊긴 금줄 조각`],ri:[`찢어진 제문 일부`],st:{결이해:1,막례신뢰:1}});S.act>=S.max?report1():day1()}function report1(){S.ph=`보고`;scene(`1장 1일차 · 밤`,`1일차 보고서`,`무엇을 공식 진실로 만들 것인가. 이 선택은 2일차 아침의 관아 반응, 마을 태도, 접근 가능한 사건을 바꾼다.`);Object.entries(R).forEach(([k,r])=>btn(`기록`,`${r.l} — 결과: ${r.w.join(` / `)}`,()=>choose(k),1))}function choose(k){S.route=k;let r=R[k];add(S.off,r.rec);S.rep.push(`1장 1일차: ${r.l}`);r.w.forEach(v=>add(S.world,v));st(r.st);S.d=2;S.ph=`아침`;S.act=0;scene(`1장 2일차 · 아침`,`보고서 결과 반영`,r.am);btn(`계속`,`2일차 낮 조사로 이동한다`,day2,1)}function day2(msg){S.ph=`낮`;scene(`1장 2일차 · 낮`,`보고서가 만든 현실`,msg||`어제의 공식 기록: ${R[S.route].l}. 개방된 변화: ${R[S.route].un}. 낮 조사는 세 번 가능하다. 단서를 사용하면 같은 인물도 다른 말을 한다.`);let list=[...(D[S.route]||[]),...C].filter(a=>!S.used.includes(a.id));list.forEach(a=>btn(a.ty,a.l,()=>run2(a)));if(S.act>=S.max)btn(`위험`,`해가 진다. 밤 조사로 넘어간다`,night,1)}function run2(a){if(S.act>=S.max)return night();S.act++;S.used.push(a.id);gain(a.g);day2(`${a.txt} 남은 낮 조사: ${Math.max(0,S.max-S.act)}회.`)}function night(){S.ph=`밤`;scene(`1장 2일차 · 밤`,`첫 밤 조사`,`낮에 쌓인 기록이 밤의 위험 행동을 정한다. 오늘 밤 행동은 한 번뿐이다.`);btn(`위험`,`우물에서 도리의 이름을 부른다`,()=>n(`well`));btn(`위험`,`방앗간 물소리를 따라간다`,()=>n(`mill`));if(S.route==`ritual`)btn(`위험`,`밤 산제단에 물을 올린다`,()=>n(`shrine`));if(S.route==`conceal`)btn(`위험`,`을파의 감시를 피해 장부를 숨긴다`,()=>n(`ledger`));if(S.route==`tiger`)btn(`위험`,`사량의 덫을 확인한다`,()=>n(`trap`));if(S.route==`human`)btn(`위험`,`월선과 함께 산길 입구를 본다`,()=>n(`wol`))}function n(id){S.ph=`새벽`;if(id==`well`)gain({un:[`우물 속 도리 목소리 확인`],ri:[`천도 조건: 이름`],st:{애도:1,한:-1}});if(id==`mill`)gain({cl:[`물소리 골짜기 입구`],st:{조사:1,경계:1}});if(id==`shrine`)gain({ri:[`밤 산제단 물 올림`],st:{결이해:1,경계:1}});if(id==`ledger`)gain({cl:[`숨긴 산제 장부`],world:[`을파가 공개 적대 대신 거래를 시도함`],st:{을파신뢰:1,월선신뢰:-1}});if(id==`trap`)gain({cl:[`사량의 빈 덫`],un:[`검은등은 덫을 밟지 않음`],st:{조사:1,경계:1}});if(id==`wol`)gain({ri:[`유족의 부름`],un:[`월선이 도리 목소리를 직접 들음`],st:{월선신뢰:1,한:-1}});scene(`1장 2일차 · 새벽`,`도리의 흔적`,`새벽녘 산 쪽에서 아이 목소리가 섞인 호랑이 울음이 들린다. 사건은 범, 유괴, 산제, 은폐 중 하나로 닫히지 않는다. 어제의 보고서는 길을 틀었고 오늘의 단서는 물소리 골짜기로 이어진다.`);btn(`기록`,`2장 조사 명령을 정한다`,report2,1)}function report2(){S.ph=`보고`;scene(`1장 종료 보고`,`2장 진입 전 정리`,`1장 2일 구조가 끝났다. 마지막으로 어떤 방향을 2장 조사 명령으로 올릴지 선택한다.`);[[`valley`,`물소리 골짜기 재조사`],[`people`,`실종자 동선 재수사`],[`ritual`,`산제 흔적 우선 조사`],[`seal`,`금지된 숲 봉쇄`]].forEach(([k,l])=>btn(`기록`,l,()=>end(l),1))}function end(l){S.rep.push(`1장 2일차: ${l}`);add(S.off,`2장 조사 명령: ${l}`);scene(`원형 종료`,`1차 구조 개편 검증 완료`,`보고서 이력이 세계 변화와 다음 조사 방향으로 연결되었다. 다음 패치에서는 이 구조를 기존 index.html의 지도 이동형 플레이에 통합하면 된다.`);btn(`다시`,`처음부터 다시 보기`,()=>location.reload(),1)}intro()</script></body></html>
