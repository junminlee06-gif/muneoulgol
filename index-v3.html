<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>무너울골 이동형 보고서 루프</title><style>body{margin:0;background:#100d0a;color:#e7dcc7;font-family:system-ui,sans-serif}.wrap{max-width:1100px;margin:auto;padding:16px;display:grid;grid-template-columns:720px 1fr;gap:14px}header{grid-column:1/-1;border-bottom:1px solid #4a3b2c;padding-bottom:10px}h1{margin:0;font-size:24px}.sub,.small{color:#a99a82;font-size:13px}.game{position:relative;width:720px;height:480px;background:#21170f;border:1px solid #4a3b2c;overflow:hidden}.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(12,60px);grid-template-rows:repeat(8,60px)}.tile{border:1px solid rgba(0,0,0,.13)}.g{background:#526848}.p{background:#927a57}.h{background:#2d3d2e}.w{background:#455f68}.b{background:#6f5840}.o{background:#694737}.n{filter:brightness(.55)}.loc{position:absolute;width:38px;height:38px;transform:translate(-50%,-50%);display:grid;place-items:center;background:#2d241b;border:2px solid #d0a866;z-index:2;font-weight:800}.near{outline:3px solid #f0d08c}.pc{position:absolute;width:24px;height:32px;transform:translate(-50%,-70%);background:#26374b;border:2px solid #111;z-index:3;border-radius:8px}.pc:before{content:"";position:absolute;left:4px;top:-10px;width:13px;height:13px;border:2px solid #111;border-radius:50%;background:#d7ae82}.hud{position:absolute;left:10px;top:10px;background:rgba(24,19,15,.9);border:1px solid #6e5a40;padding:8px;font-size:13px;z-index:4}.hint{position:absolute;right:10px;top:10px;background:rgba(24,19,15,.9);border:1px solid #6e5a40;padding:8px;font-size:12px;color:#a99a82;text-align:right;z-index:4}.box{display:none;position:absolute;left:16px;right:16px;bottom:16px;background:#1f1914;border:2px solid #5b4a38;padding:14px;z-index:10;box-shadow:0 12px 24px #0008}.report{top:16px;overflow:auto}.speaker{color:#d0a866;font-weight:800;margin-bottom:6px}.text{white-space:pre-wrap;margin-bottom:10px}.opts{display:grid;gap:7px}button{font:inherit;color:#e7dcc7;background:#35291f;border:1px solid #6e5a40;padding:9px;text-align:left;cursor:pointer}button:hover{background:#493728}.tag{font-size:11px;border:1px solid #d0a866;color:#f0dfbd;padding:1px 5px;margin-right:6px}.card{background:#18130f;border:1px solid #4a3b2c;padding:12px;margin-bottom:12px}.card h2{font-size:16px;color:#d0a866;margin:0 0 8px}.meter{display:flex;justify-content:space-between;border-bottom:1px solid #342a20;font-size:13px}.pill{display:inline-block;border:1px solid #4a3b2c;padding:2px 6px;margin:2px;font-size:12px;color:#cfbf9d}li{font-size:13px;margin:3px 0}@media(max-width:960px){.wrap{grid-template-columns:1fr}.game{width:100%;max-width:720px}}</style></head><body><div class="wrap"><header><h1>무너울골: 보고서 루프 이동형 통합판</h1><div class="sub">1장 2일 구조 · 이동 조사 · 보고서가 다음 날 장소와 인물 태도를 바꾸는 검증 빌드</div></header><main class="game" id="game"><div class="grid" id="grid"></div><div class="hud" id="hud"></div><div class="hint">WASD/방향키 이동<br>Enter/Space/Z 상호작용<br>숫자키 선택</div><div class="pc" id="pc"></div><div class="box" id="dlg"><div class="speaker" id="sp"></div><div class="text" id="tx"></div><div class="opts" id="op"></div></div><div class="box report" id="rp"><div class="speaker" id="rt"></div><div class="text" id="rx"></div><div class="opts" id="ro"></div></div></main><aside><div class="card"><h2>진행</h2><div id="ph" class="small"></div><div id="mt"></div></div><div class="card"><h2>세계 변화</h2><ul id="wo"></ul></div><div class="card"><h2>공식 기록</h2><ul id="fo"></ul></div><div class="card"><h2>비공식 기록</h2><ul id="un"></ul></div><div class="card"><h2>단서 / 의례</h2><div id="cl"></div></div><div class="card"><h2>보고서 이력</h2><ul id="hi"></ul></div></aside></div><script>(()=>{'use strict';const $=id=>document.getElementById(id),S={day:1,part:'아침',map:'pass',x:6,y:6,route:null,act:0,max:3,night:false,lock:false,seen:new Set(),st:{기록:0,조사:0,결이해:0,애도:0,마을신뢰:0,을파신뢰:0,막례신뢰:0,월선신뢰:0,관아신뢰:1,경계:3,한:1},off:[],un:[],cl:[],ri:[],wo:[],hi:[]},D={game:$('game'),grid:$('grid'),pc:$('pc'),hud:$('hud'),dlg:$('dlg'),sp:$('sp'),tx:$('tx'),op:$('op'),rp:$('rp'),rt:$('rt'),rx:$('rx'),ro:$('ro'),ph:$('ph'),mt:$('mt'),wo:$('wo'),fo:$('fo'),un:$('un'),cl:$('cl'),hi:$('hi')};const maps={pass:['hhhhhhhhhhhh','hggggggggggh','hgggggpggggh','hggggggggggh','hggggggggggh','hggggggggggh','hgggggpggggh','hhhhhhphhhhh'],village:['hhhhhhhhhhhh','hggggggggggh','hggbggwggggh','hggggggggggh','hggbggggbggh','hggggggggggh','hgggggoggggh','hhhhhhphhhhh'],north:['hhhhhhhhhhhh','hggggrgggggh','hggggggggggh','hggbgggwgggh','hggggggggggh','hgggggpggggh','hggggggggggh','hhhhhhphhhhh']},cls={g:'g',p:'p',h:'h',w:'w',b:'b',o:'o',r:'b'};const locs={pass:[['shoe','짚신','鞋',6,2,['아침']],['toVillage','무너울골','↑',6,7,['아침','낮']]],village:[['office','관아','文',6,6,['낮','보고','밤','종료']],['chief','촌장집','長',3,4,['낮']],['well','우물','井',6,2,['낮','밤']],['shaman','무당집','祭',3,2,['낮','밤']],['mill','방앗간','水',8,4,['낮','밤']],['toPass','고갯길','↓',6,7,['낮','밤']],['toNorth','북쪽 산길','↑',6,0,['낮','밤']]],north:[['toVillage','마을','↓',6,7,['낮','밤']],['valley','물소리 골짜기','水',7,3,['낮','밤']],['lumber','벌목터','木',3,3,['낮']],['shrineNight','밤 산제단','祭',5,1,['밤']],['hunterTrap','사량의 덫','罠',5,1,['밤']],['wolseonPath','월선의 산길','母',7,3,['밤']],['ledgerHide','장부 은닉처','書',3,3,['밤']]]};const reports={tiger:['범의 습격 가능성이 높다','범','1일차 보고: 범 습격 가능성',['사냥꾼 사량 등장','마을이 일시적으로 안심','막례 신뢰 감소'],{마을신뢰:1,막례신뢰:-1,조사:-1},'관아는 사건을 산짐승 문제로 좁혔다. 사량이 우물가에 서고, 막례는 금줄을 문 안쪽으로 거둔다.'],human:['사람이 아이를 산 쪽으로 데려간 흔적이 있다','유괴','1일차 보고: 사람 또는 마을 내부자 개입 가능성',['관아 병졸이 마을 내부자를 의심','을파가 방어적으로 변함','월선 밀담 개방'],{기록:1,마을신뢰:-1,을파신뢰:-1,월선신뢰:1},'병졸 둘이 촌장집 앞에 선다. 을파는 장부를 닫고, 월선은 당신에게만 할 말이 있다고 눈짓한다.'],ritual:['산제와 관련된 흔적이 있다','산제','1일차 보고: 산제 관련 흔적',['관아가 미신이라며 보고를 낮게 봄','막례가 비밀 제문 제공','밤 산제단 접근 가능'],{관아신뢰:-1,막례신뢰:2,결이해:1},'관아 서리는 제사는 기록할 수 없다고 말한다. 그러나 막례는 새벽에 찢어진 제문 한 장을 건넨다.'],conceal:['마을 내부 은폐 가능성이 있다','은폐','1일차 보고: 마을 내부 은폐 가능성',['을파가 플레이어를 감시','촌장집 조사 난이도 상승','숨겨진 장부 단서 개방'],{기록:1,을파신뢰:-2,마을신뢰:-1,조사:1},'을파는 예를 갖추지만 당신 뒤에 청년 하나를 붙인다. 너무 반듯한 장부가 오히려 눈에 들어온다.']};function add(a,v){if(!a.includes(v))a.push(v)}function stat(o){Object.entries(o||{}).forEach(([k,v])=>S.st[k]=(S.st[k]||0)+v)}function gain(g={}){(g.off||[]).forEach(v=>add(S.off,v));(g.un||[]).forEach(v=>add(S.un,v));(g.cl||[]).forEach(v=>add(S.cl,v));(g.ri||[]).forEach(v=>add(S.ri,v));(g.wo||[]).forEach(v=>add(S.wo,v));stat(g.st);side()}function show(s,t,ops=[]){S.lock=true;D.sp.textContent=s;D.tx.textContent=t;D.op.innerHTML='';ops.forEach(([k,f,type='선택'],i)=>{let b=document.createElement('button');b.innerHTML='<span class="tag">'+type+'</span>'+k;b.onclick=f;D.op.appendChild(b)});D.dlg.style.display='block';side()}function close(){S.lock=false;D.dlg.style.display='none'}function report(){S.lock=true;D.rp.style.display='block';D.rt.textContent='1일차 보고서';D.rx.textContent='무엇을 공식 진실로 만들 것인가. 이 선택은 2일차 장소, 인물 태도, 밤 접근 경로를 바꾼다.';D.ro.innerHTML='';Object.entries(reports).forEach(([k,r])=>{let b=document.createElement('button');b.innerHTML='<span class="tag">기록</span>'+r[0]+' — '+r[3].join(' / ');b.onclick=()=>submit(k);D.ro.appendChild(b)})}function submit(k){let r=reports[k];S.route=k;add(S.off,r[2]);S.hi.push('1장 1일차: '+r[0]);gain({wo:r[3],st:r[4]});S.day=2;S.part='낮';S.act=0;S.seen.clear();S.map='village';pos(6,6);D.rp.style.display='none';show('1장 2일차 · 아침',r[5],[['2일차 조사 시작',close,'진행']])}const day1={chief:['을파','범 짓일 가능성이 큽니다. 산길을 닫고 피해 기록만 올리면 될 일입니다.',{off:['촌장 진술: 범 습격 가능성'],cl:['실종자 명단'],st:{기록:1,을파신뢰:1}}],well:['우물가','월선은 짚신을 보자 고개를 돌린다. “그건 도리 것이 아닙니다.” 부정이 너무 빠르다.',{cl:['아이의 짚신 확인 보류'],un:['월선은 짚신을 도리 것이라 부정'],st:{애도:1,월선신뢰:1}}],shaman:['막례','이건 부르는 줄이 아니라 막는 줄이다. 누가 문을 열어 둔 게야.',{cl:['끊긴 금줄 조각'],ri:['찢어진 제문 일부'],st:{결이해:1,막례신뢰:1}}],mill:['방앗간','물레 옆에 작은 머리끈이 걸려 있다. 발자국은 우물에서 방앗간으로 이어진다.',{cl:['도리의 머리끈','젖은 발자국'],st:{조사:1,애도:1}}]};const day2={chief:['촌장집','장부의 실종자 순서가 실제 실종 순서와 다르다.',{off:['실종자 명단 재확인'],cl:['이름 순서가 바뀐 명단'],st:{기록:1,을파신뢰:-1}}],well:['우물','월선은 결국 짚신을 인정한다. “도리 것입니다. 그래도 죽었다고 쓰지는 말아 주세요.”',{off:['도리 이름 공식 확인'],cl:['도리의 이름'],st:{애도:1,월선신뢰:1}}],shaman:['무당집','산제는 산군을 부르는 의식이 아니다. 산이 마을로 내려오지 않도록 문을 닫는 의례였다.',{ri:['산제 목적: 문을 닫는 의례'],un:['산제는 산군을 부르는 의식이 아님'],st:{결이해:1,막례신뢰:1}}],mill:['방앗간','돌확 아래 홈은 물이 산 쪽으로 빠지도록 파여 있다.',{ri:['제물 씻는 절차'],cl:['물길이 골짜기와 이어짐'],st:{조사:1,결이해:1}}],valley:['물소리 골짜기','같은 길을 걸었는데 다시 입구로 돌아온다.',{cl:['물소리 속 도리 목소리'],st:{결이해:1,한:1}}],lumber:['벌목터','표식 나무가 베여 있다. 산제 중단과 벌목 증가는 같은 장부에 적혀 있다.',{cl:['금지된 숲 표식 나무 벌목 흔적'],un:['산제 중단과 벌목 증가 연결'],st:{조사:1,을파신뢰:-1}}],hunterTrap:['사량','사량은 말한다. 범 털이면 마른 냄새가 납니다. 이건 물에서 나온 냄새요.',{cl:['사량: 젖은 짐승 냄새 증언'],un:['범 단정에 균열'],st:{조사:1,마을신뢰:-1}}],wolseonPath:['월선','도리는 누가 데려간 게 아닙니다. 부르면 따라가는 아이였어요. 물소리 쪽으로요.',{cl:['도리는 물소리를 따라감'],st:{애도:1,월선신뢰:1}}],shrineNight:['비밀 제문','이름은 마을에 두고 발은 산으로 보내지 말라. 문을 닫는 주문이다.',{ri:['비밀 제문: 이름은 마을에 둔다'],st:{결이해:2,관아신뢰:-1}}],ledgerHide:['숨겨진 장부','산제 비용을 줄인 해부터 금지된 숲 벌목량이 늘었다.',{cl:['산제 장부'],un:['산제 비용 중단과 벌목 증가 연결'],st:{조사:1,을파신뢰:-1}}]};const nights={well:['우물의 밤','도리의 이름이 한 박자 늦게 돌아온다.',{un:['우물 속 도리 목소리 확인'],ri:['천도 조건: 이름'],st:{애도:1,한:-1}}],mill:['방앗간의 밤','돌확 위에 검은 털 하나가 떠오르고, 물길은 골짜기 쪽으로 튼다.',{cl:['물소리 골짜기 입구'],st:{조사:1,경계:1}}],shrineNight:['밤 산제단','물을 올리자 물소리가 한 겹 낮아진다.',{ri:['밤 산제단 물 올림'],st:{결이해:1,경계:1}}],hunterTrap:['사량의 덫','덫은 비어 있다. 검은등은 덫을 아는 듯 돌아갔다.',{cl:['사량의 빈 덫'],un:['검은등은 덫을 밟지 않음'],st:{조사:1,경계:1}}],wolseonPath:['월선의 산길','월선이 도리의 이름을 부르자 산길 안쪽에서 아이 목소리가 대답한다.',{ri:['유족의 부름'],un:['월선이 도리 목소리를 직접 들음'],st:{월선신뢰:1,한:-1}}],ledgerHide:['장부 은닉처','장부를 숨기자 을파는 적대 대신 거래를 시도할 것이다.',{cl:['숨긴 산제 장부'],wo:['을파가 공개 적대 대신 거래를 시도함'],st:{을파신뢰:1,월선신뢰:-1}}]};function action(id){if(S.day===1&&S.part==='낮'){let a=day1[id];if(!a)return;go('d1'+id,a)}else if(S.day===2&&S.part==='낮'){let a=day2[id];if(!a)return;go('d2'+id,a)}else if(S.day===2&&S.part==='밤'){let a=nights[id];if(!a||S.night)return;S.night=true;gain(a[2]);show(a[0],a[1],[['새벽 보고로 간다',finish,'진행']])}}function go(key,a){if(S.seen.has(key))return show('이미 조사함','오늘은 이미 이 장소를 조사했다.',[['돌아간다',close]]);S.seen.add(key);S.act++;gain(a[2]);show(a[0],a[1],[['정리하고 이동한다',()=>{close();if(S.act>=S.max)(S.day===1?promptReport():promptNight())},'진행']])}function promptReport(){S.part='보고';S.map='village';pos(6,6);show('해질녘','낮 조사는 끝났다. 관아 임시처소에서 보고서를 작성해야 한다.',[['관아로 간다',close,'진행']])}function promptNight(){S.part='밤';S.night=false;S.map='village';pos(6,6);show('2일차 밤','보고서 결과에 따라 밤에 갈 수 있는 장소가 달라졌다. 위험 행동은 한 번뿐이다.',[['밖으로 나간다',close,'진행']])}function finish(){S.part='종료';S.map='village';pos(6,6);show('1장 종료','보고서는 길을 틀었고, 단서는 물소리 골짜기로 이어진다.',[['2장 조사 명령 작성',finalReport,'기록']])}function finalReport(){S.lock=true;D.rp.style.display='block';D.rt.textContent='1장 종료 보고';D.rx.textContent='2장으로 어떤 조사 명령을 올릴지 선택한다.';D.ro.innerHTML='';['물소리 골짜기 재조사','실종자 동선 재수사','산제 흔적 우선 조사','금지된 숲 봉쇄'].forEach(v=>{let b=document.createElement('button');b.innerHTML='<span class="tag">기록</span>'+v;b.onclick=()=>{S.hi.push('1장 2일차: '+v);add(S.off,'2장 조사 명령: '+v);D.rp.style.display='none';show('통합판 종료','1장 2일 이동형 구조가 완료되었다. 다음 패치는 이 구조를 기존 2장, 3장까지 확장하는 것이다.',[['다시 시작',()=>location.reload(),'초기화']])};D.ro.appendChild(b)})}function near(){let best=null,bd=9;for(let l of visible()){let d=Math.hypot(S.x-l[3],S.y-l[4]);if(d<.8&&d<bd){best=l;bd=d}}return best}function visible(){return (locs[S.map]||[]).filter(l=>l[5].includes(S.part)&&routeVisible(l[0]))}function routeVisible(id){if(S.part!=='밤')return true;if(id==='shrineNight')return S.route==='ritual';if(id==='hunterTrap')return S.route==='tiger';if(id==='wolseonPath')return S.route==='human';if(id==='ledgerHide')return S.route==='conceal';return true}function interact(){if(S.lock)return;let l=near();if(!l)return;if(l[0]==='toVillage'){S.map='village';pos(6,6);render();return}if(l[0]==='toPass'){S.map='pass';pos(6,6);render();return}if(l[0]==='toNorth'){S.map='north';pos(6,6);render();return}if(l[0]==='shoe'){gain({cl:['아이의 짚신'],off:['아이 실종 흔적'],st:{조사:1,애도:1}});S.part='낮';S.map='village';pos(6,6);show('피 묻은 짚신','작은 짚신이다. 피는 말랐고 발자국은 마을에서 산 쪽으로 향한다.',[['무너울골로 들어간다',close,'진행']]);return}if(l[0]==='office'){if(S.part==='보고')report();else if(S.part==='종료')finalReport();else show('관아','아직 보고서를 쓸 때가 아니다.',[['돌아간다',close]]);return}action(l[0])}function pos(x,y){S.x=x;S.y=y;D.pc.style.left=(x*60+30)+'px';D.pc.style.top=(y*60+44)+'px';side();drawLoc()}function move(dx,dy){if(S.lock)return;let x=Math.max(0,Math.min(11,S.x+dx)),y=Math.max(0,Math.min(7,S.y+dy));if(maps[S.map][y][x]!=='h')pos(x,y)}function render(){D.grid.innerHTML='';maps[S.map].join('').split('').forEach(t=>{let d=document.createElement('div');d.className='tile '+cls[t];if(S.part==='밤')d.className+=' n';D.grid.appendChild(d)});drawLoc();pos(S.x,S.y)}function drawLoc(){D.game.querySelectorAll('.loc').forEach(e=>e.remove());let n=near();visible().forEach(l=>{let d=document.createElement('div');d.className='loc'+(n&&n[0]===l[0]?' near':'');d.style.left=(l[3]*60+30)+'px';d.style.top=(l[4]*60+30)+'px';d.textContent=l[2];d.title=l[1];D.game.appendChild(d)})}function li(a){return a.map(v=>'<li>'+esc(v)+'</li>').join('')||'<li class="small">아직 없음</li>'}function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function side(){let n=near();D.hud.innerHTML='<b>'+({pass:'남쪽 고갯길',village:'무너울골',north:'북쪽 산길'}[S.map])+'</b> · 1장 '+S.day+'일차 · '+S.part+'<br>낮 조사 '+S.act+'/'+S.max+' · 밤 행동 '+(S.night?'완료':'미완료')+(S.route?'<br>전날 보고: '+reports[S.route][1]:'')+(n?'<br>상호작용: '+n[1]:'');D.ph.textContent='1장 '+S.day+'일차 / '+S.part;D.mt.innerHTML=Object.entries(S.st).map(([k,v])=>'<div class="meter"><span>'+k+'</span><b>'+v+'</b></div>').join('');D.wo.innerHTML=li(S.wo);D.fo.innerHTML=li(S.off);D.un.innerHTML=li(S.un);D.cl.innerHTML=[...S.cl.map(v=>'<span class="pill">단서: '+esc(v)+'</span>'),...S.ri.map(v=>'<span class="pill">의례: '+esc(v)+'</span>')].join('')||'<span class="small">아직 없음</span>';D.hi.innerHTML=li(S.hi)}window.addEventListener('keydown',e=>{if(S.lock&&D.dlg.style.display==='block'){let n=parseInt(e.key,10);if(n>=1&&n<=D.op.children.length)D.op.children[n-1].click();return}if(D.rp.style.display==='block'){let n=parseInt(e.key,10);if(n>=1&&n<=D.ro.children.length)D.ro.children[n-1].click();return}if(['ArrowUp','w','W'].includes(e.key))move(0,-1);else if(['ArrowDown','s','S'].includes(e.key))move(0,1);else if(['ArrowLeft','a','A'].includes(e.key))move(-1,0);else if(['ArrowRight','d','D'].includes(e.key))move(1,0);else if(['Enter',' ','z','Z'].includes(e.key))interact()});render();show('1장 1일차 · 아침','남쪽 고갯길. 무너울골로 가는 길목에 작은 짚신 한 짝이 떨어져 있다. 먼저 짚신을 조사한 뒤 마을로 들어간다.',[['조작 시작',close,'시작']])})();</script></body></html>
