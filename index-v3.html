<style>
:root{--bg:#0b0907;--panel:#17130f;--line:#4a3b2c;--text:#e7dcc7;--muted:#a99a82;--accent:#d0a866}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0%,#2a2118,#100d0a 60%,#050403 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}.wrap{max-width:1220px;margin:0 auto;padding:18px;display:grid;grid-template-columns:720px 1fr;gap:16px}header{grid-column:1/-1;display:flex;justify-content:space-between;gap:12px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:10px}h1{margin:0;font-size:24px;letter-spacing:-.03em}.sub,.small{font-size:13px;color:var(--muted)}.gamebox{position:relative;background:#1a130d;border:1px solid #3f3327;box-shadow:0 10px 34px rgba(0,0,0,.56),inset 0 0 0 3px rgba(230,205,160,.06)}.gamebox:before{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;opacity:.13;background-image:linear-gradient(90deg,rgba(255,244,205,.14) 0 1px,transparent 1px 19px),radial-gradient(circle,rgba(255,235,185,.19) 0 1px,transparent 1px);background-size:19px 100%,23px 23px;mix-blend-mode:screen}.gamebox:after{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;background:linear-gradient(rgba(255,255,255,.010) 50%,rgba(0,0,0,.052) 50%);background-size:100% 4px;mix-blend-mode:soft-light}canvas{display:block;width:720px;height:480px;image-rendering:pixelated;background:#22170f;filter:saturate(.94) contrast(1.07)}.hud{position:absolute;left:10px;top:10px;min-width:310px;background:rgba(28,23,18,.88);border:1px solid #4a3b2c;padding:8px 10px;font-size:13px;z-index:4}.hud b{color:var(--accent)}.hint{position:absolute;right:10px;top:10px;background:rgba(28,23,18,.88);border:1px solid #4a3b2c;padding:8px 10px;font-size:12px;color:var(--muted);text-align:right;z-index:4}.dialog,.report{position:absolute;left:16px;right:16px;bottom:16px;display:none;background:rgba(31,25,20,.97);border:2px solid #5b4a38;box-shadow:0 8px 0 rgba(0,0,0,.28),0 18px 34px rgba(0,0,0,.55);padding:14px;z-index:8}.report{top:16px;overflow:auto}.speaker{font-weight:800;color:var(--accent);margin-bottom:6px}.text{white-space:pre-wrap;font-size:15px;margin-bottom:10px}.options{display:grid;gap:7px}button{font-family:inherit;color:var(--text);background:#35291f;border:1px solid #6e5a40;padding:8px 10px;text-align:left;cursor:pointer;font-size:14px}button:hover,button:focus{background:#493728;outline:1px solid var(--accent)}.tag{font-size:11px;border:1px solid var(--accent);color:#f0dfbd;padding:1px 5px;margin-right:6px}.card{background:rgba(28,23,18,.86);border:1px solid var(--line);padding:12px;margin-bottom:12px}.card h2{font-size:16px;margin:0 0 8px;color:var(--accent)}.meter{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;padding-bottom:3px}.pill{display:inline-block;border:1px solid var(--line);padding:2px 6px;margin:2px;font-size:12px;color:#cfbf9d}ul{margin:6px 0 0 18px;padding:0}li{font-size:13px;margin:3px 0}@media(max-width:980px){.wrap{grid-template-columns:1fr}.gamebox canvas{width:100%;height:auto}.hint{display:none}}

<body>
<div class="wrap">
<header><div><h1>무너울골: 보고서 루프 이동형 통합판</h1><div class="sub">종이 질감 캔버스판 · 1장 2일 구조 · 보고서가 다음 날 장소와 인물 태도를 바꿈</div></div><div class="sub">이동: WASD/방향키 · 상호작용: Enter/Space/Z · 선택: 숫자키</div></header>
<section class="gamebox"><canvas id="game" width="1440" height="960"></canvas><div class="hud" id="hud"></div><div class="hint">WASD/방향키 이동<br>Enter/Space/Z 상호작용<br>대화 선택: 숫자키 또는 클릭</div><div class="dialog" id="dialog"><div class="speaker" id="speaker"></div><div class="text" id="text"></div><div class="options" id="options"></div></div><div class="report" id="report"><div class="speaker" id="reportTitle"></div><div class="text" id="reportText"></div><div class="options" id="reportOptions"></div></div></section>
<aside><div class="card"><h2>진행 상태</h2><div id="phaseText" class="small"></div><div id="meters"></div></div><div class="card"><h2>세계 변화</h2><ul id="world"></ul></div><div class="card"><h2>공식 기록</h2><ul id="official"></ul></div><div class="card"><h2>비공식 기록</h2><ul id="unofficial"></ul></div><div class="card"><h2>단서 / 의례 조각</h2><div id="clues"></div></div><div class="card"><h2>보고서 이력</h2><ul id="history"></ul></div></aside>
</div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),SCALE=2,T=40,W=18,H=12;ctx.setTransform(SCALE,0,0,SCALE,0,0);ctx.imageSmoothingEnabled=false;

const maps={pass:['hhhhhhhhhhhhhhhhhh','hhhhhhhhpphhhhhhhh','hhhhhhggppgghhhhhh','hhhhggggppgggghhhh','hhhgggggppggggghhh','hhhgggggppggggghhh','hhhhggggppgggghhhh','hhhhhgggppggghhhhh','hhhhhhggppgghhhhhh','hhhhhhhgpggghhhhhh','hhhhhhhhpghhhhhhhh','hhhhhhhhpghhhhhhhh'],village:['hhhhhhhhhhhhhhhhhh','hgggggggppgggggggh','hgggbgggppggwggggh','hgggbgggppgggggggh','hgggggggppgggggggh','hggggbggppggbggggh','hggggbggppggbggggh','hgggggggppgggggggh','hgggggggppgggggggh','hgggggggooggmmmmgh','hgggggggppgggggggh','hhhhhhhpphhhhhhhhh'],north:['hhhhhhhhhhhhhhhhhh','hgggggggppgggggggh','hggggrggppgggggggh','hgggggggppgggggggh','hgggbgggppgggwgggh','hgggbgggppgggggggh','hgggggggppgggggggh','hgggggggppgggggggh','hgggggggppgggggggh','hgggggggppgggggggh','hgggggggppgggggggh','hhhhhhhpphhhhhhhhh']};
const pal={g:'#5e7354',g2:'#4c6248',p:'#967f5d',p2:'#77654e',h:'#415541',h2:'#2b3a30',w:'#516f77',w2:'#314d58',b:'#806a50',o:'#8b6f53',m:'#6a5035',r:'#76766d'};
const locs={pass:[{id:'shoe',name:'피 묻은 짚신',x:9,y:4,parts:['아침']},{id:'toVillage',name:'무너울골 방향 고갯길',x:9,y:10,parts:['낮']}],village:[{id:'office',name:'관아 임시처소',x:9,y:9,parts:['낮','보고','밤','종료']},{id:'chief',name:'촌장집',x:4,y:6,parts:['낮']},{id:'well',name:'마을 우물',x:12,y:3,parts:['낮','밤']},{id:'shaman',name:'무당집',x:4,y:3,parts:['낮','밤']},{id:'mill',name:'방앗간',x:14,y:9,parts:['낮','밤']},{id:'toPass',name:'남쪽 고갯길',x:8,y:11,parts:['낮','밤']},{id:'toNorth',name:'북쪽 산길',x:9,y:1,parts:['낮','밤']}],north:[{id:'toVillage',name:'무너울골 남쪽 길',x:9,y:11,parts:['낮','밤']},{id:'valley',name:'물소리 골짜기',x:13,y:4,parts:['낮','밤']},{id:'lumber',name:'벌목터',x:4,y:5,parts:['낮']},{id:'shrineNight',name:'밤 산제단',x:5,y:2,parts:['밤'],route:'ritual'},{id:'hunterTrap',name:'사량의 덫',x:5,y:2,parts:['밤'],route:'tiger'},{id:'wolseonPath',name:'월선의 산길',x:13,y:4,parts:['밤'],route:'human'},{id:'ledgerHide',name:'장부 은닉처',x:4,y:5,parts:['밤'],route:'conceal'}]};
const reports={tiger:{label:'범의 습격 가능성이 높다',short:'범',record:'1일차 보고: 범 습격 가능성',world:['사냥꾼 사량 등장','마을이 일시적으로 안심','막례 신뢰 감소'],stats:{마을신뢰:1,막례신뢰:-1,조사:-1},morning:'관아는 사건을 산짐승 문제로 좁혔다. 사량이 우물가에 서고, 막례는 금줄을 문 안쪽으로 거둔다.'},human:{label:'사람이 아이를 산 쪽으로 데려간 흔적이 있다',short:'유괴',record:'1일차 보고: 사람 또는 마을 내부자 개입 가능성',world:['관아 병졸이 마을 내부자를 의심','을파가 방어적으로 변함','월선 밀담 개방'],stats:{기록:1,마을신뢰:-1,을파신뢰:-1,월선신뢰:1},morning:'병졸 둘이 촌장집 앞에 선다. 을파는 장부를 닫고, 월선은 당신에게만 할 말이 있다고 눈짓한다.'},ritual:{label:'산제와 관련된 흔적이 있다',short:'산제',record:'1일차 보고: 산제 관련 흔적',world:['관아가 미신이라며 보고를 낮게 봄','막례가 비밀 제문 제공','밤 산제단 접근 가능'],stats:{관아신뢰:-1,막례신뢰:2,결이해:1},morning:'관아 서리는 제사는 기록할 수 없다고 말한다. 그러나 막례는 새벽에 찢어진 제문 한 장을 건넨다.'},conceal:{label:'마을 내부 은폐 가능성이 있다',short:'은폐',record:'1일차 보고: 마을 내부 은폐 가능성',world:['을파가 플레이어를 감시','촌장집 조사 난이도 상승','숨겨진 장부 단서 개방'],stats:{기록:1,을파신뢰:-2,마을신뢰:-1,조사:1},morning:'을파는 예를 갖추지만 당신 뒤에 청년 하나를 붙인다. 너무 반듯한 장부가 오히려 눈에 들어온다.'}};
const day1={chief:['을파','“범 짓일 가능성이 큽니다. 산길을 닫고 피해 기록만 올리면 될 일입니다.”', {official:['촌장 진술: 범 습격 가능성'],clues:['실종자 명단'],stats:{기록:1,을파신뢰:1}}],well:['우물가','월선은 짚신을 보자 고개를 돌린다. “그건 도리 것이 아닙니다.” 부정이 너무 빠르다.', {clues:['아이의 짚신 확인 보류'],unofficial:['월선은 짚신을 도리 것이라 부정'],stats:{애도:1,월선신뢰:1}}],shaman:['막례','“이건 부르는 줄이 아니라 막는 줄이다. 누가 문을 열어 둔 게야.”', {clues:['끊긴 금줄 조각'],ritual:['찢어진 제문 일부'],stats:{결이해:1,막례신뢰:1}}],mill:['방앗간','물레 옆에 작은 머리끈이 걸려 있다. 발자국은 우물에서 방앗간으로 이어진다.', {clues:['도리의 머리끈','젖은 발자국'],stats:{조사:1,애도:1}}]};
const day2={chief:['촌장집','장부의 실종자 순서가 실제 실종 순서와 다르다.', {official:['실종자 명단 재확인'],clues:['이름 순서가 바뀐 명단'],stats:{기록:1,을파신뢰:-1}}],well:['우물','월선은 결국 짚신을 인정한다. “도리 것입니다. 그래도 죽었다고 쓰지는 말아 주세요.”', {official:['도리 이름 공식 확인'],clues:['도리의 이름'],stats:{애도:1,월선신뢰:1}}],shaman:['무당집','산제는 산군을 부르는 의식이 아니다. 산이 마을로 내려오지 않도록 문을 닫는 의례였다.', {ritual:['산제 목적: 문을 닫는 의례'],unofficial:['산제는 산군을 부르는 의식이 아님'],stats:{결이해:1,막례신뢰:1}}],mill:['방앗간','돌확 아래 홈은 물이 산 쪽으로 빠지도록 파여 있다.', {ritual:['제물 씻는 절차'],clues:['물길이 골짜기와 이어짐'],stats:{조사:1,결이해:1}}],valley:['물소리 골짜기','같은 길을 걸었는데 다시 입구로 돌아온다.', {clues:['물소리 속 도리 목소리'],stats:{결이해:1,한:1}}],lumber:['벌목터','표식 나무가 베여 있다. 산제 중단과 벌목 증가는 같은 장부에 적혀 있다.', {clues:['금지된 숲 표식 나무 벌목 흔적'],unofficial:['산제 중단과 벌목 증가 연결'],stats:{조사:1,을파신뢰:-1}}],hunterTrap:['사량','“범 털이면 마른 냄새가 납니다. 이건 물에서 나온 냄새요.”', {clues:['사량: 젖은 짐승 냄새 증언'],unofficial:['범 단정에 균열'],stats:{조사:1,마을신뢰:-1}}],wolseonPath:['월선','“도리는 누가 데려간 게 아닙니다. 부르면 따라가는 아이였어요. 물소리 쪽으로요.”', {clues:['도리는 물소리를 따라감'],stats:{애도:1,월선신뢰:1}}],shrineNight:['비밀 제문','이름은 마을에 두고 발은 산으로 보내지 말라. 문을 닫는 주문이다.', {ritual:['비밀 제문: 이름은 마을에 둔다'],stats:{결이해:2,관아신뢰:-1}}],ledgerHide:['숨겨진 장부','산제 비용을 줄인 해부터 금지된 숲 벌목량이 늘었다.', {clues:['산제 장부'],unofficial:['산제 비용 중단과 벌목 증가 연결'],stats:{조사:1,을파신뢰:-1}}]};
const nights={well:['우물의 밤','도리의 이름이 한 박자 늦게 돌아온다.',{unofficial:['우물 속 도리 목소리 확인'],ritual:['천도 조건: 이름'],stats:{애도:1,한:-1}}],mill:['방앗간의 밤','돌확 위에 검은 털 하나가 떠오르고, 물길은 골짜기 쪽으로 튼다.',{clues:['물소리 골짜기 입구'],stats:{조사:1,경계:1}}],shrineNight:['밤 산제단','물을 올리자 물소리가 한 겹 낮아진다.',{ritual:['밤 산제단 물 올림'],stats:{결이해:1,경계:1}}],hunterTrap:['사량의 덫','덫은 비어 있다. 검은등은 덫을 아는 듯 돌아갔다.',{clues:['사량의 빈 덫'],unofficial:['검은등은 덫을 밟지 않음'],stats:{조사:1,경계:1}}],wolseonPath:['월선의 산길','월선이 도리의 이름을 부르자 산길 안쪽에서 아이 목소리가 대답한다.',{ritual:['유족의 부름'],unofficial:['월선이 도리 목소리를 직접 들음'],stats:{월선신뢰:1,한:-1}}],ledgerHide:['장부 은닉처','장부를 숨기자 을파는 적대 대신 거래를 시도할 것이다.',{clues:['숨긴 산제 장부'],world:['을파가 공개 적대 대신 거래를 시도함'],stats:{을파신뢰:1,월선신뢰:-1}}]};
function uniq(a,v){if(!a.includes(v))a.push(v)}function stat(o){Object.entries(o||{}).forEach(([k,v])=>state.stats[k]=(state.stats[k]||0)+v)}
function gain(g={}){(g.official||[]).forEach(v=>uniq(state.official,v));(g.unofficial||[]).forEach(v=>uniq(state.unofficial,v));(g.clues||[]).forEach(v=>uniq(state.clues,v));(g.ritual||[]).forEach(v=>uniq(state.ritual,v));(g.world||[]).forEach(v=>uniq(state.world,v));stat(g.stats);refreshSide()}
function show(s,t,ops=[]){state.locked=true;keys.clear();dom.speaker.textContent=s;dom.text.textContent=t;dom.options.innerHTML='';ops.forEach(([label,fn,type='선택'])=>{const b=document.createElement('button');b.innerHTML='<span class="tag">'+type+'</span>'+label;b.onclick=fn;dom.options.appendChild(b)});dom.dialog.style.display='block';refreshSide()}function close(){state.locked=false;dom.dialog.style.display='none'}
function openReport(){state.locked=true;keys.clear();dom.report.style.display='block';dom.reportTitle.textContent='1일차 보고서';dom.reportText.textContent='무엇을 공식 진실로 만들 것인가. 이 선택은 2일차 장소, 인물 태도, 밤 접근 경로를 바꾼다.';dom.reportOptions.innerHTML='';Object.entries(reports).forEach(([k,r])=>{const b=document.createElement('button');b.innerHTML='<span class="tag">기록</span>'+r.label+' — '+r.world.join(' / ');b.onclick=()=>submitReport(k);dom.reportOptions.appendChild(b)})}
function submitReport(k){const r=reports[k];state.route=k;uniq(state.official,r.record);state.history.push('1장 1일차: '+r.label);gain({world:r.world,stats:r.stats});state.day=2;state.part='낮';state.act=0;state.seen.clear();state.map='village';setPos(9,9);dom.report.style.display='none';show('1장 2일차 · 아침',r.morning,[['2일차 조사 시작',close,'진행']])}
function action(id){if(state.day===1&&state.part==='낮'){doScene('d1_'+id,day1[id])}else if(state.day===2&&state.part==='낮'){doScene('d2_'+id,day2[id])}else if(state.day===2&&state.part==='밤'){if(state.nightDone){show('밤','오늘 밤 행동은 이미 끝났다.',[['돌아간다',close]]);return}const n=nights[id];if(!n)return;state.nightDone=true;gain(n[2]);show(n[0],n[1],[['새벽 보고로 간다',finishChapter,'진행']])}}
function doScene(key,sc){if(!sc)return;if(state.seen.has(key)){show('이미 조사함','오늘은 이미 이 장소를 조사했다.',[['돌아간다',close]]);return}state.seen.add(key);state.act++;gain(sc[2]);show(sc[0],sc[1],[['정리하고 이동한다',()=>{close();if(state.act>=state.max)(state.day===1?promptReport():promptNight())},'진행']])}
function promptReport(){state.part='보고';state.map='village';setPos(9,9);show('해질녘','낮 조사는 끝났다. 관아 임시처소에서 보고서를 작성해야 한다.',[['관아로 간다',close,'진행']])}
function promptNight(){state.part='밤';state.nightDone=false;state.map='village';setPos(9,9);show('2일차 밤','보고서 결과에 따라 밤에 갈 수 있는 장소가 달라졌다. 위험 행동은 한 번뿐이다.',[['밖으로 나간다',close,'진행']])}
function finishChapter(){state.part='종료';state.map='village';setPos(9,9);show('1장 종료','보고서는 길을 틀었고, 단서는 물소리 골짜기로 이어진다.',[['2장 조사 명령 작성',openFinalReport,'기록']])}
function openFinalReport(){state.locked=true;dom.report.style.display='block';dom.reportTitle.textContent='1장 종료 보고';dom.reportText.textContent='2장으로 어떤 조사 명령을 올릴지 선택한다.';dom.reportOptions.innerHTML='';['물소리 골짜기 재조사','실종자 동선 재수사','산제 흔적 우선 조사','금지된 숲 봉쇄'].forEach(v=>{const b=document.createElement('button');b.innerHTML='<span class="tag">기록</span>'+v;b.onclick=()=>{state.history.push('1장 2일차: '+v);uniq(state.official,'2장 조사 명령: '+v);dom.report.style.display='none';show('통합판 종료','1장 2일 이동형 구조가 완료되었다. 다음 패치는 이 구조를 기존 2장, 3장까지 확장하는 것이다.',[['다시 시작',()=>location.reload(),'초기화']])};dom.reportOptions.appendChild(b)})}
function near(){let best=null,bd=99;for(const l of visibleLocs()){const d=Math.hypot(state.x-l.x,state.y-l.y);if(d<1.15&&d<bd){best=l;bd=d}}return best}
function visibleLocs(){return (locs[state.map]||[]).filter(l=>l.parts.includes(state.part)&&(!l.route||l.route===state.route))}
function interact(){if(state.locked)return;const l=near();if(!l)return;if(l.id==='toVillage'){state.map='village';setPos(9,9);return}if(l.id==='toPass'){state.map='pass';setPos(9,9);return}if(l.id==='toNorth'){state.map='north';setPos(9,10);return}if(l.id==='shoe'){gain({official:['아이 실종 흔적'],clues:['아이의 짚신'],stats:{조사:1,애도:1}});state.part='낮';state.map='village';setPos(9,9);show('피 묻은 짚신','작은 짚신이다. 피는 말랐고 발자국은 마을에서 산 쪽으로 향한다.',[['무너울골로 들어간다',close,'진행']]);return}if(l.id==='office'){if(state.part==='보고')openReport();else if(state.part==='종료')openFinalReport();else show('관아 임시처소','아직 보고서를 쓸 때가 아니다.',[['돌아간다',close]]);return}action(l.id)}
const keys=new Set();function move(dx,dy){if(state.locked||dom.report.style.display==='block')return;const nx=Math.max(0,Math.min(W-1,state.x+dx)),ny=Math.max(0,Math.min(H-1,state.y+dy));if((maps[state.map][ny]||'')[nx]!=='h'){state.x=nx;state.y=ny;refreshSide()}}
function setPos(x,y){state.x=x;state.y=y;state.rx=x;state.ry=y;refreshSide()}
window.addEventListener('keydown',e=>{if(dom.report.style.display==='block'){const n=parseInt(e.key,10);if(n>=1&&n<=dom.reportOptions.children.length)dom.reportOptions.children[n-1].click();return}if(state.locked){const n=parseInt(e.key,10);if(n>=1&&n<=dom.options.children.length)dom.options.children[n-1].click();return}if(['ArrowUp','w','W'].includes(e.key)){move(0,-1);e.preventDefault()}else if(['ArrowDown','s','S'].includes(e.key)){move(0,1);e.preventDefault()}else if(['ArrowLeft','a','A'].includes(e.key)){move(-1,0);e.preventDefault()}else if(['ArrowRight','d','D'].includes(e.key)){move(1,0);e.preventDefault()}else if(['Enter',' ','z','Z'].includes(e.key)){interact();e.preventDefault()}});
function draw(){ctx.setTransform(SCALE,0,0,SCALE,0,0);ctx.clearRect(0,0,720,480);drawMap();drawProps();drawLocs();drawPeople();drawAtmosphere();if(state.part==='밤')drawNight();updateHud();requestAnimationFrame(draw)}
function drawMap(){const m=maps[state.map];for(let y=0;y<H;y++)for(let x=0;x<W;x++){drawTile(x,y,m[y][x])}}
function drawTile(x,y,t){let c=t==='p'?pal.p:t==='h'?pal.h:t==='w'?pal.w:t==='b'?pal.b:t==='o'?pal.o:t==='m'?pal.m:t==='r'?pal.r:((x+y)%2?pal.g:pal.g2);if(state.part==='밤')c=shade(c,-45);ctx.fillStyle=c;ctx.fillRect(x*T,y*T,T,T);ctx.fillStyle='rgba(255,240,190,.035)';ctx.fillRect(x*T+3,y*T+4,T-6,2);if(t==='p'){ctx.fillStyle='rgba(60,38,25,.18)';ctx.fillRect(x*T+4,y*T+26,30,2);ctx.fillRect(x*T+20,y*T+10,12,1)}if(t==='w'){ctx.fillStyle=state.part==='밤'?pal.w2:'#6f8990';ctx.fillRect(x*T+4,y*T+12,31,2);ctx.fillRect(x*T+9,y*T+26,24,2)}if(t==='h'){ctx.fillStyle='rgba(20,34,24,.35)';ctx.fillRect(x*T+5,y*T+8,20,6);ctx.fillRect(x*T+18,y*T+25,18,5)}}
function drawProps(){if(state.map==='village'){house(3,2,2,2,'shaman');house(3,5,3,2,'chief');house(8,9,3,2,'office');house(13,8,3,2,'mill');well(12,3);trees([[2,1],[15,2],[2,9],[16,9],[6,4],[11,6]])}else if(state.map==='north'){shrine(4,1);lumber(3,5);water(13,4);trees([[2,2],[8,2],[14,2],[2,8],[15,8],[10,5]])}else{trees([[5,2],[12,3],[4,7],[13,8],[7,5]]);if(state.part==='아침')shoe(9,4)}}
function house(x,y,w,h,type){const ox=x*T,oy=y*T,ww=w*T,hh=h*T;ctx.fillStyle='rgba(0,0,0,.28)';ctx.fillRect(ox+5,oy+hh-2,ww,8);ctx.fillStyle=type==='office'?'#223949':type==='shaman'?'#66543d':type==='mill'?'#4a3728':'#273f50';if(state.part==='밤')ctx.fillStyle=shade(ctx.fillStyle,-25);ctx.fillRect(ox+2,oy+12,ww-4,16);ctx.fillRect(ox+8,oy+4,ww-16,10);ctx.fillStyle=type==='office'?'#927b62':type==='shaman'?'#78654e':'#8d775e';if(state.part==='밤')ctx.fillStyle=shade(ctx.fillStyle,-25);ctx.fillRect(ox+10,oy+28,ww-20,hh-38);ctx.fillStyle='#783f35';ctx.fillRect(ox+8,oy+26,ww-16,4);for(let px=ox+14;px<ox+ww-12;px+=26)ctx.fillRect(px,oy+28,4,hh-32);ctx.fillStyle='#2a1b13';ctx.fillRect(ox+ww/2-8,oy+hh-28,16,25);ctx.fillStyle='#7a7468';ctx.fillRect(ox+8,oy+hh-10,ww-16,8);if(type==='shaman'){ctx.fillStyle='#dbc985';ctx.fillRect(ox+9,oy+hh-34,ww-18,2);for(let px=ox+14;px<ox+ww-14;px+=12)ctx.fillRect(px,oy+hh-35,3,10)}if(type==='mill')millWheel(ox+ww-5,oy+hh-24);if(type==='office'){ctx.fillStyle='#8b3434';ctx.fillRect(ox+ww-12,oy+25,16,8)}}
function well(x,y){const ox=x*T,oy=y*T;ctx.fillStyle='#7d7a71';ctx.fillRect(ox+9,oy+18,22,16);ctx.fillRect(ox+6,oy+22,28,8);ctx.fillStyle='#203642';ctx.fillRect(ox+14,oy+22,12,8);ctx.fillStyle='#4f3826';ctx.fillRect(ox+10,oy+10,4,18);ctx.fillRect(ox+26,oy+10,4,18);ctx.fillRect(ox+9,oy+10,22,4)}
function water(x,y){ctx.fillStyle='rgba(83,113,122,.7)';ctx.fillRect(x*T+3,y*T+8,34,24)}
function shrine(x,y){const ox=x*T,oy=y*T;ctx.fillStyle='#797970';ctx.fillRect(ox+5,oy+42,100,14);ctx.fillRect(ox+18,oy+32,76,10);ctx.fillStyle='#6e5645';ctx.fillRect(ox+35,oy+10,6,34);ctx.fillRect(ox+67,oy+10,6,34);ctx.fillRect(ox+27,oy+10,54,7);ctx.fillStyle='#774142';ctx.fillRect(ox+46,oy+37,22,2);ctx.fillStyle='#d9ca90';ctx.fillRect(ox+4,oy+26,110,2);for(let px=ox+12;px<ox+110;px+=18)ctx.fillRect(px,oy+25,3,12)}
function lumber(x,y){const ox=x*T,oy=y*T;ctx.fillStyle='#6b4930';for(let i=0;i<5;i++)ctx.fillRect(ox+i*16,oy+38+(i%2)*3,34,6);ctx.fillStyle='#57422a';ctx.fillRect(ox+46,oy+12,6,28);ctx.fillStyle='#9d9a8d';ctx.fillRect(ox+42,oy+10,14,5);ctx.fillStyle='#d3c286';ctx.fillRect(ox+7,oy+18,90,2)}
function millWheel(x,y){ctx.strokeStyle='#8e6a45';ctx.lineWidth=2;ctx.strokeRect(x-12,y-12,24,24);ctx.beginPath();ctx.moveTo(x-12,y);ctx.lineTo(x+12,y);ctx.moveTo(x,y-12);ctx.lineTo(x,y+12);ctx.moveTo(x-8,y-8);ctx.lineTo(x+8,y+8);ctx.moveTo(x+8,y-8);ctx.lineTo(x-8,y+8);ctx.stroke();ctx.fillStyle='#a78352';ctx.fillRect(x-3,y-3,6,6)}
function trees(list){list.forEach(([x,y])=>{const ox=x*T,oy=y*T;ctx.fillStyle='#513116';ctx.fillRect(ox+18,oy+22,6,16);ctx.fillStyle=state.part==='밤'?'#18321e':'#345236';ctx.fillRect(ox+8,oy+10,24,20);ctx.fillStyle=state.part==='밤'?'#102216':'#233b2a';ctx.fillRect(ox+4,oy+18,32,14);ctx.fillStyle='rgba(220,230,170,.15)';ctx.fillRect(ox+20,oy+12,7,2)})}
function shoe(x,y){ctx.fillStyle='#d6c39b';ctx.fillRect(x*T+16,y*T+22,12,6);ctx.fillStyle='#8b3d36';ctx.fillRect(x*T+24,y*T+23,6,2)}
function drawLocs(){const n=near();for(const l of visibleLocs()){const ox=l.x*T+20,oy=l.y*T+20;ctx.fillStyle=n&&n.id===l.id?'rgba(240,208,140,.32)':'rgba(240,208,140,.16)';ctx.fillRect(ox-16,oy-16,32,32);ctx.strokeStyle=n&&n.id===l.id?'#f0d08c':'#b5945d';ctx.lineWidth=2;ctx.strokeRect(ox-16,oy-16,32,32);ctx.fillStyle='#f0d08c';ctx.font='bold 14px monospace';ctx.fillText('!',ox-4,oy+5)}}
function drawPeople(){if(state.map==='village'&&state.part!=='밤'){human(4,6,'#4e6680');human(4,3,'#705f86');human(12,3,'#76546e');}if(state.map==='north'&&state.part!=='밤')human(4,5,'#6d4f3f');human(state.x,state.y,'#26374b',true)}
function human(x,y,color,player=false){const ox=x*T+20,oy=y*T+30;ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(ox-12,oy+8,24,4);ctx.fillStyle='#d7ae82';ctx.fillRect(ox-8,oy-22,16,14);ctx.fillStyle='#2c2118';ctx.fillRect(ox-9,oy-24,18,7);ctx.fillStyle=color;ctx.fillRect(ox-10,oy-8,20,24);ctx.fillStyle='#15110f';ctx.fillRect(ox-8,oy+15,6,9);ctx.fillRect(ox+2,oy+15,6,9);if(player){ctx.strokeStyle='#d0a866';ctx.strokeRect(ox-13,oy-25,26,50)}}
function drawAtmosphere(){const g=ctx.createLinearGradient(0,0,0,480);g.addColorStop(0,'rgba(213,190,145,.05)');g.addColorStop(1,'rgba(0,0,0,.15)');ctx.fillStyle=g;ctx.fillRect(0,0,720,480)}
function drawNight(){ctx.fillStyle='rgba(2,6,8,.38)';ctx.fillRect(0,0,720,480);const px=state.x*T+20,py=state.y*T+22,g=ctx.createRadialGradient(px,py,30,px,py,150);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(.55,'rgba(0,0,0,.32)');g.addColorStop(1,'rgba(0,0,0,.82)');ctx.fillStyle=g;ctx.fillRect(0,0,720,480)}
function updateHud(){const l=near();dom.hud.innerHTML='<b>'+mapName()+'</b> · 1장 '+state.day+'일차 · '+state.part+'<br>낮 조사 '+state.act+'/'+state.max+' · 밤 행동 '+(state.nightDone?'완료':'미완료')+(state.route?'<br>전날 보고: '+reports[state.route].short:'')+(l?'<br>상호작용: '+l.name:'')}
function mapName(){return state.map==='pass'?'남쪽 고갯길':state.map==='north'?'북쪽 산길':'무너울골'}
function refreshSide(){dom.phaseText.textContent='1장 '+state.day+'일차 / '+state.part+' / '+mapName();dom.meters.innerHTML=Object.entries(state.stats).map(([k,v])=>'<div class="meter"><span>'+k+'</span><b>'+v+'</b></div>').join('');dom.world.innerHTML=list(state.world);dom.official.innerHTML=list(state.official);dom.unofficial.innerHTML=list(state.unofficial);dom.clues.innerHTML=[...state.clues.map(v=>'<span class="pill">단서: '+esc(v)+'</span>'),...state.ritual.map(v=>'<span class="pill">의례: '+esc(v)+'</span>')].join('')||'<span class="small">아직 없음</span>';dom.history.innerHTML=list(state.history)}
function list(a){return a.map(v=>'<li>'+esc(v)+'</li>').join('')||'<li class="small">아직 없음</li>'}function esc(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function shade(hex,amt){let n=parseInt(hex.slice(1),16),r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}
refreshSide();draw();show('1장 1일차 · 아침','남쪽 고갯길. 무너울골로 가는 길목에 작은 짚신 한 짝이 떨어져 있다. 먼저 짚신을 조사한 뒤 마을로 들어간다.',[['조작 시작',close,'시작']]);
})();
</script>
