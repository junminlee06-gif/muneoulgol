<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>무너울골: 마지막 산제</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#0b0d0c;color:#eadfc9;font-family:system-ui,-apple-system,"Segoe UI",sans-serif} header{padding:12px 14px;background:#151716;border-bottom:1px solid #3a3026} h1{margin:0;font-size:22px}.sub{font-size:13px;color:#b7aa94;margin-top:3px}.wrap{max-width:1120px;margin:0 auto;padding:12px;display:grid;grid-template-columns:minmax(360px,780px) 1fr;gap:12px}.game{border:2px solid #34291f;background:#101211;box-shadow:0 12px 36px #0008}.screen{position:relative;height:min(62vh,540px);min-height:400px;overflow:hidden;background:#263526}canvas{display:block;width:100%;height:100%;image-rendering:auto}.hud{position:absolute;left:10px;top:10px;background:#111b;border:1px solid #765b3b;border-radius:9px;padding:8px 10px;font-size:12px}.dialog{min-height:178px;border-top:2px solid #3a3026;background:#151817;padding:14px}.speaker{color:#d7ad68;font-weight:800;margin-bottom:6px}.text{white-space:pre-wrap;line-height:1.5}.choices{display:grid;gap:8px;margin-top:12px}.choices button,.next{background:#2a2119;color:#eadcc2;border:1px solid #5c4932;border-radius:9px;padding:9px 11px;text-align:left;font:inherit;cursor:pointer}.choices button:hover,.next:hover{background:#3b2d20}.side{border:1px solid #302820;background:#121514;padding:12px}.side h2{font-size:16px;margin:0 0 8px;color:#d7ad68}.tag{display:inline-block;margin:2px 3px;padding:2px 7px;border:1px solid #4c3a29;border-radius:999px;background:#211b16;color:#d1bd9b;font-size:12px}.log{font-size:13px;color:#b8ad99;line-height:1.45;max-height:350px;overflow:auto;border-top:1px solid #302820;margin-top:10px;padding-top:10px}.cut{display:none;position:absolute;inset:0;background:#0008;z-index:20;align-items:end;padding:18px}.cut.on{display:flex}.cutbox{width:100%;background:#151514;border:2px solid #84653b;border-radius:12px;padding:14px;box-shadow:0 10px 35px #000}.mobile{display:none;position:absolute;right:12px;bottom:190px;z-index:10;gap:8px}.dpad{display:grid;grid-template-columns:repeat(3,42px);gap:4px}.mobile button{min-width:42px;text-align:center;background:#1b1917cc}.act{height:88px}@media(max-width:900px){.wrap{display:block;padding:8px}.side{display:none}.screen{height:calc(100vh - 250px);min-height:350px}h1{font-size:20px}.mobile{display:flex}}
</style>
</head>
<body>
<header><h1>무너울골: 마지막 산제</h1><div class="sub">WASD/방향키 이동 · Enter/Space/Z 조사 · 컷신은 ‘다음’</div></header>
<div class="wrap">
<main class="game">
<div class="screen" id="screen"><canvas id="cv" width="960" height="600"></canvas><div class="hud" id="hud"></div><div class="cut" id="cut"><div class="cutbox"><div class="speaker" id="cutTitle"></div><div class="text" id="cutText"></div><button class="next" id="cutNext">다음</button></div></div><div class="mobile"><div class="dpad"><span></span><button data-k="up">▲</button><span></span><button data-k="left">◀</button><span></span><button data-k="right">▶</button><span></span><button data-k="down">▼</button><span></span></div><button class="act" id="act">조사</button></div></div>
<div class="dialog"><div class="speaker" id="speaker">고연우</div><div class="text" id="text"></div><div class="choices" id="choices"></div></div>
</main>
<aside class="side"><h2>기록장</h2><div id="stats"></div><p><b>단서</b></p><div id="clues"></div><p><b>의례 조각</b></p><div id="rites"></div><div class="log" id="log"></div></aside>
</div>
<script>
const canvas=document.getElementById("cv"),ctx=canvas.getContext("2d"),hud=document.getElementById("hud"),speaker=document.getElementById("speaker"),text=document.getElementById("text"),choices=document.getElementById("choices"),cut=document.getElementById("cut"),cutTitle=document.getElementById("cutTitle"),cutText=document.getElementById("cutText"),cutNext=document.getElementById("cutNext");
const S={map:"pass",chapter:1,x:110,y:360,keys:{},used:{},clues:new Set(),rites:new Set(),log:[],stats:{기록:0,결:0,애도:0,신뢰:0,한:0,경계:3},act:0};
const MAPS={pass:{name:"남쪽 고갯길",w:900,h:560,bg:"#2f3c2d",exits:[{x:780,y:210,w:70,h:120,to:"village",tx:90,ty:500}],spots:[{id:"shoe",name:"피 묻은 짚신",x:420,y:320,r:42,fn:shoe}]},village:{name:"무너울골",w:1200,h:780,bg:"#32422e",exits:[{x:0,y:455,w:36,h:120,to:"pass",tx:750,ty:285},{x:560,y:0,w:140,h:40,to:"north",tx:580,ty:710}],spots:[{id:"well",name:"우물",x:565,y:390,r:64,fn:well},{id:"chief",name:"촌장집",x:320,y:315,r:78,fn:chief},{id:"shaman",name:"무당집",x:815,y:305,r:78,fn:shaman},{id:"mill",name:"방앗간",x:875,y:555,r:78,fn:mill},{id:"office",name:"관아 임시처소",x:500,y:660,r:88,fn:office}]},north:{name:"북쪽 산길",w:1160,h:780,bg:"#303c2b",exits:[{x:520,y:740,w:150,h:40,to:"village",tx:620,ty:55},{x:525,y:0,w:130,h:45,to:"forest",tx:535,ty:700}],spots:[{id:"valley",name:"물소리 골짜기",x:320,y:470,r:90,fn:valley},{id:"logging",name:"벌목터",x:740,y:460,r:95,fn:logging},{id:"altar2",name:"무너진 산제단",x:585,y:210,r:85,fn:altar2}]},forest:{name:"금지된 숲",w:1120,h:780,bg:"#263024",exits:[{x:495,y:740,w:140,h:40,to:"north",tx:580,ty:55},{x:930,y:340,w:60,h:130,to:"rock",tx:120,ty:450}],spots:[{id:"gate",name:"금지된 숲 입구",x:540,y:635,r:78,fn:gate},{id:"trap",name:"사량의 덫",x:330,y:450,r:80,fn:trap},{id:"voice",name:"아이 목소리 길",x:685,y:360,r:85,fn:voice},{id:"mark",name:"표식 나무",x:850,y:545,r:80,fn:mark},{id:"deep",name:"깊은 숲길",x:940,y:390,r:80,fn:deep}]},rock:{name:"검은등의 자리",w:1080,h:720,bg:"#252c25",exits:[{x:0,y:385,w:40,h:130,to:"forest",tx:910,ty:395},{x:875,y:80,w:110,h:120,to:"final",tx:150,ty:440}],spots:[{id:"bones",name:"뼈더미",x:360,y:490,r:80,fn:bones},{id:"fang",name:"이빨 사이의 이름",x:585,y:410,r:85,fn:fang},{id:"black",name:"검은 바위",x:780,y:300,r:115,fn:black}]},final:{name:"마지막 산제단",w:980,h:680,bg:"#282d26",exits:[{x:0,y:370,w:45,h:120,to:"rock",tx:840,ty:150}],spots:[{id:"finalaltar",name:"마지막 산제단",x:505,y:350,r:100,fn:finalaltar}]}};
function say(sp,tx,opts=[]){speaker.textContent=sp;text.textContent=tx;choices.innerHTML="";opts.forEach((o,i)=>{const b=document.createElement("button");b.textContent=(i+1)+". "+o.t;b.onclick=o.f;choices.appendChild(b)});refresh()}
function result(t){say("결과",t,[{t:"닫는다",f:()=>say("고연우","이제 움직일 수 있다.")}])}
function cutscene(t,tx,after){cut.classList.add("on");cutTitle.textContent=t;cutText.textContent=tx;cutNext.onclick=()=>{cut.classList.remove("on");after&&after()}}
function log(s){S.log.unshift(s);S.log=S.log.slice(0,40);refresh()} function clue(s){if(!S.clues.has(s)){S.clues.add(s);log("단서: "+s)}} function rite(s){if(!S.rites.has(s)){S.rites.add(s);log("의례: "+s)}} function stat(k,v){S.stats[k]=(S.stats[k]||0)+v;refresh()} function has(s){return S.clues.has(s)||S.rites.has(s)} function once(id,fn){if(S.used[id])return result("이미 이곳에서 판단을 끝냈다.");S.used[id]=1;fn()} function spend(){S.act++}
function shoe(){once("shoe",()=>cutscene("고갯길의 짚신","작은 짚신 한 짝이 길 한가운데 놓여 있다. 피는 적고, 발자국은 산 쪽으로 향한다.",()=>say("해루","범이 물었다면 발자국이 산에서 내려와야 하지 않습니까?",[{t:"짚신을 확인한다",f:()=>{clue("피 묻은 짚신");stat("기록",1);result("아이의 짚신이다. 도망친 흔적보다 스스로 걸어간 흔적에 가깝다.")}},{t:"금줄 조각을 챙긴다",f:()=>{clue("끊긴 금줄 조각");stat("결",1);result("나뭇가지에 걸린 금줄 조각이 바람 없이 흔들렸다.")}}]))) }
function well(){once("well",()=>{spend();cutscene("우물가 소란","아이들의 노래가 멎는다. 우물 안이 잠깐 검게 가라앉는다.",()=>say("월선","그 짚신은… 도리 것이 아닙니다.",[{t:"도리의 이름을 확인한다",f:()=>{clue("도리의 이름");stat("애도",1);result("월선은 끝내 도리의 이름을 인정했다.")}},{t:"산제 노래를 묻는다",f:()=>{rite("노래");result("검은 등 넘어 / 물소리 따라 / 이름은 두고 / 발만 간다.")}}]))})}
function chief(){once("chief",()=>{spend();say("을파","산제는 올해만 미룬 겁니다. 살아 있는 아이들 입에 곡식을 넣어야 했습니다.",[{t:"장부를 확인한다",f:()=>{clue("산제 비용 장부");rite("제물 순서");stat("기록",1);result("산제 비용은 세 해 전부터 끊겼다. 그 곡식은 세금과 겨울 식량으로 돌았다.")}},{t:"금지된 숲 벌목을 묻는다",f:()=>{clue("벌목 허가 기록");stat("경계",-1);result("을파는 살기 위해 벤 것이라 했다. 틀린 말은 아니었다.")}}])})}
function shaman(){once("shaman",()=>{spend();say("막례","관아 사람이 올 줄은 알았다. 산은 기록을 못 하니까.",[{t:"산제가 무엇인지 묻는다",f:()=>{rite("제문");stat("결",1);result("산제는 산군에게 비는 일이 아니라, 산이 마을로 내려오지 않게 문을 닫는 일이었다.")}},{t:"창귀를 보내는 법을 묻는다",f:()=>{clue("창귀 천도 조건");stat("애도",1);result("이름이 있어야 한다. 길도 있어야 한다. 그런데 지금은 길이 틀어졌다.")}}])})}
function mill(){once("mill",()=>{spend();cutscene("방앗간","멈춘 물레 밑에서 물소리가 난다. 해루가 창끝을 낮춘다.",()=>say("방앗간","물레는 멈춰 있는데, 축축한 물 냄새가 난다.",[{t:"머리끈을 챙긴다",f:()=>{clue("도리의 머리끈");result("도리의 머리끈이 물레 축에 감겨 있었다.")}},{t:"돌확을 조사한다",f:()=>{rite("물길");result("이곳은 제물을 씻던 자리였다. 물길이 산 쪽으로 휘어 보인다.")}}]))})}
function office(){if(S.chapter===1&&S.act>=3){S.chapter=2;S.map="north";S.x=580;S.y=710;S.act=0;log("2장 시작: 끊긴 제사");return result("범이라 쓰기에는, 범은 사람의 이름을 부르지 않는다. 북쪽 산길이 열린다.")} if(S.chapter===2&&S.act>=3){S.chapter=3;S.map="forest";S.x=535;S.y=700;S.act=0;log("3장 시작: 금지된 숲");return result("산은 마을을 덮치지 않았다. 마을이 먼저 산의 문을 열었다.")} return result("아직 기록을 정리하기에는 단서가 부족하다.")}
function valley(){once("valley",()=>{spend();cutscene("물소리 골짜기","같은 나무를 두 번 지나쳤다. 물소리가 사람 말처럼 부풀어 오른다.",()=>say("해루","방금 이 나무, 지나오지 않았습니까?",[{t:"금줄 흔적을 찾는다",f:()=>{rite("금기");stat("경계",1);result("끊어진 금줄 말뚝이 물가에 박혀 있었다.")}},{t:"물소리를 따른다",f:()=>{clue("도리 목소리 단서");stat("한",1);result("물소리는 도리의 목소리와 섞여 산 안쪽으로 흘렀다.")}}]))})}
function logging(){once("logging",()=>{spend();cutscene("벌목터 소란","청년이 도끼를 들고 금지된 숲 쪽으로 간다. 그루터기 위 금줄 조각이 보인다.",()=>say("청년","마루가 아직 저 안에 있으면 데려와야지요.",[{t:"직접 따라간다",f:()=>{clue("마루의 발자국");result("발자국은 숲 안에서 사람 것과 짐승 것 사이로 바뀌어 있었다.")}},{t:"벌목을 중단시킨다",f:()=>{rite("금기");stat("경계",1);result("마을 사람들은 반발했지만, 숲 가장자리의 흔들림은 잠시 멎었다.")}}]))})}
function altar2(){once("altar2",()=>{spend();cutscene("무너진 산제단","무너진 돌제단 옆 금줄이 바닥에 젖어 붙어 있다. 어디선가 ‘문을 닫아라’라는 말이 들린다.",()=>say("산제단","제단은 서북쪽을 향해 있다.",[{t:"제단 방향을 기록한다",f:()=>{rite("장소");stat("기록",1);result("산군을 부르던 방향을 알아냈다.")}},{t:"소미의 천 조각을 챙긴다",f:()=>{clue("소미의 천 조각");result("소미는 산제단에 몰래 왔던 듯하다.")}}]))})}
function gate(){once("gate",()=>{spend();cutscene("금지된 숲 입구","끊어진 금줄이 바람 없이 흔들린다. 숲 안쪽에서 아이 웃음소리가 난다.",()=>say("숲 입구","금지된 숲은 깊지 않다. 길이 너무 많을 뿐이다.",[{t:"끊긴 금줄 조각을 맞춰 본다",f:()=>{if(!has("끊긴 금줄 조각"))return result("금줄 조각이 없다.");rite("금기");stat("경계",1);result("금줄이 맞물리자 길 하나가 잠깐 사라졌다.")}},{t:"발자국을 확인한다",f:()=>{clue("겹친 발자국");result("사람 발자국과 짐승 발자국이 같은 자리에서 겹쳤다.")}}]))})}
function trap(){once("trap",()=>{spend();cutscene("사량의 덫","덫이 화면 중앙에 보인다. 사량이 숲 뒤에서 나온다.",()=>say("사량","늦었소. 산짐승이든 산군이든, 오늘은 피를 흘릴 거요.",[{t:"덫을 치워라",f:()=>{stat("경계",1);result("사량은 이를 갈았지만 덫을 거두었다.")}},{t:"산군을 본 적 있나",f:()=>{clue("산군의 흔적");result("밤에는 산등성이가 움직였다고 했다.")}}]))})}
function voice(){once("voice",()=>{spend();cutscene("아이 목소리 길","작은 아이 실루엣이 나무 사이로 지나간다. 같은 나무가 다시 나온다.",()=>say(has("도리의 이름")?"도리":"목소리",has("도리의 이름")?"고연우 아저씨… 어머니는 왔어요?":"이쪽이에요.",[{t:"도리의 이름을 부른다",f:()=>{if(!has("도리의 이름"))return result("그 아이의 이름을 모른다.");clue("도리 창귀 확인");stat("애도",1);result("도리는 집에 가려다 사람을 산으로 부르고 있었다.")}},{t:"머리끈을 꺼낸다",f:()=>{if(!has("도리의 머리끈"))return result("꺼낼 물건이 없다.");stat("한",-1);result("아이 실루엣이 잠시 멈췄다.")}}]))})}
function mark(){once("mark",()=>{spend();say("표식 나무","껍질이 벗겨진 나무에 오래된 금기 표식이 남아 있다.",[{t:"소미의 천 조각을 대 본다",f:()=>{if(!has("소미의 천 조각"))return result("천 조각이 없다.");clue("소미의 마지막 길");result("소미는 산제단에서 이곳까지 왔다.")}},{t:"표식을 기록한다",f:()=>{rite("금기");result("금지된 숲의 경계 표식이다.")}}])})}
function deep(){if(S.chapter===3&&S.act>=3){S.chapter=4;S.map="rock";S.x=120;S.y=450;S.act=0;log("4장 시작: 검은등의 자리");return result("숲의 길 하나가 검은 바위 쪽으로만 남았다.")}result("아직 깊은 숲으로 들어가기에는 단서가 부족하다.")}
function bones(){once("bones",()=>{spend();say("뼈더미","사람 뼈도, 짐승 뼈도 있다. 산군의 악행이자 오래된 경계의 흔적이다.",[{t:"뼈를 수습한다",f:()=>{stat("애도",1);result("해루가 말없이 천을 펼쳤다.")}}])})}
function fang(){once("fang",()=>{spend();cutscene("이빨 사이의 이름","검은 그림자가 낮게 숨을 쉰다. 그 숨 사이로 아이 이름이 걸려 있다.",()=>say("검은등","아이의 이름이 내 이빨 사이에 걸렸다.",[{t:"도리의 이름을 다시 부른다",f:()=>{if(!has("도리의 이름"))return result("이름을 알지 못한다.");clue("이빨 사이의 이름");result("검은등의 턱이 잠깐 느슨해졌다.")}},{t:"검은 털을 꺼낸다",f:()=>{clue("산군 잠식");result("털 끝에 산이 아닌 어둠이 묻어 있었다.")}}]))})}
function black(){once("black",()=>{spend();say("검은 바위","바위는 호랑이 등처럼 보인다. 눈 안쪽에 검은 물결이 비친다.",[{t:"제문을 읽는다",f:()=>{if(!has("제문"))return result("제문 조각이 부족하다.");rite("산군의 이름 조각");result("검은등은 오래된 말을 기억하려 했다.")}},{t:"산군을 봉인할 자리를 본다",f:()=>{clue("봉인 자리");result("바위와 산제단 사이가 경계의 매듭이다.")}}])})}
function finalaltar(){once("finalaltar",()=>cutscene("마지막 산제","막례가 방울을 들고, 월선은 도리의 이름을 되뇐다. 을파는 장부를 접는다.",()=>say("막례","이제 이어 묶을지, 끊어 보낼지 정해야 한다.",[{t:"산제를 복원한다",f:()=>ending("산제를 복원했다. 오래된 것이 하루 더 살아남았다.")}},{t:"산군을 떠나보낸다",f:()=>ending("검은등을 깊은 산으로 보냈다. 올바른 이별에 가까운 끝이었다.")}},{t:"산군을 봉인한다",f:()=>ending("문제는 멈췄지만, 장례는 치르지 못했다.")}},{t:"기록상으로만 종결한다",f:()=>ending("관아 기록에는 범 습격 종결이라 적었다. 밤길은 계속 사람을 불렀다.")}}]))) }
function ending(t){say("엔딩",t+"\n\n고연우는 보고서 마지막 줄에 한참을 머물렀다. 기록할 수 없는 것도, 없었던 일은 아니었다.",[{t:"처음으로 돌아간다",f:()=>location.reload()}])}
function spot(){return MAPS[S.map].spots.find(p=>Math.hypot(S.x-p.x,S.y-p.y)<p.r)}
function interact(){if(cut.classList.contains("on"))return cutNext.click();const p=spot();if(p)return p.fn();result("조사할 것이 없다.")}
function resize(){const r=canvas.getBoundingClientRect(),d=window.devicePixelRatio||1;canvas.width=Math.max(640,Math.floor(r.width*d));canvas.height=Math.max(360,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)} window.addEventListener("resize",resize); setTimeout(resize,0);
function draw(){const r=canvas.getBoundingClientRect(),W=r.width,H=r.height,m=MAPS[S.map];ctx.clearRect(0,0,W,H);ctx.fillStyle=m.bg;ctx.fillRect(0,0,W,H);const cx=Math.max(0,Math.min(S.x-W/2,m.w-W)),cy=Math.max(0,Math.min(S.y-H/2,m.h-H));function R(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x-cx,y-cy,w,h);ctx.strokeStyle="#241a14";ctx.lineWidth=2;ctx.strokeRect(x-cx,y-cy,w,h)}function T(x,y){ctx.fillStyle="#2f4b31";ctx.beginPath();ctx.ellipse(x-cx,y-cy,24,22,0,0,7);ctx.fill();ctx.strokeStyle="#172216";ctx.stroke();ctx.fillStyle="#5a3b24";ctx.fillRect(x-cx-4,y-cy+14,8,25)}function Hs(x,y,type="") {ctx.fillStyle=type==="shaman"?"#74633b":"#334357";ctx.beginPath();ctx.moveTo(x-cx-58,y-cy);ctx.lineTo(x-cx,y-cy-38);ctx.lineTo(x-cx+58,y-cy);ctx.closePath();ctx.fill();ctx.stroke();R(x-48,y,96,52,type==="mill"?"#8a6f4e":"#9b7450");ctx.fillStyle="#7c2f2d";ctx.fillRect(x-cx-42,y-cy,8,55);ctx.fillRect(x-cx+34,y-cy,8,55);ctx.fillStyle="#231713";ctx.fillRect(x-cx-12,y-cy+25,24,27)}function C(x,y,c="#596575",small=false){ctx.fillStyle="#0006";ctx.beginPath();ctx.ellipse(x-cx,y-cy+5,13,6,0,0,7);ctx.fill();ctx.fillStyle="#d0a078";ctx.beginPath();ctx.ellipse(x-cx,y-cy-20,small?6:8,small?6:7,0,0,7);ctx.fill();ctx.strokeStyle="#211713";ctx.stroke();ctx.fillStyle=c;ctx.fillRect(x-cx-(small?6:8),y-cy-12,small?12:16,small?13:16);ctx.strokeRect(x-cx-(small?6:8),y-cy-12,small?12:16,small?13:16)}
for(let x=-100;x<m.w;x+=120)for(let y=-80;y<m.h;y+=100)R(x,y,105,88,"#344631"); if(S.map==="pass"){R(0,260,850,100,"#725d3c");for(let i=0;i<12;i++)T(70+i*72,140+(i%3)*34);ctx.fillStyle="#d2b98b";ctx.fillRect(420-cx,320-cy,18,10)} if(S.map==="village"){R(0,450,1180,78,"#725d3c");R(560,0,80,760,"#725d3c");Hs(320,300);Hs(815,290,"shaman");Hs(875,540,"mill");Hs(500,650);R(537,365,58,58,"#716f63");ctx.fillStyle="#263f46";ctx.beginPath();ctx.arc(566-cx,394-cy,16,0,7);ctx.fill();R(910,150,95,500,"#304d56");C(335,365,"#765042");C(820,360,"#665274");C(570,445,"#795b5b");C(625,365,"#9a7d4c",true);C(690,420,"#9a7d4c",true)} if(S.map==="north"){R(530,0,80,760,"#725d3c");R(250,440,600,80,"#725d3c");R(180,380,180,120,"#304d56");R(545,180,90,58,"#716b5e");R(700,420,90,55,"#59452e");for(let i=0;i<12;i++)T(90+i*88,90+(i%4)*120)} if(S.map==="forest"){R(500,600,90,160,"#725d3c");R(530,340,430,80,"#725d3c");for(let i=0;i<32;i++)T(45+(i*77)%1010,45+(i*131)%650);R(290,435,70,42,"#59452e");R(805,545,62,82,"#59452e")} if(S.map==="rock"){R(40,405,860,85,"#725d3c");R(710,210,190,170,"#171716");R(330,465,100,55,"#716b5e")} if(S.map==="final"){R(60,410,820,82,"#725d3c");R(450,300,105,68,"#716b5e");for(let i=0;i<12;i++)T(80+i*78,80+(i%3)*145);C(455,445,"#665274");C(535,450,"#795b5b");C(375,470,"#765042")}
C(S.x-32,S.y+14,"#5c725e");C(S.x,S.y,"#596575");const p=spot();if(p){ctx.fillStyle="#d5b46e";ctx.beginPath();ctx.arc(p.x-cx,p.y-cy-50,12,0,7);ctx.fill();ctx.strokeStyle="#20140e";ctx.stroke();ctx.fillStyle="#1b130d";ctx.font="bold 18px sans-serif";ctx.fillText("!",p.x-cx-4,p.y-cy-44)}hud.innerHTML="<b>"+m.name+"</b><br>"+S.chapter+"장 · 행동 "+S.act+"<br>"+(p?"조사: "+p.name:"이동 중")}
function refresh(){document.getElementById("stats").innerHTML=Object.entries(S.stats).map(([k,v])=>k+": "+v).join("<br>");document.getElementById("clues").innerHTML=[...S.clues].map(x=>'<span class="tag">'+x+'</span>').join("")||'<span class="tag">없음</span>';document.getElementById("rites").innerHTML=[...S.rites].map(x=>'<span class="tag">'+x+'</span>').join("")||'<span class="tag">없음</span>';document.getElementById("log").innerHTML=S.log.map(x=>"• "+x).join("<br>")}
function move(){let dx=0,dy=0;if(S.keys.ArrowLeft||S.keys.a)dx--;if(S.keys.ArrowRight||S.keys.d)dx++;if(S.keys.ArrowUp||S.keys.w)dy--;if(S.keys.ArrowDown||S.keys.s)dy++;if(dx||dy){const spd=3.1/(dx&&dy?1.414:1);S.x+=dx*spd;S.y+=dy*spd;const m=MAPS[S.map];S.x=Math.max(20,Math.min(m.w-20,S.x));S.y=Math.max(30,Math.min(m.h-10,S.y));for(const e of m.exits){if(S.x>e.x&&S.x<e.x+e.w&&S.y>e.y&&S.y<e.y+e.h){S.map=e.to;S.x=e.tx;S.y=e.ty;break}}}}
function loop(){move();draw();requestAnimationFrame(loop)}document.addEventListener("keydown",e=>{S.keys[e.key]=1;if(["Enter"," ","z","Z"].includes(e.key)){e.preventDefault();interact()}if(/^[1-9]$/.test(e.key)){const b=choices.children[+e.key-1];if(b)b.click()}});document.addEventListener("keyup",e=>S.keys[e.key]=0);document.getElementById("act")?.addEventListener("click",interact);document.querySelectorAll("[data-k]").forEach(b=>{const key={up:"ArrowUp",down:"ArrowDown",left:"ArrowLeft",right:"ArrowRight"}[b.dataset.k];b.onpointerdown=()=>S.keys[key]=1;b.onpointerup=()=>S.keys[key]=0});
say("고연우","관아의 명은 간단했다. 무너울골 실종 사건을 확인하고, 호적을 맞추고, 원인을 기록하라.\n\n그러나 고갯길에는 이미 아이의 짚신이 놓여 있었다.");refresh();resize();loop();
