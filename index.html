<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>무너울골: 마지막 산제</title>
<style>
body{margin:0;background:#0b0d0c;color:#eadfc9;font-family:system-ui,-apple-system,Segoe UI,sans-serif}header{padding:14px 16px;background:#151716;border-bottom:1px solid #3b3026}h1{margin:0;font-size:22px}.sub{font-size:13px;color:#b7aa94}.wrap{max-width:1040px;margin:auto;padding:12px;display:grid;grid-template-columns:minmax(340px,720px) 1fr;gap:12px}.game,.side{border:1px solid #34291f;background:#121514}.screen{height:min(60vh,520px);min-height:360px;position:relative;background:#2f3c2d}canvas{width:100%;height:100%;display:block}.hud{position:absolute;left:10px;top:10px;background:#111b;border:1px solid #765b3b;border-radius:8px;padding:8px;font-size:12px}.dialog{min-height:165px;border-top:1px solid #3a3026;background:#151817;padding:14px}.speaker{font-weight:800;color:#d7ad68;margin-bottom:6px}.text{white-space:pre-wrap;line-height:1.5}.choices{display:grid;gap:8px;margin-top:10px}.choices button,button{background:#2a2119;color:#eadcc2;border:1px solid #5c4932;border-radius:8px;padding:9px;text-align:left;font:inherit}.side{padding:12px}.tag{display:inline-block;margin:2px 3px;padding:2px 7px;border:1px solid #4c3a29;border-radius:999px;background:#211b16;color:#d1bd9b;font-size:12px}.cut{display:none;position:absolute;inset:0;background:#0008;align-items:end;padding:18px}.cut.on{display:flex}.cutbox{width:100%;background:#151514;border:2px solid #84653b;border-radius:12px;padding:14px}.mobile{display:none;position:absolute;right:12px;bottom:180px;gap:8px}.dpad{display:grid;grid-template-columns:repeat(3,42px);gap:4px}.mobile button{text-align:center;background:#1b1917cc}.act{height:88px}@media(max-width:900px){.wrap{display:block;padding:8px}.side{display:none}.screen{height:calc(100vh - 245px);min-height:350px}.mobile{display:flex}h1{font-size:20px}}
</style>
</head>
<body>
<header><h1>무너울골: 마지막 산제</h1><div class="sub">WASD/방향키 이동 · Enter/Space/Z 조사</div></header>
<div class="wrap"><main class="game"><div class="screen"><canvas id="cv"></canvas><div class="hud" id="hud"></div><div class="cut" id="cut"><div class="cutbox"><div class="speaker" id="cutTitle"></div><div class="text" id="cutText"></div><button id="cutNext">다음</button></div></div><div class="mobile"><div class="dpad"><span></span><button data-k="up">▲</button><span></span><button data-k="left">◀</button><span></span><button data-k="right">▶</button><span></span><button data-k="down">▼</button><span></span></div><button class="act" id="actBtn">조사</button></div></div><div class="dialog"><div class="speaker" id="speaker"></div><div class="text" id="text"></div><div class="choices" id="choices"></div></div></main><aside class="side"><b>기록장</b><div id="stats"></div><p><b>단서</b></p><div id="clues"></div><p><b>기록</b></p><div id="log"></div></aside></div>
<script>
(function(){
var cv=document.getElementById('cv'),ctx=cv.getContext('2d'),hud=document.getElementById('hud'),speaker=document.getElementById('speaker'),text=document.getElementById('text'),choices=document.getElementById('choices');
var cut=document.getElementById('cut'),cutTitle=document.getElementById('cutTitle'),cutText=document.getElementById('cutText'),cutNext=document.getElementById('cutNext');
var S={map:'pass',x:120,y:330,keys:{},used:{},clues:[],log:[],chapter:1};
var maps={
 pass:{name:'남쪽 고갯길',w:900,h:560,bg:'#2f3c2d',exits:[{x:760,y:230,w:80,h:120,to:'village',tx:100,ty:480}],spots:[{id:'shoe',name:'작은 짚신',x:420,y:320,r:55,fn:shoe}]},
 village:{name:'무너울골',w:1200,h:780,bg:'#32422e',exits:[{x:0,y:430,w:50,h:140,to:'pass',tx:730,ty:285},{x:560,y:0,w:150,h:50,to:'north',tx:580,ty:710}],spots:[{id:'well',name:'우물',x:565,y:390,r:75,fn:well},{id:'chief',name:'촌장집',x:320,y:315,r:90,fn:chief},{id:'shaman',name:'무당집',x:815,y:305,r:90,fn:shaman},{id:'office',name:'관아 임시처소',x:500,y:660,r:95,fn:office}]},
 north:{name:'북쪽 산길',w:1160,h:780,bg:'#303c2b',exits:[{x:520,y:740,w:150,h:40,to:'village',tx:620,ty:55},{x:525,y:0,w:130,h:45,to:'forest',tx:535,ty:700}],spots:[{id:'valley',name:'물소리 골짜기',x:320,y:470,r:95,fn:valley},{id:'altar',name:'무너진 산제단',x:585,y:210,r:95,fn:altar}]},
 forest:{name:'금지된 숲',w:1120,h:780,bg:'#263024',exits:[{x:495,y:740,w:140,h:40,to:'north',tx:580,ty:55}],spots:[{id:'gate',name:'금줄 입구',x:540,y:635,r:90,fn:gate},{id:'voice',name:'아이 목소리 길',x:685,y:360,r:95,fn:voice},{id:'final',name:'깊은 숲길',x:940,y:390,r:90,fn:finalScene}]}
};
function has(a){return S.clues.indexOf(a)>=0}function add(a){if(!has(a)){S.clues.push(a);S.log.unshift('단서: '+a);refresh()}}function say(sp,tx,opts){speaker.textContent=sp;text.textContent=tx;choices.innerHTML='';opts=opts||[];for(var i=0;i<opts.length;i++){(function(o,n){var b=document.createElement('button');b.textContent=(n+1)+'. '+o.t;b.onclick=o.f;choices.appendChild(b)})(opts[i],i)}refresh()}function result(t){say('결과',t,[{t:'닫는다',f:function(){say('고연우','이제 움직일 수 있다.')}}])}function scene(t,tx,after){cut.className='cut on';cutTitle.textContent=t;cutText.textContent=tx;cutNext.onclick=function(){cut.className='cut';if(after)after()}}function once(id,fn){if(S.used[id]){result('이미 확인한 곳이다.');return}S.used[id]=true;fn()}
function shoe(){once('shoe',function(){scene('고갯길의 짚신','작은 짚신 한 짝이 길 한가운데 놓여 있다.',function(){say('해루','산 쪽으로 이어진 흔적이 있습니다.',[{t:'짚신을 챙긴다',f:function(){add('작은 짚신');result('아이의 물건으로 보인다.')}},{t:'금줄 조각을 본다',f:function(){add('끊긴 금줄 조각');result('나뭇가지에 낡은 금줄 조각이 걸려 있다.')}}])})})}
function well(){once('well',function(){scene('우물가','아이들의 노래가 멎는다.',function(){say('월선','도리 이야기는 묻지 말아 주세요.',[{t:'도리의 이름을 확인한다',f:function(){add('도리의 이름');result('아이의 이름은 도리였다.')}},{t:'노래를 묻는다',f:function(){add('산제 노래');result('아이들이 산제 노래를 놀이처럼 불렀다.')}}])})})}
function chief(){once('chief',function(){say('을파','산제는 올해만 미룬 겁니다.',[{t:'장부를 확인한다',f:function(){add('산제 장부');result('산제는 세 해 전부터 제대로 치러지지 않았다.')}},{t:'산길 이야기를 묻는다',f:function(){add('닫힌 산길');result('마을 사람들은 북쪽 산길을 피하고 있었다.')}}])})}
function shaman(){once('shaman',function(){say('막례','산제는 산을 부르는 일이 아니라 문을 닫는 일이다.',[{t:'제문을 배운다',f:function(){add('제문');result('막례가 오래된 제문 일부를 알려 주었다.')}},{t:'이름의 의미를 묻는다',f:function(){add('이름의 의례');result('길 잃은 것을 보내려면 이름이 필요하다.')}}])})}
function office(){if(has('도리의 이름')&&has('제문')){S.chapter=2;S.map='north';S.x=580;S.y=710;result('북쪽 산길이 열린다.');return}result('도리의 이름과 제문이 필요하다.')}
function valley(){once('valley',function(){scene('물소리 골짜기','같은 나무를 두 번 지나친다.',function(){say('해루','길이 접힌 것 같습니다.',[{t:'물소리를 따른다',f:function(){add('물소리 길');result('물소리가 숲 안쪽으로 이어진다.')}},{t:'금줄 흔적을 찾는다',f:function(){add('금줄 말뚝');result('물가에 오래된 말뚝이 있다.')}}])})})}
function altar(){once('altar',function(){scene('무너진 산제단','돌제단 옆 금줄이 바닥에 붙어 있다.',function(){say('산제단','제단은 서북쪽을 향해 있다.',[{t:'방향을 기록한다',f:function(){add('제단 방향');result('산군을 부르던 방향을 알아냈다.')}},{t:'제문을 맞춰 본다',f:function(){if(!has('제문')){result('제문이 없다.');return}add('맞춰진 제문');result('말의 순서가 조금 돌아왔다.')}}])})})}
function gate(){once('gate',function(){scene('금지된 숲 입구','끊어진 금줄이 흔들린다.',function(){say('숲 입구','길이 너무 많다.',[{t:'금줄 조각을 맞춘다',f:function(){if(!has('끊긴 금줄 조각')){result('금줄 조각이 없다.');return}add('맞물린 금줄');result('길 하나가 잠깐 사라진다.')}},{t:'안쪽으로 들어간다',f:function(){add('숲의 길');result('숲은 깊지 않다. 길이 많을 뿐이다.')}}])})})}
function voice(){once('voice',function(){scene('아이 목소리 길','작은 목소리가 나무 사이에서 들린다.',function(){say(has('도리의 이름')?'도리':'목소리',has('도리의 이름')?'어머니는 왔어요?':'이쪽이에요.',[{t:'도리의 이름을 부른다',f:function(){if(!has('도리의 이름')){result('이름을 모른다.');return}add('도리의 목소리');result('목소리가 잠시 멈춘다.')}},{t:'산제 노래를 부른다',f:function(){if(!has('산제 노래')){result('노래를 모른다.');return}add('돌아온 노래');result('숲길이 조금 밝아진다.')}}])})})}
function finalScene(){if(has('도리의 목소리')&&has('맞춰진 제문')){scene('마지막 산제','막례가 방울을 들고, 고연우는 이름을 기록한다.',function(){say('엔딩','무너울골의 산길은 완전히 닫히지 않았다. 다만 오늘 밤, 누군가는 집으로 돌아갈 수 있었다.',[{t:'처음으로',f:function(){location.reload()}}])});return}result('도리의 목소리와 맞춰진 제문이 필요하다.')}
function spot(){var a=maps[S.map].spots;for(var i=0;i<a.length;i++){var p=a[i],dx=S.x-p.x,dy=S.y-p.y;if(Math.sqrt(dx*dx+dy*dy)<p.r)return p}return null}function interact(){if(cut.className.indexOf('on')>=0){cutNext.click();return}var p=spot();if(p){p.fn();return}result('조사할 것이 없다.')}
function resize(){var r=cv.getBoundingClientRect(),d=window.devicePixelRatio||1;cv.width=Math.max(640,Math.floor(r.width*d));cv.height=Math.max(360,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}
function draw(){var r=cv.getBoundingClientRect(),W=r.width,H=r.height,m=maps[S.map];ctx.fillStyle=m.bg;ctx.fillRect(0,0,W,H);var cx=Math.max(0,Math.min(S.x-W/2,m.w-W)),cy=Math.max(0,Math.min(S.y-H/2,m.h-H));function R(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x-cx,y-cy,w,h);ctx.strokeStyle='#241a14';ctx.strokeRect(x-cx,y-cy,w,h)}function T(x,y){ctx.fillStyle='#2f4b31';ctx.beginPath();ctx.ellipse(x-cx,y-cy,24,22,0,0,7);ctx.fill();ctx.strokeStyle='#172216';ctx.stroke();ctx.fillStyle='#5a3b24';ctx.fillRect(x-cx-4,y-cy+14,8,25)}function H(x,y,c){ctx.fillStyle=c||'#334357';ctx.beginPath();ctx.moveTo(x-cx-58,y-cy);ctx.lineTo(x-cx,y-cy-38);ctx.lineTo(x-cx+58,y-cy);ctx.closePath();ctx.fill();ctx.stroke();R(x-48,y,96,52,'#9b7450');ctx.fillStyle='#231713';ctx.fillRect(x-cx-12,y-cy+25,24,27)}function C(x,y,c){ctx.fillStyle='#0006';ctx.beginPath();ctx.ellipse(x-cx,y-cy+5,13,6,0,0,7);ctx.fill();ctx.fillStyle='#d0a078';ctx.beginPath();ctx.ellipse(x-cx,y-cy-20,8,7,0,0,7);ctx.fill();ctx.stroke();ctx.fillStyle=c||'#596575';ctx.fillRect(x-cx-8,y-cy-12,16,16);ctx.strokeRect(x-cx-8,y-cy-12,16,16)}for(var gx=-100;gx<m.w;gx+=120){for(var gy=-80;gy<m.h;gy+=100)R(gx,gy,105,88,'#344631')}if(S.map==='pass'){R(0,260,850,100,'#725d3c');for(var i=0;i<12;i++)T(70+i*72,140+(i%3)*34);R(420,320,18,10,'#d2b98b')}if(S.map==='village'){R(0,450,1180,78,'#725d3c');R(560,0,80,760,'#725d3c');H(320,300);H(815,290,'#74633b');H(500,650);R(537,365,58,58,'#716f63');R(910,150,95,500,'#304d56');C(570,445,'#795b5b')}if(S.map==='north'){R(530,0,80,760,'#725d3c');R(250,440,600,80,'#725d3c');R(180,380,180,120,'#304d56');R(545,180,90,58,'#716b5e');for(var j=0;j<12;j++)T(90+j*88,90+(j%4)*120)}if(S.map==='forest'){R(500,600,90,160,'#725d3c');R(530,340,430,80,'#725d3c');for(var k=0;k<28;k++)T(45+(k*77)%1010,45+(k*131)%650)}C(S.x-32,S.y+14,'#5c725e');C(S.x,S.y,'#596575');var p=spot();if(p){ctx.fillStyle='#d5b46e';ctx.beginPath();ctx.arc(p.x-cx,p.y-cy-50,12,0,7);ctx.fill();ctx.strokeStyle='#20140e';ctx.stroke();ctx.fillStyle='#1b130d';ctx.font='bold 18px sans-serif';ctx.fillText('!',p.x-cx-4,p.y-cy-44)}hud.innerHTML='<b>'+m.name+'</b><br>'+S.chapter+'장<br>'+(p?'조사: '+p.name:'이동 중')}
function refresh(){document.getElementById('stats').innerHTML='현재 장: '+S.chapter;document.getElementById('clues').innerHTML=S.clues.length?S.clues.map(function(x){return '<span class="tag">'+x+'</span>'}).join(''):'<span class="tag">없음</span>';document.getElementById('log').innerHTML=S.log.map(function(x){return '• '+x}).join('<br>')}
function move(){var dx=0,dy=0;if(S.keys.ArrowLeft||S.keys.a)dx--;if(S.keys.ArrowRight||S.keys.d)dx++;if(S.keys.ArrowUp||S.keys.w)dy--;if(S.keys.ArrowDown||S.keys.s)dy++;if(dx||dy){var spd=3/(dx&&dy?1.414:1);S.x+=dx*spd;S.y+=dy*spd;var m=maps[S.map];S.x=Math.max(20,Math.min(m.w-20,S.x));S.y=Math.max(30,Math.min(m.h-10,S.y));for(var i=0;i<m.exits.length;i++){var e=m.exits[i];if(S.x>e.x&&S.x<e.x+e.w&&S.y>e.y&&S.y<e.y+e.h){S.map=e.to;S.x=e.tx;S.y=e.ty;break}}}}
function loop(){move();draw();requestAnimationFrame(loop)}
window.onerror=function(msg){speaker.textContent='오류';text.textContent='실행 오류: '+msg;return false};window.addEventListener('resize',resize);document.addEventListener('keydown',function(e){S.keys[e.key]=true;if(e.key==='Enter'||e.key===' '||e.key==='z'||e.key==='Z'){e.preventDefault();interact()}if(/^[1-9]$/.test(e.key)){var b=choices.children[Number(e.key)-1];if(b)b.click()}});document.addEventListener('keyup',function(e){S.keys[e.key]=false});document.getElementById('actBtn').onclick=interact;var btns=document.querySelectorAll('[data-k]');for(var bi=0;bi<btns.length;bi++){btns[bi].onpointerdown=function(){S.keys[{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}[this.getAttribute('data-k')]]=true};btns[bi].onpointerup=function(){S.keys[{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}[this.getAttribute('data-k')]]=false}}
say('고연우','관아의 명은 간단했다. 무너울골 실종 사건을 확인하고, 호적을 맞추고, 원인을 기록하라.\n\n그러나 고갯길에는 이미 작은 짚신이 놓여 있었다.');resize();refresh();loop();
})();
</script>
</body>
</html>
