{display:grid;gap:8px;margin-top:12px}.choices button,button{background:#2a2119;color:#eadcc2;border:1px solid #5c4932;border-radius:8px;padding:9px 11px;text-align:left;font:inherit;cursor:pointer}.choices button:hover,button:hover{background:#3a2c20}.side{border:1px solid #302820;background:#121514;padding:12px}.tag{display:inline-block;margin:2px 3px;padding:2px 7px;border:1px solid #4c3a29;border-radius:999px;background:#211b16;color:#d1bd9b;font-size:12px}.log{font-size:13px;color:#b8ad99;line-height:1.45;max-height:430px;overflow:auto;border-top:1px solid #302820;margin-top:10px;padding-top:10px}.cut{position:absolute;inset:0;z-index:60;background:#0008;display:none;align-items:end;padding:22px}.cut.on{display:flex}.cutbox{width:100%;background:#151514;border:2px solid #84653b;border-radius:12px;padding:14px}.actor{position:absolute;width:50px;height:70px;background:#c79d72;border:3px solid #211713;border-radius:46% 44% 36% 36%;filter:drop-shadow(7px 8px 0 #0008);animation:step 1s infinite alternate}.actor:before{content:"";position:absolute;left:12px;top:5px;width:20px;height:16px;background:#2a211e;border-radius:50%}.actor:after{content:"";position:absolute;left:11px;top:23px;width:23px;height:30px;background:#546270;border:2px solid #211713}.actor.s{background:#151313;opacity:.8}.actor.c{width:34px;height:48px}.actor.m:after{background:#665274}.actor.e:after{background:#765042}.actor.w:after{background:#795b5b}@keyframes step{to{transform:translateY(-5px)}}.night .map{filter:brightness(.88) saturate(.9)}.night .map:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 52% 55%,transparent 0 210px,#0005 330px,#0009 100%);z-index:19;pointer-events:none}@media(max-width:900px){.wrap{display:block;padding:8px}.side{display:none}.map{height:calc(100vh - 245px);min-height:350px}h1{font-size:20px}}</style></head><body><header><h1>무너울골: 마지막 산제</h1><div class="sub">WASD/방향키 이동 · Enter/Space/Z 조사 · 컷신은 ‘다음’</div></header><div class="wrap"><main class="game"><div class="map" id="map"><div class="hud" id="hud"></div><div class="cut" id="cut"><div id="actors"></div><div class="cutbox"><div class="speaker" id="ct"></div><div class="text" id="cx"></div><button id="next">다음</button></div></div></div><div class="dialog"><div class="speaker" id="sp">고연우</div><div class="text" id="tx"></div><div class="choices" id="ch"></div></div></main><aside class="side"><b>기록장</b><div id="stat"></div><p><b>단서</b></p><div id="clues"></div><p><b>의례 조각</b></p><div id="rites"></div><div class="log" id="log"></div></aside></div><script>const $=id=>document.getElementById(id),M=$('map'),hud=$('hud'),sp=$('sp'),tx=$('tx'),ch=$('ch'),cut=$('cut'),ct=$('ct'),cx=$('cx'),actors=$('actors'),next=$('next');const S={map:'pass',chapter:1,phase:'ch1',x:90,y:330,keys:{},used:{},clues:new Set(),rites:new Set(),log:[],stats:{기록:0,결:0,애도:0,신뢰:0,한:0,경계:3},act:0};const data={pass:{w:900,h:560,ex:[{x:760,y:185,w:80,h:170,to:'village',tx:85,ty:465}],loc:[{id:'shoe',n:'피 묻은 짚신',x:392,y:280,w:70,h:60,fn:shoe}]},village:{w:1200,h:760,ex:[{x:0,y:420,w:35,h:120,to:'pass',tx:730,ty:280},{x:560,y:0,w:130,h:40,to:'north',tx:565,ty:690}],loc:[{id:'well',n:'마을 우물',x:505,y:320,w:100,h:95,fn:well},{id:'chief',n:'촌장집',x:250,y:230,w:150,h:120,fn:chief},{id:'shaman',n:'무당집',x:745,y:220,w:150,h:120,fn:shaman},{id:'mill',n:'방앗간',x:805,y:470,w:150,h:120,fn:mill},{id:'office',n:'관아 임시처소',x:420,y:585,w:170,h:125,fn:office}]},north:{w:1160,h:780,ex:[{x:520,y:740,w:140,h:40,to:'village',tx:620,ty:60},{x:520,y:0,w:130,h:45,to:'forest',tx:530,ty:690}],loc:[{id:'valley',n:'물소리 골짜기',x:250,y:390,w:150,h:130,fn:valley},{id:'logging',n:'벌목터',x:680,y:380,w:175,h:130,fn:logging},{id:'altar2',n:'무너진 산제단',x:510,y:155,w:150,h:120,fn:altar2}]},forest:{w:1120,h:780,ex:[{x:495,y:740,w:140,h:40,to:'north',tx:560,ty:60},{x:910,y:310,w:60,h:160,to:'rock',tx:110,ty:440}],loc:[{id:'gate',n:'금지된 숲 입구',x:455,y:600,w:170,h:90,fn:gate},{id:'trap',n:'사량의 덫',x:255,y:390,w:150,h:100,fn:trap},{id:
