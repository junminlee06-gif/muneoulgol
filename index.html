<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>마지막 산제 - 1장~5장 원형 · 종이 질감판</title>
<style>
:root{
  --bg:#070908;--panel:#101515;--panel2:#151b1b;--line:#2b3434;--text:#ded4c1;
  --muted:#958c7e;--accent:#b7925d;--good:#6d8766;--bad:#9b5955;--blue:#647b85;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 50% 0%,#151a19,#080b0b 62%,#030404 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
.wrap{max-width:1220px;margin:0 auto;padding:18px;display:grid;grid-template-columns:720px 1fr;gap:16px}
header{grid-column:1/-1;display:flex;justify-content:space-between;gap:12px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:10px}
h1{margin:0;font-size:24px;letter-spacing:-.03em}.sub{font-size:13px;color:var(--muted)}
.gamebox{position:relative;background:#030506;border:1px solid var(--line);box-shadow:0 8px 28px rgba(0,0,0,.48),inset 0 0 0 2px rgba(255,255,255,.025)}
.gamebox:after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.010) 50%,rgba(0,0,0,.052) 50%);background-size:100% 4px;mix-blend-mode:soft-light}
canvas{display:block;width:720px;height:480px;image-rendering:pixelated;background:#0b1110;filter:saturate(.96) brightness(1.02) contrast(1.03)}
.hud{position:absolute;left:10px;top:10px;min-width:315px;background:rgba(12,16,18,.84);border:1px solid rgba(255,255,255,.16);padding:8px 10px;font-size:13px;z-index:2}.hud b{color:var(--accent)}
.hint{position:absolute;right:10px;top:10px;background:rgba(12,16,18,.80);border:1px solid rgba(255,255,255,.16);padding:8px 10px;font-size:12px;color:var(--muted);text-align:right;z-index:2}
.toast{position:absolute;left:50%;top:54px;transform:translateX(-50%);display:none;background:#15191e;border:1px solid var(--accent);color:#f7e8c9;padding:8px 12px;font-size:13px;z-index:6;max-width:640px;text-align:center}
.dialog{position:absolute;left:16px;right:16px;bottom:16px;display:none;background:rgba(18,22,28,.98);border:2px solid #4d5867;box-shadow:0 8px 26px rgba(0,0,0,.55);padding:14px;z-index:5}.speaker{font-weight:800;color:var(--accent);margin-bottom:6px}.text{white-space:pre-wrap;font-size:15px;margin-bottom:10px}.options{display:grid;gap:7px}
button{font-family:inherit;color:var(--text);background:#283141;border:1px solid #5b6778;padding:8px 10px;text-align:left;cursor:pointer;font-size:14px}button:hover,button:focus{background:#364154;outline:1px solid var(--accent)}button.primary{background:#44382a;border-color:#85673b}.selected{outline:2px solid var(--accent)!important;background:#3e3429!important}
aside{display:flex;flex-direction:column;gap:12px}.card{background:var(--panel);border:1px solid var(--line);padding:12px}.card h2{font-size:16px;margin:0 0 8px;color:var(--accent)}.small{font-size:12px;color:var(--muted)}ul{margin:6px 0 0 18px;padding:0}li{margin:3px 0;font-size:13px}.meters{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px}.meter{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:3px}.pill{display:inline-block;border:1px solid var(--line);padding:2px 6px;margin:2px 2px 0 0;font-size:12px;color:var(--muted)}
.report{display:none;position:absolute;inset:0;background:rgba(8,10,14,.97);padding:20px;overflow:auto;z-index:7}.report h2{margin-top:0;color:var(--accent)}.reportGroup{margin:14px 0;padding:12px;border:1px solid var(--line);background:#171b22}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}.footerBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
@media(max-width:980px){.wrap{grid-template-columns:1fr}.gamebox canvas{width:100%;height:auto}.hint{display:none}}

/* Paper-cut visual pass */
body{background:#0b0907;background-image:radial-gradient(circle at 50% 0%,#2a2118,#100d0a 60%,#050403 100%)}
.gamebox{background:#1a130d;border-color:#3f3327;box-shadow:0 10px 34px rgba(0,0,0,.56),inset 0 0 0 3px rgba(230,205,160,.06)}
.gamebox:before{content:"";position:absolute;inset:0;pointer-events:none;z-index:3;opacity:.13;background-image:linear-gradient(90deg,rgba(255,244,205,.14) 0 1px,transparent 1px 19px),radial-gradient(circle,rgba(255,235,185,.19) 0 1px,transparent 1px);background-size:19px 100%,23px 23px;mix-blend-mode:screen}
canvas{background:#22170f;filter:saturate(.94) contrast(1.07)}
.dialog,.report{background:rgba(31,25,20,.97);border-color:#5b4a38;box-shadow:0 8px 0 rgba(0,0,0,.28),0 18px 34px rgba(0,0,0,.55)}
button{background:#35291f;border-color:#6e5a40}button:hover,button:focus{background:#493728}.card,.hud,.hint{background:rgba(28,23,18,.86);border-color:#4a3b2c}


.cutscene{position:absolute;inset:0;display:none;z-index:6;pointer-events:auto;overflow:hidden;background:rgba(10,7,5,.28)}
.cutscene:before{content:"";position:absolute;inset:-8%;background:radial-gradient(circle at var(--cx,50%) var(--cy,52%),rgba(245,218,160,.18) 0 7%,rgba(35,24,15,.15) 26%,rgba(4,3,2,.72) 78%);filter:blur(.2px)}
.cutscene:after{content:"";position:absolute;left:0;right:0;top:0;bottom:0;background:linear-gradient(transparent 0 72%,rgba(0,0,0,.58) 72% 100%),linear-gradient(rgba(255,244,210,.035),rgba(0,0,0,.055));mix-blend-mode:multiply}
.cutpiece{position:absolute;border:2px solid #1b120b;background:#c7aa72;box-shadow:6px 8px 0 rgba(0,0,0,.28);transform:rotate(-3deg);opacity:.95}
.cutpiece.dark{background:#1e211b;border-color:#0b0a08;box-shadow:5px 6px 0 rgba(0,0,0,.45)}
.cutpiece.red{background:#7e3934}.cutpiece.blue{background:#334e5c}.cutpiece.rope{height:3px;background:#d1bf7c;border-width:0;box-shadow:none;transform:rotate(2deg)}
.cutcaption{position:absolute;left:24px;right:24px;bottom:24px;z-index:2;border:2px solid #5b4a38;background:rgba(31,25,20,.96);padding:13px 15px;box-shadow:0 8px 0 rgba(0,0,0,.30),0 18px 34px rgba(0,0,0,.55)}
.cuttitle{font-weight:800;color:#d3ad70;margin-bottom:4px}.cuttext{white-space:pre-wrap;color:#eee0c8;font-size:15px;line-height:1.55}
.cutskip{position:absolute;right:16px;top:14px;z-index:2;color:#c4b18e;font-size:12px;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.18);padding:4px 8px}

.cutNext{position:absolute;right:24px;bottom:24px;z-index:4;min-width:86px;text-align:center;background:#6b4e2f;border:2px solid #c39b62;color:#fff0d0;font-weight:800;box-shadow:0 5px 0 rgba(0,0,0,.35);animation:nextPulse 1.4s ease-in-out infinite}
.cutNext:hover,.cutNext:focus{background:#805f39;outline:2px solid #ead09c}
@keyframes nextPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.cutactor{position:absolute;z-index:2;width:30px;height:42px;left:0;top:0;filter:drop-shadow(4px 6px 0 rgba(0,0,0,.34));animation:actorMove 1.35s ease-out forwards;animation-delay:var(--delay,0s);opacity:0;transform:translate(var(--sx),var(--sy)) scale(var(--scale,1))}
.cutactor:before{content:"";position:absolute;left:7px;top:2px;width:16px;height:14px;border:2px solid #1c120b;background:#d0a870;border-radius:8px 8px 6px 6px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.12)}
.cutactor:after{content:"";position:absolute;left:5px;top:16px;width:20px;height:20px;border:2px solid #1c120b;background:#445c63;border-radius:5px 5px 4px 4px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.18)}
.cutactor .leg{position:absolute;top:35px;width:7px;height:8px;background:#28201a;border:2px solid #1c120b}.cutactor .l1{left:6px}.cutactor .l2{right:6px}
.cutactor .arm{position:absolute;top:19px;width:6px;height:13px;background:#d0a870;border:2px solid #1c120b}.cutactor .a1{left:0;transform:rotate(13deg)}.cutactor .a2{right:0;transform:rotate(-13deg)}
.cutactor.player:after{background:#3f5965}.cutactor.haeru:after{background:#53625e}.cutactor.chief:after{background:#7a4d3a}.cutactor.shaman:after{background:#393331}.cutactor.wolseon:after{background:#6d4a58}.cutactor.hunter:after{background:#463424}.cutactor.child{--scale:.78}.cutactor.child:after{background:#5e6f80}.cutactor.shadow:before{background:#151716;border-color:#090807}.cutactor.shadow:after{background:#101211;border-color:#090807}.cutactor .hair{position:absolute;left:5px;top:0;width:20px;height:8px;background:#211712;border:2px solid #1c120b;border-radius:9px 9px 3px 3px;z-index:1}.cutactor.child .hair{background:#33221a}
@keyframes actorMove{0%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(var(--scale,1))}18%{opacity:1}72%{opacity:1;transform:translate(var(--ex),var(--ey)) scale(var(--scale,1))}100%{opacity:1;transform:translate(var(--ex),var(--ey)) scale(var(--scale,1))}}
.cutpiece{animation:paperJolt 1.2s ease-out both}.cutpiece:nth-of-type(odd){animation-delay:.08s}.cutpiece:nth-of-type(even){animation-delay:.18s}
@keyframes paperJolt{0%{opacity:0;transform:translateY(8px) rotate(-6deg)}50%{opacity:1}100%{opacity:.95}}

</style>
</head>
<body>
<div class="wrap">
<header>
  <div><h1>마지막 산제: 1장~5장 원형</h1><div class="sub">종이 오려붙이기풍 · 고구려 변경 취락 색감 · 마지막 산제 완결판</div></div>
  <div class="sub">이동: WASD/방향키 · 상호작용: Enter/Space/Z · 대화: 클릭/숫자키</div>
</header>
<section class="gamebox">
  <canvas id="game" width="1440" height="960"></canvas>
  <div class="hud" id="hud"></div><div class="hint" id="hint"></div><div class="toast" id="toast"></div>
  <div class="cutscene" id="cutscene"><div class="cutskip">컷신 진행</div><button class="cutNext" id="cutNext">다음</button><div class="cutcaption"><div class="cuttitle" id="cutTitle"></div><div class="cuttext" id="cutText"></div></div></div>
  <div class="dialog" id="dialog"><div class="speaker" id="speaker"></div><div class="text" id="dialogText"></div><div class="options" id="options"></div></div>
  <div class="report" id="reportPanel"><h2 id="reportTitle">보고서 작성</h2><p class="small" id="reportIntro">관아에 올릴 수 있는 말만 선택합니다. 실제로 본 것과 반드시 같을 필요는 없습니다.</p><div id="reportGroups"></div><div class="footerBtns"><button id="finishReport" class="primary">보고서 제출</button></div></div>
</section>
<aside>
  <div class="card"><h2>진행 상태</h2><div id="phaseText" class="small"></div><div class="meters" id="meters"></div></div>
  <div class="card"><h2>공식 기록</h2><ul id="official"></ul></div>
  <div class="card"><h2>비공식 기록</h2><ul id="unofficial"></ul></div>
  <div class="card"><h2>단서 / 의례 조각</h2><div id="cluePills"></div></div>
</aside>
</div>
<script>
(() => {
'use strict';
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

ctx.setTransform(SCALE,0,0,SCALE,0,0);ctx.imageSmoothingEnabled=false;
const byId=id=>document.getElementById(id);
const dom={hud:byId('hud'),hint:byId('hint'),toast:byId('toast'),cutscene:byId('cutscene'),cutTitle:byId('cutTitle'),cutText:byId('cutText'),cutNext:byId('cutNext'),dialog:byId('dialog'),speaker:byId('speaker'),text:byId('dialogText'),options:byId('options'),reportPanel:byId('reportPanel'),reportTitle:byId('reportTitle'),reportIntro:byId('reportIntro'),reportGroups:byId('reportGroups'),finishReport:byId('finishReport'),meters:byId('meters'),official:byId('official'),unofficial:byId('unofficial'),cluePills:byId('cluePills'),phaseText:byId('phaseText')};
const pal={grass:'#5e7354',grass2:'#4c6248',path:'#967f5d',path2:'#77654e',water:'#516f77',water2:'#314d58',hill:'#415541',hill2:'#2b3a30',roof:'#2f4f5e',roof2:'#1c3340',wall:'#907f65',wood:'#5a4030',beam:'#6a3d36',stone:'#797970',shrine:'#6e5645',blood:'#774142'};
const state={chapter:1,map:'pass',phase:'pass',time:'낮',dialogOpen:false,locked:false,dayInvestigations:0,maxDayInvestigations:3,ch2DayActions:0,maxCh2DayActions:4,nightActionDone:false,visited:{},chapterVisited:{},flags:{shoe:false,enteredVillage:false,ch1Report:false,ch2Started:false,ch2Conflict:false,ch2Crisis:false,ch2Report:false},player:{x:22,y:21.5,rx:22,ry:21.5,dir:'up',moving:false},stats:{기록:0,조사:0,결이해:0,애도:0,마을신뢰:0,을파신뢰:0,막례신뢰:0,해루공포:0,한:1,경계:3},official:[],unofficial:[],clues:[],ritual:[],report:{cause:null,measure:null,missing:null}};


const cutsceneSeen=new Set();
const cutscenes={
  wellCommotion:{title:'우물가 소란',text:'아이들의 노래가 한 박자 늦어진다.\n우물 안쪽이 검게 가라앉고, 월선이 고개를 든다.\n\n“도리가… 같이 불렀어요.”',cx:'48%',cy:'44%',pieces:[['blue',332,178,38,34],['dark',350,210,22,28],['rope',285,224,155,3],['red',262,238,22,12]]},
  ch2Conflict:{title:'을파와 막례',text:'우물가 사람들이 둘러선다.\n을파는 장부를 쥐고, 막례는 끊어진 금줄을 든다.\n둘의 말 사이에서 마을이 둘로 갈라진다.',cx:'46%',cy:'51%',pieces:[['red',270,190,36,42],['dark',405,186,34,46],['rope',300,238,146,3]]},
  ch2CrisisPrompt:{title:'벌목터 소란',text:'도끼를 든 청년이 북쪽 길로 오른다.\n그루터기 위 금줄 조각이 뒤늦게 흔들린다.\n숲 안쪽에서 마른 나무가 꺾이는 소리가 난다.',cx:'32%',cy:'48%',pieces:[['dark',176,172,120,20],['red',215,145,11,58],['rope',170,214,122,3]]},
  valley:{title:'물소리 골짜기',text:'낮인데도 물소리가 너무 크다.\n해루가 뒤돌아본다. 방금 지나온 나무가 다시 앞에 서 있다.\n\n“방금 이 나무, 지나오지 않았습니까?”',cx:'53%',cy:'42%',pieces:[['blue',340,165,126,14],['blue',300,215,144,10],['dark',384,178,24,46]]},
  lumber:{title:'금기를 벤 자리',text:'그루터기마다 오래된 금줄 자국이 남아 있다.\n베어진 나무 단면은 밝은데, 도끼 주변 흙만 어둡다.',cx:'28%',cy:'52%',pieces:[['dark',162,230,132,19],['red',208,180,10,56],['rope',150,218,148,3]]},
  shrine:{title:'무너진 산제단',text:'제단의 돌이 산 쪽이 아니라 서북쪽을 향해 있다.\n피를 담던 홈에 먼지가 고여 있다.\n어딘가에서 낮은 소리가 난다.\n\n“문을 닫아라.”',cx:'50%',cy:'32%',pieces:[['dark',318,142,128,24],['red',352,96,12,76],['red',398,96,12,76],['rope',300,135,165,3]]},
  nightMill:{title:'방앗간의 밤',text:'멈춰 있던 물레가 한 번, 천천히 돈다.\n물소리가 사람 숨처럼 커진다.\n\n“집에 가려 했는데…”',cx:'77%',cy:'62%',pieces:[['blue',476,235,38,38],['dark',500,214,44,22],['rope',455,280,90,3]]},
  nightWell:{title:'우물의 밤',text:'우물 속에서 이름이 한 박자 늦게 돌아온다.\n월선의 목소리와 아이의 목소리가 겹친다.',cx:'51%',cy:'42%',pieces:[['blue',332,178,34,34],['dark',346,196,28,18],['rope',307,218,90,3]]},
  nightShaman:{title:'무당집의 밤',text:'막례가 금줄을 맨다.\n종이 부적이 바람 없이 흔들리고, 방울은 소리 없이 떤다.',cx:'34%',cy:'32%',pieces:[['dark',245,122,70,36],['rope',225,170,120,3],['red',270,160,15,18]]},
  ch2NightWell:{title:'우물의 밤',text:'월선이 도리의 이름을 부른다.\n물 밑에서 같은 이름이, 조금 더 어린 목소리로 되돌아온다.',cx:'51%',cy:'42%',pieces:[['blue',332,178,34,34],['dark',346,196,28,18],['rope',307,218,90,3]]},
  ch2NightMill:{title:'방앗간 돌확',text:'물레는 멈춰 있다. 그런데 물소리만 계속 난다.\n돌확 위로 검은 털 하나가 떠오른다.',cx:'77%',cy:'62%',pieces:[['blue',476,235,38,38],['dark',500,214,44,22],['rope',455,280,90,3]]},

  ch3Voice:{title:'아이 목소리 길',text:'아이 그림자가 나무 사이를 지나간다.\n따라가려 하자 같은 나무가 다시 앞에 선다.\n목소리는 가까운데 발자국은 점점 작아진다.',cx:'50%',cy:'42%',pieces:[['dark',348,160,18,38],['blue',318,204,110,9],['rope',310,228,128,3]]},

};
function actorDataForCutscene(id){

 villageEntry:{speaker:'안내',text:'무너울골에 도착했다. 낮 동안 조사할 수 있는 곳은 세 곳뿐이다.\n\n우물, 촌장집, 무당집, 방앗간 중 어디를 먼저 볼지 직접 움직여 정한다.',options:[['마을 조사 시작',closeDialog]]},
 chief:{speaker:'을파',text:'“먼 길 오셨습니다. 범 짓일 가능성이 큽니다. 산길을 닫고 피해 기록만 올리면 될 일입니다.”\n\n촌장집 안에는 호적 초안, 세금 장부, 벌목 기록이 가지런히 놓여 있다.',options:[['실종자 이름부터 확인한다',()=>{consumeDay('chief');addOfficial('실종자 셋');addClue('실종자 명단');stat('기록',1);showScene('dayResult','을파는 이름을 말하며 잠시 멈춘다. 아이의 이름을 말할 때만 목소리가 작아진다. “도리입니다.”')}],['범 습격으로 보기엔 흔적이 이상하다고 말한다',()=>{consumeDay('chief');addUnofficial('산제 언급 전 촌장이 먼저 범 습격을 단정');stat('조사',1);stat('을파신뢰',-1);showScene('dayResult','을파의 손이 장부 위에서 굳는다. “산에서는 원래 이상한 흔적이 남습니다.”')}],['산제 이야기를 꺼낸다',()=>{consumeDay('chief');addClue('산제 3년 유예');addUnofficial('산제는 3년째 중단됨');stat('결이해',1);stat('을파신뢰',-1);showScene('dayResult','“올해만 미룬 겁니다.” 을파는 그렇게 말했지만, 장부의 빈칸은 세 해째 이어져 있다.')}],['장부를 조용히 베낀다',()=>{consumeDay('chief');addClue('벌목량 장부');addUnofficial('산제 비용 기록 옆에 금지된 숲 벌목량');stat('조사',1);stat('을파신뢰',1);showScene('dayResult','을파는 협조적이다. 그러나 장부에는 산제 비용이 끊긴 자리 옆으로 벌목량이 늘어난 기록이 이어진다.')}]]},
 well:{speaker:'우물가',text:'우물가에 주민들이 모여 있다. 월선은 조용히 앉아 있다. 당신이 짚신을 꺼내자 그녀는 고개를 돌린다.\n\n“그건 도리 것이 아닙니다.”',options:[['월선에게 아이 이름을 묻는다',()=>{consumeDay('well');addOfficial('아이 이름: 도리');addClue('도리의 이름');stat('애도',1);showScene('dayResult','월선은 끝내 이름을 말한다. “도리입니다. 하지만 아직 죽었다고 하지 마세요.”')}],['아이들에게 마지막 노래를 묻는다',()=>{consumeDay('well');addRitual('우물가 산제 노래');addClue('도리가 산제 노래를 앎');stat('결이해',1);showScene('dayResult','아이 하나가 낮게 부른다. “검은 등 넘어 / 물소리 따라 / 이름은 두고 / 발만 간다.”')}],['우물 안을 들여다본다',()=>{consumeDay('well');addClue('우물 밑 나무패');addUnofficial('우물 밑에 이름패 같은 물건');stat('조사',1);showScene('dayResult','물 밑에서 작은 나무패가 보인다. 손은 닿지 않는다. 물결은 바람도 없이 한쪽으로만 흐른다.')}],['주민들의 소문을 듣는다',()=>{consumeDay('well');addClue('무당 탓, 범 탓, 촌장 탓으로 갈린 여론');stat('마을신뢰',1);showScene('dayResult','누구는 무당을 탓하고, 누구는 촌장을 탓한다. 이상하게도 아이 이름을 직접 입에 올리는 사람은 드물다.')}]]},
 shaman:{speaker:'막례',text:'“관아 사람이 올 줄은 알았다. 산은 기록을 못 하니까.”\n\n무당집에는 찢어진 제문, 낡은 방울, 쓰지 않는 무복이 놓여 있다.',options:[['증거 없이 믿을 수 없다고 말한다',()=>{consumeDay('shaman');addOfficial('무당 진술: 산길 이상 주장');stat('기록',1);stat('막례신뢰',-1);showScene('dayResult','막례는 웃지도 화내지도 않는다. “그래서 관아 사람을 부른 게지. 믿지 말고 보라고.”')}],['산제가 무엇인지 묻는다',()=>{consumeDay('shaman');addRitual('찢어진 제문 일부');addClue('검은등이라는 산군 별칭');stat('결이해',1);stat('막례신뢰',1);showScene('dayResult','막례는 제문 절반만 기억한다. “검은등이라 불렀지. 하지만 그건 이름이 아니다. 별명이지.”')}],['아이를 찾을 방법을 묻는다',()=>{consumeDay('shaman');addUnofficial('아이 이름을 함부로 부르면 안 된다는 경고');stat('애도',1);stat('막례신뢰',1);showScene('dayResult','“길을 잃은 아이는 부르면 온다. 문제는, 그 아이가 오는 길이 집길인지 산길인지 모른다는 거다.”')}],['마을을 선동하지 말라고 경고한다',()=>{consumeDay('shaman');addOfficial('무당 감시 필요 가능성');stat('을파신뢰',1);stat('막례신뢰',-2);showScene('dayResult','막례는 방울을 뒤집어 엎는다. “나는 선동할 힘도 없다. 남은 건 잊어가는 말뿐이다.”')}]]},
 mill:{speaker:'방앗간',text:'낮의 방앗간은 평범하다. 물레 소리, 곡식 냄새, 젖은 나무 냄새. 그러나 물레 옆에 아이의 머리끈이 걸려 있다.',options:[['머리끈을 확인한다',()=>{consumeDay('mill');addClue('도리의 머리끈');addOfficial('도리가 방앗간을 지나간 정황');stat('조사',1);showScene('dayResult','해루가 침을 삼킨다. “아이가 여기까지 혼자 온 겁니까? 아니면 누가 데려온 겁니까?”')}],['젖은 발자국을 따라본다',()=>{consumeDay('mill');addClue('우물에서 방앗간으로 이어진 젖은 발자국');stat('조사',1);showScene('dayResult','발자국은 우물에서 방앗간으로, 다시 물소리 골짜기 쪽으로 이어지다 흐려진다.')}],['짐승 털을 줍는다',()=>{consumeDay('mill');addClue('검은 털');addUnofficial('방앗간에서 짐승 털 발견');stat('조사',1);showScene('dayResult','털은 거칠고 검다. 해루가 낮게 말한다. “범 털 같긴 한데, 물에 오래 담긴 냄새가 납니다.”')}],['돌확을 조사한다',()=>{consumeDay('mill');addRitual('제물 씻던 돌확');stat('결이해',1);showScene('dayResult','곡식을 씻던 돌확 밑에 오래된 피 자국이 남아 있다. 막례가 말한 제물 씻는 자리일지도 모른다.')}]]},
 dayResult:{speaker:'기록',text:'단서를 정리했다. 남은 낮 조사 횟수를 확인하고 다음 장소로 이동한다.',options:[['계속 조사한다',closeDialog]]},
 wellCommotion:{speaker:'우물가',text:'우물가에서 아이 하나가 산제 노래를 부르다 갑자기 멈춘다.\n\n“도리가 같이 불렀어요.”\n\n주민들이 아이를 급히 데려가고, 월선은 우물가에 주저앉는다.',options:[['아이에게 더 묻는다',()=>{addClue('도리 목소리 목격담');stat('조사',1);stat('마을신뢰',-1);showScene('goOfficeCh1')}],['월선을 진정시킨다',()=>{stat('애도',1);stat('한',-1);showScene('goOfficeCh1')}],['을파 말대로 소문을 막는다',()=>{stat('을파신뢰',1);stat('한',1);showScene('goOfficeCh1')}],['막례를 부른다',()=>{stat('막례신뢰',1);stat('결이해',1);showScene('goOfficeCh1')}]]},
 goOfficeCh1:{speaker:'해루',text:'해가 기울었다. 관아 임시처소에서 오늘 본 것을 정리해야 한다.\n\n마을 남쪽의 관아 임시처소로 이동해 상호작용하면 밤으로 넘어간다.',options:[['관아로 돌아간다',()=>{state.phase='ch1_day';state.flags.dayComplete=true;state.map='village';setPlayerPos(23,24.6);closeDialog()}]]},
 officeCh1Ready:{speaker:'관아 임시처소',text:'기록장 위에 공식 기록과 비공식 기록이 나뉘어 쌓인다.\n\n해루가 묻는다. “이런 건 공식 기록에 못 쓰겠지요?”',options:[['기록을 정리하고 밤을 맞는다',()=>{state.phase='ch1_night';state.time='밤';state.nightActionDone=false;setPlayerPos(23,25.2);showScene('nightStart')}],['아직 밖을 더 본다',closeDialog]]},
 nightStart:{speaker:'해루',text:'밤. 관아 임시처소 밖으로 방앗간 물레 소리가 들린다.\n\n“저 시간에 방앗간을 돌릴 리가 없지요.”\n\n밖으로 나가 직접 확인할 수 있다. 밤 행동은 한 번뿐이다.',options:[['밖으로 나간다',()=>{setPlayerPos(23,25.2);closeDialog()}],['무시하고 잠을 청한다',()=>{nightDone();addOfficial('야간 이상 없음으로 처리');stat('해루공포',1);showScene('dawnCall','밤새 물레 소리가 끊기지 않았다. 새벽이 되자 산 쪽에서 아이 목소리가 섞인 울음이 들린다.')}]]},
 nightMill:{speaker:'방앗간의 밤',text:'물레가 혼자 돈다. 물소리가 커지고, 그 사이로 아이 목소리가 들린다.\n\n“집에 가려 했는데, 길이 자꾸 산으로 갔어요.”',options:[['도리의 이름을 부른다',()=>{nightDone();addUnofficial('밤 방앗간에서 도리의 목소리 확인');stat('애도',1);showScene('dawnCall','물레가 한 번 멈춘다. 어둠 속에서 작은 발소리가 물소리 골짜기 쪽으로 멀어진다.')}],['누가 데려갔느냐고 묻는다',()=>{nightDone();addClue('물가에서 끊긴 큰 발자국');stat('조사',1);stat('해루공포',1);showScene('dawnCall','대답 대신 물레 밑에 젖은 발자국이 번진다. 사람 것과 짐승 것이 겹쳐 있다.')}],['목소리를 따라간다',()=>{nightDone();addClue('물소리 골짜기 입구');stat('결이해',1);stat('해루공포',1);showScene('dawnCall','당신은 골짜기 입구까지 갔다가 같은 방앗간 앞으로 돌아온다. 해루가 말한다. “분명 앞으로 걸었습니다.”')}]]},
 nightWell:{speaker:'우물의 밤',text:'우물 안에서 작은 목소리가 울린다.\n\n“산길이 물속에 있어요.”\n\n물 밑의 나무패가 낮보다 가까워 보인다.',options:[['나무패를 꺼내려 한다',()=>{nightDone();addClue('젖은 이름패');addUnofficial('우물 속에서 도리 이름패 회수');stat('조사',1);showScene('dawnCall','손끝이 닿는 순간 물은 얼음처럼 차가워진다. 나무패에는 흐린 글자가 남아 있다.')}],['도리의 이름을 부른다',()=>{nightDone();stat('애도',1);stat('한',-1);addUnofficial('도리 이름에 우물이 반응');showScene('dawnCall','우물 속에서 누군가 숨을 삼킨다. 그리고 멀리 산에서 같은 이름이 되돌아온다.')}]]},
 nightShaman:{speaker:'막례',text:'막례는 잠들지 않았다. 방울을 손에 쥔 채 문 앞에 앉아 있다.\n\n“들었느냐. 물레 소리 말고, 그 안에 섞인 숨을.”',options:[['창귀라는 말인가 묻는다',()=>{nightDone();addUnofficial('막례: 창귀 가능성 언급');stat('결이해',1);showScene('dawnCall','“산에 먹힌 것이 다 죽은 것은 아니고, 죽은 것이 다 떠난 것도 아니다.”')}],['보낼 방법을 묻는다',()=>{nightDone();addRitual('천도 조건: 이름과 길');stat('막례신뢰',1);showScene('dawnCall','“이름이 있어야 한다. 길도 있어야 한다. 그런데 지금은 길이 틀어졌다.”')}]]},
 dawnCall:{speaker:'새벽',text:'산 쪽에서 호랑이 울음이 들린다. 그런데 울음 끝에 아이 목소리가 섞인다.\n\n“어머니.”\n\n월선이 산으로 뛰쳐나가려 한다.',options:[['월선을 막는다',()=>{stat('애도',1);showScene('report1Intro')}],['월선에게 진실 일부를 말한다',()=>{stat('애도',1);stat('한',-1);addUnofficial('월선에게 도리 사망 가능성 일부 고지');showScene('report1Intro')}],['막례에게 맡긴다',()=>{stat('막례신뢰',1);showScene('report1Intro')}]]},
 report1Intro:{speaker:'중간 보고',text:'1장 마지막 기록을 작성한다.\n\n범이라 쓰면 일이 끝난다. 그러나 범은 사람의 이름을 부르지 않는다.',options:[['보고서 작성',()=>openReport(1)]]},
 ch2Start:{speaker:'2장: 끊긴 제사',text:'새벽 뒤의 낮. 해루가 묻는다.\n\n“어젯밤 일을 기록에 올리실 겁니까?”\n\n마을 북쪽의 물소리 골짜기, 벌목터, 무너진 산제단이 개방되었다. 2장 낮 조사는 4회다.',options:[['“아직 기록할 말이 없다.”',()=>{stat('조사',1);closeDialog()}],['“범은 아니라고만 적는다.”',()=>{stat('기록',1);addOfficial('범 습격 단정 보류');closeDialog()}],['“기록하지 않는다. 먼저 확인한다.”',()=>{stat('결이해',1);closeDialog()}]]},
 chief2:{speaker:'촌장집',text:'을파는 장부를 닫지 않는다. 오히려 보라는 듯 펼쳐 둔다.\n\n세금 납부량, 군역 명단, 흉년 기록, 산제 비용 유예. 산제를 끊은 해와 모두 겹친다.',options:[['산제를 끊은 이유를 이해한다고 말한다',()=>{consumeDay('chief');stat('을파신뢰',1);addClue('세금·군역·흉년과 산제 중단의 겹침');showScene('ch2DayResult','을파는 처음으로 숨을 길게 내쉰다. “산에 바칠 곡식이 있으면, 살아 있는 아이들 입에 넣어야지요.”')}],['그래도 금지된 숲을 벤 건 잘못이라고 말한다',()=>{consumeDay('chief');stat('결이해',1);stat('을파신뢰',-1);addUnofficial('금지된 숲 벌목과 산제 중단의 연결');showScene('ch2DayResult','을파의 표정이 닫힌다. “나무를 베지 않으면 겨울을 못 넘깁니다.”')}],['장부를 관아 기록에 넣겠다',()=>{consumeDay('chief');stat('기록',1);stat('마을신뢰',-1);addOfficial('산제 비용 유예 및 벌목량 증가');showScene('ch2DayResult','장부는 기록이 된다. 그러나 장부에 적히지 않은 굶주림은 그대로 남는다.')}],['마루의 작업 기록을 본다',()=>{consumeDay('chief');addClue('마루: 금지된 숲 표식 나무 벌목 담당');stat('조사',1);showScene('ch2DayResult','마루라는 이름이 벌목 명단 위에 있다. 마지막 작업 위치는 금지된 숲 가장자리다.')}]]},
 shaman2:{speaker:'막례',text:'막례는 산제 절차를 더듬어 말한다.\n\n“먼저 물을 올리고, 그다음 피를 씻고…… 아니, 피를 씻은 뒤에 물을 올렸던가.”\n\n그녀의 기억은 완전하지 않다.',options:[['기억나는 대로 모두 말해 달라',()=>{consumeDay('shaman');addRitual('제문 일부');stat('막례신뢰',1);showScene('ch2DayResult','막례는 산제의 목적을 겨우 붙잡는다. “산군에게 빌던 게 아니다. 산이 마을로 내려오지 말라고 문을 닫던 것이다.”')}],['틀린 기억이면 더 위험하지 않나',()=>{consumeDay('shaman');stat('기록',1);stat('막례신뢰',-1);showScene('ch2DayResult','막례는 말문이 막힌다. 그녀가 마지막 기억이라는 사실이 오히려 위험이 된다.')}],['장부와 대조해 보겠다',()=>{consumeDay('shaman');addRitual('의례 조합: 장부 대조 필요');stat('조사',1);showScene('ch2DayResult','제물 순서 일부는 장부와 맞춰야 한다. 막례의 기억만으로는 부족하다.')}],['창귀를 보내는 법부터 묻는다',()=>{consumeDay('shaman');addRitual('창귀 천도 조건: 이름·길·유족의 부름');stat('결이해',1);showScene('ch2DayResult','“이름이 있어야 한다. 길도 있어야 한다. 마지막으로, 산 자가 붙잡던 손을 놓아야 한다.”')}]]},
 well2:{speaker:'우물',text:'우물가가 조용하다. 아이들은 놀지 않는다. 월선은 도리의 이름을 낮게 반복한다.\n\n“이름을 잊으면 그 애가 정말 없어질 것 같아서요.”',options:[['계속 불러도 된다고 말한다',()=>{consumeDay('well');stat('애도',1);stat('한',-1);showScene('ch2DayResult','월선의 목소리는 떨리지만 끊기지 않는다. 이름은 아직 우물 밑으로 가라앉지 않았다.')}],['밤에는 이름을 부르지 말라 한다',()=>{consumeDay('well');stat('기록',1);stat('한',1);showScene('ch2DayResult','월선은 고개를 끄덕이지만, 입술은 계속 아이의 이름 모양을 만든다.')}],['도리가 부른 노래를 묻는다',()=>{consumeDay('well');addRitual('노래 조각: 검은 등 넘어 / 물소리 따라');stat('결이해',1);showScene('ch2DayResult','월선은 가락은 모른다. 대신 도리가 마지막 며칠 동안 그 노래를 자꾸 흥얼거렸다고 말한다.')}],['짚신이 도리 것이 맞느냐고 묻는다',()=>{consumeDay('well');addClue('짚신은 도리의 것');stat('애도',1);showScene('ch2DayResult','월선은 결국 고개를 끄덕인다. “맞습니다. 그래도 그 애가 죽었다고는 말하지 마세요.”')}]]},
 mill2:{speaker:'방앗간',text:'물레는 멈춰 있지만 축축하다. 밤새 돌아간 것처럼 나무가 물을 먹었다. 돌확에는 오래전 제물을 씻던 흔적이 남아 있다.',options:[['머리끈을 월선에게 가져간다',()=>{consumeDay('mill');stat('애도',1);stat('한',-1);addClue('월선에게 도리 머리끈 전달');showScene('ch2DayResult','월선은 머리끈을 쥔 채 아무 말도 하지 않는다. 한참 뒤, “이제 이름은 제가 부르겠습니다”라고 말한다.')}],['검은 털을 보관한다',()=>{consumeDay('mill');addClue('젖은 검은 털');stat('조사',1);showScene('ch2DayResult','털에서는 물 냄새와 짐승 냄새가 함께 난다. 산군의 흔적일지도 모른다.')}],['돌확을 조사한다',()=>{consumeDay('mill');addRitual('제물 씻는 절차');stat('결이해',1);showScene('ch2DayResult','돌확의 홈은 물이 산 쪽으로 빠지도록 파여 있다. 제물은 바치는 것보다 씻겨 보내는 것에 가까웠다.')}],['물길을 따라가 본다',()=>{consumeDay('mill');addClue('물길이 골짜기와 이어짐');stat('조사',1);showScene('ch2DayResult','방앗간 물길은 자연스럽게 흐르는 듯 보이지만, 눈을 떼면 산 쪽으로 방향을 바꾼 것처럼 보인다.')}]]},
 valley:{speaker:'물소리 골짜기',text:'낮인데도 물소리가 너무 크다. 같은 길을 걸었는데 다시 입구로 돌아온다.\n\n해루가 말한다. “방금 이 나무, 지나오지 않았습니까?”',options:[['물소리를 따른다',()=>{consumeDay('valley');addClue('물소리 속 도리 목소리');stat('한',1);showScene('ch2DayResult','물소리 속에 아이 목소리가 섞인다. “이쪽이면 집에 갈 수 있어요.” 그러나 길은 다시 입구다.')}],['발자국을 따른다',()=>{consumeDay('valley');addClue('마루의 발자국');stat('조사',1);showScene('ch2DayResult','청년의 발자국이 골짜기에서 끊긴다. 그 옆에는 도끼를 끌고 간 자국이 있다.')}],['금줄 흔적을 찾는다',()=>{consumeDay('valley');addRitual('금기 조각: 물길을 넘지 말 것');stat('결이해',1);showScene('ch2DayResult','금줄 말뚝이 썩어 넘어져 있다. 금기는 길을 막는 미신이 아니라, 넘어서는 안 될 경계 표시였다.')}],['가만히 서서 소리가 멎길 기다린다',()=>{consumeDay('valley');stat('결이해',1);stat('경계',1);showScene('ch2DayResult','움직이지 않자 물소리가 한 겹 줄어든다. 길이 틀어진 곳에서는 따라가는 것보다 멈추는 것이 안전할 때가 있다.')}]]},
 lumber:{speaker:'벌목터',text:'금지된 숲의 일부가 베어져 있다. 나무 더미는 세금, 땔감, 군역 장비로 쓰일 것이다. 탐욕이 아니라 생존의 흔적이다.',options:[['벌목을 즉시 중단시킨다',()=>{consumeDay('lumber');stat('결이해',1);stat('경계',1);stat('마을신뢰',-1);addOfficial('벌목 중단 명령');showScene('ch2DayResult','사람들은 반발한다. 산이 무서운 것보다 겨울이 더 무섭다는 얼굴이다.')}],['을파에게 먼저 확인한다',()=>{consumeDay('lumber');stat('을파신뢰',1);addClue('벌목은 세금·겨울 땔감 목적');showScene('ch2DayResult','을파의 말은 변명만은 아니다. 그러나 베인 나무 밑에서 오래된 금줄 말뚝이 드러난다.')}],['도끼와 털을 증거로 확보한다',()=>{consumeDay('lumber');stat('기록',1);addClue('마루의 도끼와 검은 털');showScene('ch2DayResult','도끼 손잡이에 마루의 표식이 있다. 날에는 나무진과 검은 털이 함께 묻어 있다.')}],['마루의 흔적을 따라간다',()=>{consumeDay('lumber');stat('조사',1);addClue('마루가 표식 나무를 베려 한 정황');showScene('ch2DayResult','마루는 가장 바깥 나무가 아니라, 금줄이 묶였던 표식 나무로 향했다. 실수였는지, 누가 시켰는지는 아직 모른다.')}]]},
 shrine:{speaker:'무너진 산제단',text:'돌제단은 반쯤 무너져 있다. 금줄 말뚝은 썩었고, 오래된 호랑이 발톱 자국이 돌에 남아 있다.',options:[['제단 방향을 기록한다',()=>{consumeDay('shrine');addRitual('의례 장소: 서북쪽 제단 방향');stat('기록',1);showScene('ch2DayResult','제단은 마을이 아니라 산과 물길 사이를 향한다. 무언가를 부르는 자리보다 문을 닫는 자리에 가깝다.')}],['소미의 천 조각을 챙긴다',()=>{consumeDay('shrine');addClue('소미의 천 조각');stat('애도',1);showScene('ch2DayResult','소미는 도리를 찾겠다고 몰래 제단에 왔던 듯하다. 산제를 믿은 사람도 산에 먹혔다.')}],['호랑이 발톱 자국을 조사한다',()=>{consumeDay('shrine');addClue('오래된 산군 발톱 자국');stat('조사',1);showScene('ch2DayResult','발톱 자국은 오래됐다. 최근의 습격 흔적이 아니라, 옛 약속의 표식처럼 같은 자리에 반복되어 있다.')}],['제단에 물을 올려 본다',()=>{consumeDay('shrine');addRitual('물 올림 절차');stat('막례신뢰',1);stat('경계',1);showScene('ch2DayResult','물은 돌 홈을 따라 조용히 빠진다. 잠깐, 물소리가 멎는다.')}]]},
 ch2DayResult:{speaker:'조사 기록',text:'2장 단서를 정리했다. 북쪽 장소와 마을 장소를 오가며 남은 낮 조사를 진행한다.',options:[['계속 조사한다',closeDialog]]},
 ch2Conflict:{speaker:'우물가 충돌',text:'을파가 막례에게 말한다.\n\n“더는 사람들 겁주지 마십시오. 제사를 끊어서 사람이 죽었다면, 그전에는 왜 죽었습니까?”\n\n막례가 대답한다.\n\n“그전에는 길을 알고 죽었다. 지금은 죽은 것도 산 것도 길을 모른다.”',options:[['을파 편을 든다',()=>{stat('을파신뢰',1);stat('막례신뢰',-1);showScene('ch2DayResult','마을 사람들은 안도하지만, 막례는 더 말하지 않는다.')}],['막례 편을 든다',()=>{stat('막례신뢰',1);stat('을파신뢰',-1);showScene('ch2DayResult','젊은 주민들의 표정이 굳는다. 그들에게 산제는 곡식과 나무를 빼앗는 이름이다.')}],['둘 다 멈추게 한다',()=>{stat('마을신뢰',1);showScene('ch2DayResult','갈등은 멈췄지만 해결되지 않았다. 양쪽 모두 당신을 완전히 믿지는 않는다.')}],['아무 말도 하지 않고 듣는다',()=>{addUnofficial('을파와 막례의 핵심 대립 확인');stat('조사',1);showScene('ch2DayResult','둘의 말은 모두 틀리지 않다. 그래서 더 위험하다.')}]]},
 ch2CrisisPrompt:{speaker:'벌목터 소란',text:'낮 조사가 끝나갈 무렵, 마루의 친구가 벌목터로 가겠다고 나선다.\n\n“마루가 아직 산에 있으면 데려와야지요. 산제니 뭐니 하다가 사람만 놓치고 있습니다.”\n\n관아 임시처소에서 기록을 정리하면 밤으로 넘어간다.',options:[['관아로 돌아가 정리한다',()=>{state.map='village';setPlayerPos(23,24.6);closeDialog()}]]},
 officeCh2Ready:{speaker:'관아 임시처소',text:'2장의 낮 조사를 정리한다. 실종자는 도리만이 아니다. 마루, 소미, 그리고 산과 마을 사이의 경계도 사라지고 있다.\n\n밤이 되기 전, 마루의 친구 문제를 처리해야 한다.',options:[['직접 따라간다',()=>{addClue('마루의 친구 추적 준비');stat('조사',1);afterCh2Crisis()}],['사량에게 부탁한다',()=>{addClue('사량 조기 협조');stat('경계',-1);showScene('saryangIntro','벌목터 근처에서 사량이 덫을 손본다. “관아 사람은 발자국을 보고, 무당은 노래를 듣지. 나는 피가 어디로 끌렸는지 본다.”')}],['을파에게 막게 한다',()=>{stat('을파신뢰',1);addOfficial('청년들의 임의 산행 금지');afterCh2Crisis()}],['막례에게 금줄을 치게 한다',()=>{stat('막례신뢰',1);stat('경계',1);addRitual('임시 금줄');afterCh2Crisis()}]]},
 saryangIntro:{speaker:'사량',text:'“관아 사람은 발자국을 보고, 무당은 노래를 듣지. 나는 피가 어디로 끌렸는지 본다.”\n\n그는 산군을 죽일 생각이다.',options:[['덫을 치워라',()=>{stat('경계',1);stat('마을신뢰',-1);afterCh2Crisis()}],['산군을 본 적 있나',()=>{addClue('사량: 검은등 목격담');stat('조사',1);afterCh2Crisis()}],['실종자를 찾는 데 도와라',()=>{addClue('사량 동행 가능성');stat('마을신뢰',1);afterCh2Crisis()}],['네가 사람을 죽인 건 아니냐',()=>{stat('마을신뢰',-1);addUnofficial('사량 적대');afterCh2Crisis()}]]},
 ch2NightStart:{speaker:'2장 밤',text:'밤이 내려온다. 오늘은 우물, 방앗간, 무당집뿐 아니라 북쪽 산제단까지 갈 수 있다.\n\n밤 행동은 한 번뿐이다.',options:[['밖으로 나간다',closeDialog],['그냥 잔다',()=>{nightDone();stat('해루공포',-1);stat('한',1);showScene('ch2Dawn','아침이 되자 벌목터 근처에 피 묻은 도끼가 꽂혀 있다는 소식이 들린다. 밤을 넘겼지만, 산은 가만히 있지 않았다.')}]]},
 ch2NightWell:{speaker:'우물의 밤',text:'월선이 우물가에서 도리 이름을 부른다. 우물 안에서 같은 목소리가 따라 한다.\n\n“어머니. 그런데 어머니 목소리가 물 밑에서 나요.”',options:[['월선을 멈춘다',()=>{nightDone();stat('한',1);stat('애도',1);showScene('ch2Dawn','월선은 무너진다. 이름을 부르지 못한 밤은 더 길다.')}],['함께 이름을 부른다',()=>{nightDone();addRitual('도리 천도 조건 강화: 어머니의 이름 부름');stat('한',-1);stat('애도',1);showScene('ch2Dawn','우물 밑 목소리가 잠깐 어린아이처럼 돌아온다. 그러나 곧 물소리 속으로 멀어진다.')}],['나무패를 건진다',()=>{nightDone();addClue('도리 이름패');stat('조사',1);showScene('ch2Dawn','이름패의 글자는 젖어 흐렸지만, 도리라는 이름의 첫 글자는 남아 있다.')}]]},

function nearbyLocation(){const arr=locations[state.map]||[];const px=state.player.x,py=state.player.y;let best=null,bd=999;for(const l of arr){if(!l.phases.includes(state.phase))continue;if(l.area){if(px>=l.area.x1&&px<=l.area.x2&&py>=l.area.y1&&py<=l.area.y2)return l;continue}const d=Math.hypot(px-l.x,py-l.y);if(d<(l.radius||1.2)&&d<bd){best=l;bd=d}}return best}
const keysDown=new Set();function norm(k){if(k==='ArrowUp'||k==='w'||k==='W')return'up';if(k==='ArrowDown'||k==='s'||k==='S')return'down';if(k==='ArrowLeft'||k==='a'||k==='A')return'left';if(k==='ArrowRight'||k==='d'||k==='D')return'right';return null}

  function startChapter5(){
    state.chapter=5;
    state.flags.ch5Started=true;
    state.phase='ch5_prepare';
    state.time='해질녘';
    state.map='finalrite';
    state.ch5PrepActions=0;
    state.maxCh5PrepActions=3;
    state.nightActionDone=false;
    state.chapterVisited={};
    setPlayerPos(22,26);
    addOfficial('4장 보고서 제출 완료');
    showScene('ch5Start');
  }
  window.startChapter5=startChapter5;

  function consumeCh5(id){
    const key='ch5_'+id;
    if(state.chapterVisited[key]){toast('이미 준비한 일이다.');return false;}
    state.chapterVisited[key]=true;
    state.ch5PrepActions++;
    if(state.ch5PrepActions>=state.maxCh5PrepActions&&!state.flags.ch5Ready){
      state.flags.ch5Ready=true;
      addUnofficial('마지막 산제를 시작할 만큼의 준비가 모임');
      toast('준비가 모였다. 마지막 산제단으로 가자.');
    }
    refreshSide();
    return true;
  }
  function startCh5Ceremony(){
    state.phase='ch5_night';
    state.time='밤';
    state.nightActionDone=false;
    setPlayerPos(22,22);
    showScene('ch5CeremonyStart');
  }
  function finishCh5(ending){
    state.ch5Ending=ending;

  const oldOpenReportCh5=openReport;
  openReport=function(ch){
    if(ch===4){
      oldOpenReportCh5(ch);
      dom.finishReport.onclick=()=>{
        if(!state.report.cause||!state.report.measure||!state.report.missing){toast('모든 항목을 하나씩 선택하세요.');return}
        addOfficial('4장 보고: '+state.report.cause+' / '+state.report.measure+' / '+state.report.missing);
        dom.reportPanel.style.display='none';
        state.flags.ch4Report=true;
        startChapter5();
      };
      return;
    }

    state.report={cause:null,measure:null,missing:null};

    dom.reportTitle.textContent='최종 보고서';

      {key:'cause',title:'사건 원인',items:['범 습격 및 산길 사고','마을 의례 붕괴와 산길 혼선','실종자 원인 불명','기록 불가한 현상']},

      if(!state.report.cause||!state.report.measure||!state.report.missing){toast('모든 항목을 하나씩 선택하세요.');return}
      addOfficial('최종 보고: '+state.report.cause+' / '+state.report.measure+' / '+state.report.missing);

      state.flags.ch5Report=true;
      showScene('ch5End');

  const oldInteractCh5=interact;
  interact=function(){
    const loc=nearbyLocation();
    if(!loc)return;
    if(loc.id==='toBlackrock' && state.chapter>=4){state.map='blackrock';setPlayerPos(22,26);return}
    if(loc.id==='riteExit'){state.map='blackrock';setPlayerPos(22,20);return}
    if(state.phase==='ch5_prepare'){
      if(loc.id==='riteCenter'){
        if((state.ch5PrepActions||0)>=state.maxCh5PrepActions) startCh5Ceremony();
        else toast('제문, 이름, 금줄, 물길 중 최소 세 가지를 준비해야 한다.');
        return;
      }
      if((state.ch5PrepActions||0)>=state.maxCh5PrepActions){toast('준비는 충분하다. 마지막 산제단으로 가자.');return;}
      if(loc.id==='riteMakrye')showScene('ch5Makrye');
      else if(loc.id==='riteWolseon')showScene('ch5Wolseon');
      else if(loc.id==='riteSaryang')showScene('ch5Saryang');
      else if(loc.id==='riteRope')showScene('ch5Rope');
      else if(loc.id==='riteBasin')showScene('ch5Basin');
      else if(loc.id==='riteBlack')showScene('ch5Black');
      else oldInteractCh5();
      return;
    }
    if(state.phase==='ch5_night'){
      if(loc.id==='riteCenter'||loc.id==='riteBlack')showScene('ch5FinalChoice');
      else toast('마지막 선택은 산제단 앞에서 해야 한다.');
      return;
    }
    if(state.phase==='ch5_dawn'){
      if(loc.id==='riteCenter')openReport(5);
      else toast('새벽의 기록은 산제단 앞에서 정리한다.');
      return;
    }
    return oldInteractCh5();
  };
  window.interact=interact;

    ch5Makrye:{speaker:'막례의 제문',text:'막례는 제문을 펼치지만 숨이 짧다. 글자는 남았으나 순서가 흔들린다.',options:[['제문 조각을 당신이 대신 맞춘다',()=>{if(!consumeCh5('makrye'))return;addRitual('최종 제문 정렬');stat('결이해',1);showScene('ch5PrepResult','막례는 처음으로 당신을 제사 밖의 사람으로 보지 않는다. “이제 말은 이어졌다. 숨이 모자랄 뿐이다.”')}],['막례에게 끝까지 읽게 한다',()=>{if(!consumeCh5('makrye'))return;stat('막례신뢰',1);stat('한',1);addRitual('막례의 마지막 독송');showScene('ch5PrepResult','막례의 목소리가 갈라진다. 제문은 이어졌지만, 그녀의 몸이 그것을 감당하지 못한다.')}],['틀린 부분은 읽지 못하게 한다',()=>{if(!consumeCh5('makrye'))return;stat('기록',1);addUnofficial('제문 일부 생략');showScene('ch5PrepResult','안전하지만 빈자리가 남는다. 비어 있는 말은 밤에 다른 목소리가 채울 수 있다.')}]]},
    ch5Wolseon:{speaker:'월선과 도리의 이름',text:'월선은 도리의 머리끈을 쥔다. 이름을 부르기 전, 그녀는 먼저 죽음을 받아들여야 한다.',options:[['도리의 이름을 함께 부르게 한다',()=>{if(!consumeCh5('wolseon'))return;addRitual('도리 천도: 월선의 이름 부름');stat('애도',2);stat('한',-1);showScene('ch5PrepResult','월선의 목소리는 흔들리지만 끊기지 않는다. 우물 밑에서 되돌아오던 이름이 오늘은 제단 위에 머문다.')}],['죽었다고 말하게 한다',()=>{if(!consumeCh5('wolseon'))return;addRitual('도리 죽음 인정');stat('애도',1);stat('한',-1);showScene('ch5PrepResult','월선은 무너진다. 그러나 무너진 뒤에도 이름을 놓지 않는다.')}],['이름 부르기를 막는다',()=>{if(!consumeCh5('wolseon'))return;stat('경계',1);stat('한',1);addUnofficial('월선의 이름 부름 차단');showScene('ch5PrepResult','안전은 얻었지만, 도리의 길은 더 멀어진다.')}]]},
    ch5Saryang:{speaker:'사량의 화살',text:'사량은 산군을 쏘고 싶어 한다. 그러나 그는 도리보다 오래된 죽음, 연지의 이름에 묶여 있다.',options:[['화살을 내려놓게 한다',()=>{if(!consumeCh5('saryang'))return;addClue('사량이 화살을 거둠');stat('경계',1);stat('애도',1);showScene('ch5PrepResult','사량은 활을 놓지 못한다. 대신 시위를 풀어 둔다. 그것만으로도 오늘 밤은 달라진다.')}],['연지의 이름을 제문에 넣는다',()=>{if(!consumeCh5('saryang'))return;addRitual('연지의 이름을 함께 부름');stat('애도',2);showScene('ch5PrepResult','사량의 분노가 잠시 슬픔의 모양을 되찾는다. 그는 처음으로 산군이 아닌 아내의 이름을 부른다.')}],['덫을 마지막 방어로 남긴다',()=>{if(!consumeCh5('saryang'))return;addRitual('비상 봉인용 덫');stat('기록',1);stat('경계',-1);showScene('ch5PrepResult','덫은 안전장치가 될 수 있다. 동시에 의례를 배신하는 쇠 이빨이 될 수도 있다.')}]]},
    ch5Rope:{speaker:'끊긴 금줄',text:'금줄 조각들이 서로 맞지 않는다. 세 해 동안 끊어졌던 것을 하룻밤에 되돌릴 수는 없다.',options:[['끊긴 부분을 그대로 드러내어 맨다',()=>{if(!consumeCh5('rope'))return;addRitual('불완전한 금줄');stat('결이해',1);stat('경계',1);showScene('ch5PrepResult','끊어진 자리를 숨기지 않자, 금줄은 더 약하지만 더 정직한 경계가 된다.')}],['관아 끈으로 보강한다',()=>{if(!consumeCh5('rope'))return;addOfficial('관아 끈으로 산제단 경계 보강');stat('기록',1);stat('경계',1);showScene('ch5PrepResult','인간 질서가 오래된 의례를 받친다. 어울리지 않지만, 오늘 밤에는 필요하다.')}],['금줄 없이 진행한다',()=>{if(!consumeCh5('rope'))return;stat('경계',-2);addUnofficial('금줄 없는 산제');showScene('ch5PrepResult','가장 빠른 길이다. 그러나 경계 없이 부르는 이름은 어디로 갈지 모른다.')}]]},
    ch5Basin:{speaker:'제물 씻는 돌확',text:'방앗간 돌확의 절차와 검은 바위의 마른 물길이 이 자리에서 만난다.',options:[['돌확의 물을 제단 홈에 붓는다',()=>{if(!consumeCh5('basin'))return;addRitual('물길 연결 완료');stat('경계',1);stat('결이해',1);showScene('ch5PrepResult','물은 아래로 흐르지 않고 제단 안쪽으로 스며든다. 산길과 저승길이 잠시 갈라진다.')}],['피 흔적을 먼저 씻는다',()=>{if(!consumeCh5('basin'))return;addRitual('피 흔적 정화');stat('한',-1);showScene('ch5PrepResult','오래된 피가 다 지워지지는 않는다. 그래도 새 이름이 그 위에 덧씌워지지는 않는다.')}],['물을 쓰지 않는다',()=>{if(!consumeCh5('basin'))return;stat('기록',1);stat('결이해',-1);addUnofficial('물길 절차 생략');showScene('ch5PrepResult','의례는 짧아진다. 그만큼 길도 덜 갈라진다.')}]]},
    ch5Black:{speaker:'검은등의 그림자',text:'검은등은 아직 완전히 내려오지 않았다. 그림자만 제단 위에 걸려 있다.',options:[['그림자에게 제문 첫 구절을 들려준다',()=>{if(!consumeCh5('black'))return;addRitual('검은등에게 첫 구절 전달');stat('경계',1);showScene('ch5PrepResult','그림자가 잠깐 바위의 모양으로 돌아간다. 검은등은 아직 말을 알아듣는다.')}],['검은 물결을 막으려 금줄을 던진다',()=>{if(!consumeCh5('black'))return;addRitual('검은 물결 차단 시도');stat('경계',1);stat('한',1);showScene('ch5PrepResult','금줄은 타지 않는다. 다만 검게 젖는다. 산이 아닌 어둠은 아직 멀리 있다.')}],['아무 말도 하지 않는다',()=>{if(!consumeCh5('black'))return;stat('결이해',1);addUnofficial('검은등의 침묵을 지켜봄');showScene('ch5PrepResult','침묵 속에서 검은등의 숨과 도리의 숨이 구분된다.')}]]},
    ch5PrepResult:{speaker:'마지막 산제 준비',text:'준비 하나가 끝났다. 준비가 충분히 모이면 산제단 앞에서 마지막 밤을 시작할 수 있다.',options:[['계속 준비한다',closeDialog]]},
    ch5CeremonyStart:{speaker:'의례의 밤',text:'밤이 내려온다. 그러나 이번 밤은 전보다 덜 어둡다.\n횃불과 금줄, 창문 불빛, 이름을 부르는 목소리가 어둠을 갈라 놓는다.\n\n이제 마지막 선택만 남았다.',options:[['마지막 선택을 한다',()=>showScene('ch5FinalChoice')],['아직 제단 주위를 둘러본다',closeDialog]]},
    ch5FinalChoice:{speaker:'마지막 산제',text:'검은등은 산제단 앞에 웅크린다. 월선은 도리의 이름을 붙잡고, 막례는 마지막 숨을 고른다.\n\n무엇을 끝내고, 무엇을 하루 더 남길 것인가.',options:[['산제를 복원한다',()=>{addOfficial('산제 제한적 복원');addRitual('엔딩: 산제 복원');stat('경계',2);showScene('ch5RestoreResult')}],['산군을 떠나보낸다',()=>{addOfficial('산길 의례 종료');addRitual('엔딩: 산군 떠나보내기');stat('결이해',2);showScene('ch5FarewellResult')}],['산군을 봉인한다',()=>{addOfficial('산군 봉인 조치');addRitual('엔딩: 산군 봉인');stat('기록',2);stat('한',1);showScene('ch5SealResult')}],['막례가 자기 이름으로 길을 닫는다',()=>{addRitual('엔딩: 막례 희생');stat('막례신뢰',2);stat('한',-2);showScene('ch5SacrificeResult')}],['기록상으로만 종결한다',()=>{addOfficial('범 습격 및 산길 폐쇄로 종결');stat('기록',2);stat('한',2);showScene('ch5RecordResult')}]]},
    ch5RestoreResult:{speaker:'엔딩: 산제를 복원한다',text:'산제는 다시 선다.\n마을은 당분간 보호받지만, 금지도 함께 돌아온다.\n젊은 사람들은 불만을 품고, 막례는 제문을 다음 사람에게 넘기지 못한 채 더 늙는다.',options:[['새벽을 맞는다',()=>finishCh5('산제 복원')]]},
    ch5FarewellResult:{speaker:'엔딩: 산군을 떠나보낸다',text:'검은등은 깊은 산 쪽으로 사라진다.\n산제는 복원되지 않는다. 대신 마을은 오래된 약속이 끝났음을 배운다.\n도리의 이름은 월선의 목소리를 따라 저승길 쪽으로 한 걸음 옮겨 간다.',options:[['새벽을 맞는다',()=>finishCh5('산군 떠나보내기')]]},
    ch5SealResult:{speaker:'엔딩: 산군을 봉인한다',text:'금줄과 관아 표식이 검은 바위 위로 감긴다.\n실종은 멈춘다. 그러나 산은 숨을 참는 자리처럼 조용해진다.\n언젠가 누군가 이 봉인을 다시 열 것이다.',options:[['새벽을 맞는다',()=>finishCh5('산군 봉인')]]},
    ch5SacrificeResult:{speaker:'엔딩: 막례가 길을 닫는다',text:'막례는 제문 끝에 자기 이름을 넣는다.\n도리의 목소리는 멀어지고, 검은등은 잠깐 자기 자리를 기억한다.\n무당집의 방울은 다시 울리지 않는다.',options:[['새벽을 맞는다',()=>finishCh5('막례 희생')]]},
    ch5RecordResult:{speaker:'엔딩: 기록상 종결',text:'관아 기록에는 범 습격과 산길 폐쇄가 남는다.\n마을은 겉으로 조용해진다.\n그러나 우물 밑에서는 이름이 아직 한 박자 늦게 돌아온다.',options:[['새벽을 맞는다',()=>finishCh5('기록상 종결')]]},
    ch5Dawn:{speaker:'마지막 산제의 새벽',text:'새벽이 온다. 밝지는 않다.\n그러나 산으로 가는 길, 저승으로 가는 길, 마을로 돌아오는 길이 더는 같은 소리로 들리지 않는다.\n\n이 일을 어떻게 기록할지는 아직 남아 있다.',options:[['최종 보고서를 작성한다',()=>openReport(5)],['조금 더 제단 앞에 선다',closeDialog]]},
    ch5End:{speaker:'완결: 마지막 산제',text:'보고서는 접힌다.\n공식 기록에는 충분한 말이 없고, 비공식 기록에는 너무 많은 말이 남았다.\n\n무너울골의 밤은 끝났다.\n하지만 이 세계에서 사라지는 것들은 앞으로도 이름을 남기려 할 것이다.',options:[['원형 종료',closeDialog]]}
  });

  const oldDrawPropsCh5=drawProps;
  drawProps=function(t){
    if(state.map==='finalrite'){drawFinalRiteObjects(t);return;}
    return oldDrawPropsCh5(t);
  };
  window.drawProps=drawProps;

  const oldDrawPeopleCh5=drawPeople;
  drawPeople=function(t){
    if(state.map==='finalrite'){
      drawHuman(16,18,{name:'막례',color:'#5b596b',hair:'#d9d2b8'},t);
      drawHuman(29,18,{name:'월선',color:'#76546e',hair:'#2c1e1d'},t);
      drawHuman(12,21,{name:'사량',color:'#6d4f3f',hair:'#251915'},t);
      if(state.phase==='ch5_night'||state.phase==='ch5_dawn')drawDoriRiteShadow(t);
      drawCompanion(t);drawPlayer(t);return;
    }
    return oldDrawPeopleCh5(t);
  };
  window.drawPeople=drawPeople;

  function drawFinalRiteObjects(t){
    drawTrees([[9,7],[13,8],[33,8],[36,10],[8,22],[37,24],[11,26],[33,26],[14,14],[31,14],[13,20],[34,18],[18,6],[27,6],[7,17],[38,16]]);
    drawRocks([[12,13],[32,20],[10,18],[35,13],[17,24],[28,24],[9,11],[36,16],[19,10],[26,11]]);
    drawShrine(17,8);
    drawFinalRopes();
    drawRiteBasin(31,13,t);
    drawRiteBlackShadow(22,8,t);
    if(state.phase==='ch5_night')drawRiteTorches(t);
  }
  function drawFinalRopes(){
    ctx.strokeStyle=state.phase==='ch5_night'?'#e5ce83':'#d9c780';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(18*TILE,20*TILE);ctx.lineTo(28*TILE,20*TILE);ctx.stroke();
    ctx.beginPath();ctx.moveTo(16*TILE,16*TILE);ctx.lineTo(29*TILE,16*TILE);ctx.stroke();
    cutRect(18*TILE-2,16*TILE-4,5,28,state.phase==='ch5_night'?shade(paperPal.red,-8):paperPal.red,paperPal.ink,1,.5);
    cutRect(28*TILE-2,16*TILE-4,5,28,state.phase==='ch5_night'?shade(paperPal.red,-8):paperPal.red,paperPal.ink,1,.5);
  }
  function drawRiteBasin(x,y,t){const ox=x*TILE,oy=y*TILE;cutRect(ox-6,oy+8,34,12,state.phase==='ch5_night'?'#65615a':'#837b6e',paperPal.ink,1.2);ctx.fillStyle=rgba('#4e6f7a',state.phase==='ch5_night'?.55:.35);ctx.fillRect(ox,oy+11,22,4);ctx.fillStyle=rgba('#e8d68d',.14+Math.sin(t/500)*.05);ctx.fillRect(ox+3,oy+12,14,1)}
  function drawRiteBlackShadow(x,y,t){const ox=x*TILE,oy=y*TILE;ctx.fillStyle=rgba('#050403',state.phase==='ch5_night'?.42:.22);ctx.beginPath();ctx.ellipse(ox+8+Math.sin(t/900)*2,oy+4,62,18,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=rgba('#9e4037',state.phase==='ch5_night'?.38:.14);ctx.fillRect(ox-12,oy-2,5,3);ctx.fillRect(ox+24,oy-1,5,3)}
  function drawRiteTorches(t){[[15,17],[29,17],[18,21],[26,21]].forEach(([x,y],i)=>{const ox=x*TILE,oy=y*TILE;cutRect(ox+7,oy+4,3,16,'#5a3422',paperPal.ink,.7,.4);ctx.fillStyle=rgba('#eec36b',.62+Math.sin(t/160+i)*.12);ctx.beginPath();ctx.ellipse(ox+8,oy+2,5,7,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=rgba('#f4d884',.08);ctx.beginPath();ctx.ellipse(ox+8,oy+4,30,20,0,0,Math.PI*2);ctx.fill()})}
  function drawDoriRiteShadow(t){const x=23*TILE+Math.sin(t/700)*6,y=13*TILE+Math.sin(t/500)*2;ctx.fillStyle=rgba('#050505',.42);ctx.beginPath();ctx.ellipse(x,y+12,5,2,0,0,Math.PI*2);ctx.fill();cutPoly([[x-5,y-4],[x+5,y-4],[x+4,y+9],[x-4,y+9]],'rgba(35,33,28,.55)',paperPal.ink,1);ctx.fillStyle='rgba(235,220,164,.30)';ctx.fillRect(x-2,y-7,4,3)}

  const oldDrawAtmosphereCh5=drawAtmosphere;
  drawAtmosphere=function(t){
    const night=state.phase.includes('night');
    const dawn=state.phase.includes('dawn');
    ctx.fillStyle=night?'rgba(18,12,8,.10)':dawn?'rgba(86,66,42,.09)':'rgba(116,87,50,.07)';
    ctx.fillRect(0,0,VIEW_W,VIEW_H);
    if(night){
      const g=ctx.createRadialGradient(VIEW_W/2,VIEW_H/2,70,VIEW_W/2,VIEW_H/2,410);
      g.addColorStop(0,'rgba(255,224,150,.055)');
      g.addColorStop(.62,'rgba(20,12,8,.035)');
      g.addColorStop(1,'rgba(5,4,3,.18)');
      ctx.fillStyle=g;ctx.fillRect(0,0,VIEW_W,VIEW_H);
    }
    for(let i=0;i<60;i++){const x=(i*97+t*.004)%VIEW_W,y=(i*41+Math.sin(t/1500+i)*4)%VIEW_H;ctx.fillStyle=night?'rgba(226,205,150,.045)':'rgba(255,242,200,.035)';ctx.fillRect(Math.round(x),Math.round(y),1,1)}
    ctx.fillStyle='rgba(26,15,8,.10)';for(let x=0;x<VIEW_W;x+=29)ctx.fillRect(x,0,1,VIEW_H);
    ctx.fillStyle='rgba(238,210,160,.035)';for(let x=13;x<VIEW_W;x+=47)ctx.fillRect(x,0,1,VIEW_H);
  };
  window.drawAtmosphere=drawAtmosphere;

  const oldMapNameCh5=mapName;
  mapName=function(){return state.map==='finalrite'?'마지막 산제단':oldMapNameCh5()};window.mapName=mapName;
  const oldChapterNameCh5=chapterName;
  chapterName=function(){return state.chapter===5?'5장 마지막 산제':oldChapterNameCh5()};window.chapterName=chapterName;
  const oldPhaseTextCh5=phaseText;
  phaseText=function(){const p=state.phase;if(p==='ch5_prepare')return'5장 의례 준비';if(p==='ch5_night')return'5장 마지막 밤';if(p==='ch5_dawn')return'5장 새벽 보고';return oldPhaseTextCh5()};window.phaseText=phaseText;
  const oldUpdateHudCh5=updateHud;
  updateHud=function(){
    if(state.chapter!==5)return oldUpdateHudCh5();
    const loc=nearbyLocation();
    const info=state.phase==='ch5_prepare'?'의례 준비: '+(state.ch5PrepActions||0)+'/'+(state.maxCh5PrepActions||3):state.phase==='ch5_night'?'마지막 선택':state.phase==='ch5_dawn'?'최종 보고':'진행';
    dom.hud.innerHTML='<b>'+mapName()+'</b> · '+chapterName()+' · '+state.time+'<br>'+info+(loc?'<br>상호작용: '+loc.name:'');
    dom.hint.innerHTML='WASD/방향키: 이동<br>Enter/Space/Z: 상호작용/컷신 다음<br>대화 선택: 숫자키 또는 클릭';
  };window.updateHud=updateHud;
})();

refreshSide();showScene('intro');requestAnimationFrame(frame);
})();
</script>
