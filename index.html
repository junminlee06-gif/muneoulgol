<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마지막 산제 - 1장~5장 원형 · 종이 질감판</title><style>body{margin:0;background:radial-gradient(circle at 50% 0,#2a2118,#050403);color:#ded4c1;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1220px;margin:auto;padding:18px;display:grid;grid-template-columns:720px 1fr;gap:16px}header{grid-column:1/-1;display:flex;justify-content:space-between;align-items:end;border-bottom:1px solid #2b3434;padding-bottom:10px}h1{margin:0;font-size:24px}.sub{font-size:13px;color:#958c7e}.gamebox{position:relative;background:#1a130d;border:1px solid #3f3327;box-shadow:0 10px 34px #0009}.gamebox:before{content:"";position:absolute;inset:0;pointer-events:none;z-index:4;opacity:.17;background-image:linear-gradient(90deg,#fff4cd24 0 1px,transparent 1px 19px),radial-gradient(circle,#ffebb930 0 1px,transparent 1px);background-size:19px 100%,23px 23px;mix-blend-mode:screen}.gamebox:after{content:"";position:absolute;inset:0;pointer-events:none;z-index:5;background:linear-gradient(#fff2 50%,#0002 50%);background-size:100% 4px;opacity:.15}canvas{display:block;width:720px;height:480px;image-rendering:pixelated;background:#22170f;filter:saturate(.94) contrast(1.08)}.hud,.hint,.card{background:#1c171edd;border:1px solid #4a3b2c}.hud{position:absolute;left:10px;top:10px;min-width:315px;padding:8px 10px;font-size:13px;z-index:6}.hint{position:absolute;right:10px;top:10px;padding:8px 10px;font-size:12px;color:#958c7e;text-align:right;z-index:6}.dialog{display:none;position:absolute;left:16px;right:16px;bottom:16px;background:#1f1914f7;border:2px solid #5b4a38;box-shadow:0 8px 0 #0005,0 18px 34px #0009;padding:14px;z-index:7}.speaker{font-weight:800;color:#b7925d;margin-bottom:6px}.text{white-space:pre-wrap;font-size:15px;margin-bottom:10px}.options{display:grid;gap:7px}button{font-family:inherit;color:#ded4c1;background:#35291f;border:1px solid #6e5a40;padding:8px 10px;text-align:left;cursor:pointer}aside{display:flex;flex-direction:column;gap:12px}.card{padding:12px}.card h2{font-size:16px;margin:0 0 8px;color:#b7925d}.small{font-size:12px;color:#958c7e}.meters{display:grid;grid-template-columns:1fr 32px 1fr 32px;gap:10px 12px;font-size:13px;line-height:1.7}.val{text-align:right;color:#eadfc9}ul{margin:6px 0 0 18px;padding:0}li{margin:3px 0;font-size:13px}.pill{display:inline-block;border:1px solid #4a3b2c;padding:2px 6px;margin:2px 2px 0 0;font-size:12px;color:#c8b89a}@media(max-width:980px){.wrap{grid-template-columns:1fr;padding:10px}.gamebox canvas{width:100%;height:auto}.hint{display:none}}</style></head><body><div class="wrap"><header><div><h1>마지막 산제: 1장~5장 원형</h1><div class="sub">종이 오려붙이기풍 · 고구려 변경 취락 색감 · 마지막 산제 완결판</div></div><div class="sub">이동: WASD/방향키 · 상호작용: Enter/Space/Z · 대화: 클릭/숫자키</div></header><section class="gamebox"><canvas id="game" width="1440" height="960"></canvas><div class="hud" id="hud"></div><div class="hint" id="hint"></div><div class="dialog" id="dialog"><div class="speaker" id="speaker"></div><div class="text" id="dialogText"></div><div class="options" id="options"></div></div></section><aside><div class="card"><h2>진행 상태</h2><div id="phaseText" class="small"></div><div class="meters" id="meters"></div></div><div class="card"><h2>공식 기록</h2><ul id="official"></ul></div><div class="card"><h2>비공식 기록</h2><ul id="unofficial"></ul></div><div class="card"><h2>단서 / 의례 조각</h2><div id="cluePills"></div></div></aside></div><script>(()=>{const c=document.getElementById('game'),g=c.getContext('2d'),T=16,W=45,H=30,S=2;g.setTransform(S,0,0,S,0,0);g.imageSmoothingEnabled=false;const $=i=>document.getElementById(i),D={hud:$('hud'),hint:$('hint'),dia:$('dialog'),sp:$('speaker'),tx:$('dialogText'),op:$('options'),ph:$('phaseText'),me:$('meters'),of:$('official'),un:$('unofficial'),cl:$('cluePills')};const C={grass:'#5e7354',grass2:'#4c6248',path:'#967f5d',water:'#516f77',hill:'#415541',stone:'#797970',roof:'#2f4f5e',wall:'#907f65',beam:'#6a3d36',dark:'#211713'};let st={map:'village',chapter:1,phase:'무너울골 도착',time:'낮',day:0,night:false,keys:{},dialog:false,p:{x:22,y:16},tick:0,stats:{기록:0,조사:0,결이해:0,애도:2,마을신뢰:0,을파신뢰:0,막례신뢰:0,해루공포:0,한:1,경계:3},of:['아이 실종 흔적'],un:['아직 없음'],clues:['단서: 아이의 짚신']};function A(t='.'){return Array.from({length:H},()=>Array.from({length:W},()=>t))}function F(m,x1,y1,x2,y2,t){for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)if(x>=0&&x<W&&y>=0&&y<H)m[y][x]=t}function P(m,x,y,t){if(x>=0&&x<W&&y>=0&&y<H)m[y][x]=t}let m=A('.');F(m,0,0,W-1,4,'h');for(let i=0;i<W;i++)P(m,i,H-1,'h');for(let i=0;i<H;i++){P(m,0,i,'h');P(m,W-1,i,'h')}F(m,21,4,23,29,'p');F(m,4,14,40,15,'p');F(m,7,18,40,20,'p');F(m,12,24,32,25,'p');F(m,40,5,41,28,'w');F(m,37,19,41,21,'p');[[4,7],[6,8],[28,7],[30,8],[5,22],[7,24],[39,24],[42,22],[13,23],[30,23],[12,27],[32,26],[27,5],[31,5],[17,27],[37,8]].forEach(a=>P(m,a[0],a[1],'g'));const loc=[['chief','촌장집',10,16,3],['well','마을 우물',23,12,2],['shaman','무당집',15,10,3],['mill','방앗간',35,18,2.5],['office','관아 임시처소',23,24,3],['north','북쪽 산길',22,5,1.5],['pass','남쪽 고갯길',22,28,1.6]];function add(a,v){if(!a.includes(v))a.push(v);ref()}function say(s,t,o=[]){st.dialog=true;D.dia.style.display='block';D.sp.textContent=s;D.tx.textContent=t;D.op.innerHTML='';o.forEach((q,i)=>{let b=document.createElement('button');b.textContent=(i+1)+'. '+q[0];b.onclick=q[1];D.op.appendChild(b)})}function close(){st.dialog=false;D.dia.style.display='none'}function res(t){say('결과',t,[['닫는다',close]])}function near(){for(const l of loc){let dx=st.p.x-l[2],dy=st.p.y-l[3];if(Math.hypot(dx,dy)<l[4])return l}return null}function inter(){let l=near();if(!l)return res('조사할 것이 없다.');if(l[0]==='chief'){st.stats.조사++;add(st.of,'산제 비용 유예');add(st.clues,'단서: 산제 장부');return res('을파의 장부에는 세 해째 비어 있는 산제 비용 칸이 있다.')}if(l[0]==='well'){st.stats.조사++;add(st.clues,'단서: 도리의 이름');add(st.un,'우물가에서 도리 목소리 목격');return res('우물 안쪽이 검게 가라앉는다. 월선은 결국 아이의 이름을 말한다. 도리.')}if(l[0]==='shaman'){st.stats.결이해++;add(st.clues,'의례: 찢어진 제문');add(st.un,'산제는 문을 닫는 의례');return res('막례는 말한다. 산제는 산을 부르는 일이 아니라 산이 마을로 내려오지 않게 문을 닫는 일이었다.')}if(l[0]==='mill'){add(st.clues,'단서: 물레 밑 물소리');return res('물레는 멈춰 있는데 물소리가 난다. 돌확에는 오래된 제물 자국이 남아 있다.')}if(l[0]==='office')return res('낮 조사 3개를 채운 뒤 보고서를 정리할 수 있다.');return res(l[1]+' 쪽으로 이어지는 길이다.')}function rgba(h,a){let n=parseInt(h.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}function R(a,b,w,h,c){g.fillStyle=c;g.fillRect(Math.round(a),Math.round(b),Math.round(w),Math.round(h))}function tile(i,j,t){let ox=i*T,oy=j*T,base=t==='p'?C.path:t==='w'?C.water:t==='h'?C.hill:t==='g'?C.grass2:C.grass;R(ox,oy,T,T,base);if(t==='.'){R(ox+2,oy+3,2,1,rgba('#253b28',.26));R(ox+10,oy+6,2,1,rgba('#172a1d',.34));if((i+j)%5===0)R(ox+7,oy+10,1,1,rgba('#e2d09b',.18))}if(t==='g'){R(ox+3,oy+4,3,1,rgba('#263d2a',.34));R(ox+8,oy+9,4,1,rgba('#75835c',.22))}if(t==='p'){R(ox+1,oy+1,14,1,rgba('#b09a76',.18));R(ox+2,oy+13,12,1,rgba('#35281f',.2));if((i+j)%3===0)R(ox+5,oy+7,3,2,rgba('#5b432f',.24))}if(t==='w'){R(ox+2+(i+j)%3,oy+4,10,1,rgba('#89a4aa',.2));R(ox+5,oy+11,8,1,rgba('#45636d',.18))}}function roof(ox,oy,w,c){R(ox+10,oy+1,w-20,4,'#263743');R(ox+8,oy+5,w-16,7,'#1c3340');R(ox+4,oy+10,w-8,8,'#263f4e');R(ox,oy+17,w,11,c);R(ox+12,oy+7,w-24,2,'#6f8290');for(let xx=ox+8;xx<ox+w-8;xx+=10)R(xx,oy+18,2,9,rgba('#edf0da',.08));R(ox-3,oy+26,w+6,3,'#162833')}function win(a,b){R(a-2,b-2,16,12,C.dark);R(a,b,12,8,'#4f3b2e');R(a+5,b,1,8,'#0006');R(a,b+4,12,1,'#0006');R(a+1,b+1,2,2,'#b6a16b')}function house(i,j,w,h,c='#2f4f5e',wall=C.wall){let ox=i*T,oy=j*T,Wd=w*T,Hh=h*T;R(ox+4,oy+Hh-2,Wd-4,6,'#0004');R(ox+7,oy+Hh-24,Wd-14,11,C.stone);for(let xx=ox+10;xx<ox+Wd-10;xx+=9)R(xx,oy+Hh-23,5,2,'#69695f');R(ox+10,oy+24,Wd-20,Hh-37,wall);R(ox+8,oy+21,Wd-16,4,C.beam);R(ox+8,oy+Hh-30,Wd-16,3,'#563328');[ox+12,ox+Wd/2-2,ox+Wd-16].forEach(v=>R(v,oy+24,4,Hh-30,C.beam));roof(ox,oy,Wd,c);R(ox+Wd/2-11,oy+Hh-38,22,26,'#1b1210');R(ox+Wd/2-2,oy+Hh-37,2,25,'#4a2e22');win(ox+18,oy+Hh-45);if(Wd>=96)win(ox+Wd-31,oy+Hh-45)}function tree(i,j){let ox=i*T,oy=j*T;R(ox+4,oy+14,10,2,'#0003');R(ox+7,oy+8,3,8,'#513116');R(ox+3,oy+4,10,8,'#233b2a');R(ox+1,oy+7,14,5,'#233b2a');R(ox+4,oy+2,8,8,'#345236');R(ox+6,oy+3,3,1,'#5c7051');R(ox+10,oy+8,3,2,'#1f3324')}function stone(i,j){let ox=i*T,oy=j*T;R(ox+2,oy+9,12,5,'#6f706a');R(ox+4,oy+6,8,4,'#85857e');R(ox+7,oy+7,2,1,'#b5b1a4')}function well(i,j){let ox=i*T,oy=j*T;R(ox+1,oy+10,14,3,'#55534d');R(ox+2,oy+6,12,8,'#7d7a71');R(ox+4,oy+8,8,4,'#203642');R(ox+3,oy+2,2,8,'#4f3826');R(ox+11,oy+2,2,8,'#4f3826');R(ox+2,oy+2,12,2,'#6a4a2f');R(ox+7,oy+3,2,3,'#2a1b15')}function person(px,py,c='#3f5965',hair='#211712',small=false){let ox=px*T,oy=py*T,s=small?.82:1;R(ox+3,oy+13,10*s,3,'#0004');R(ox+4,oy+1,8*s,4,hair);R(ox+5,oy+3,7*s,6,'#c99c70');R(ox+6,oy+5,1,1,C.dark);R(ox+10*s,oy+5,1,1,C.dark);R(ox+4,oy+9,9*s,8*s,c);R(ox+2,oy+10,2,5,'#3a2b22');R(ox+13*s,oy+10,2,5,'#3a2b22');R(ox+4,oy+17,3,4,'#2b211b');R(ox+10*s,oy+17,3,4,'#2b211b')}function fence(a){a.forEach(v=>{let ox=v[0]*T,oy=v[1]*T;R(ox+2,oy+8,12,2,'#5a4030');R(ox+3,oy+5,2,7,'#6b4a32');R(ox+11,oy+5,2,7,'#6b4a32')})}function props(){house(6,10,8,7,'#2e5262');house(12,5,7,5,'#6b5d48','#7f6d56');house(18,19,10,8,'#263f4e','#9a8365');house(32,14,7,7,'#5b4532','#816b50');well(23,12);fence([[6,17],[7,17],[8,17],[13,11],[14,11],[15,11],[33,21],[34,21],[35,21]]);[[4,7],[6,8],[28,7],[30,8],[5,22],[7,24],[39,24],[42,22],[13,23],[30,23],[12,27],[32,26],[27,5],[31,5]].forEach(a=>tree(a[0],a[1]));stone(26,15);stone(20,12);person(10.8,16.2,'#4e6680');person(16.2,10.2,'#705f86','#d7d0be');person(25.5,12.3,'#76546e');person(28+Math.sin(st.tick/55)*.25,19.3,'#9a7d4c','#211712',true);person(31+Math.cos(st.tick/65)*.25,18.7,'#8d6f49','#211712',true)}function draw(){g.setTransform(S,0,0,S,0,0);g.clearRect(0,0,720,480);for(let j=0;j<H;j++)for(let i=0;i<W;i++)tile(i,j,m[j][i]);props();person(st.p.x,st.p.y);person(st.p.x-1.2,st.p.y+.7,'#53625e');let l=near();if(l){R(l[2]*T+5,l[3]*T-16,7,10,'#d7b66d');R(l[2]*T+7,l[3]*T-14,2,5,'#261a10')}for(let n=0;n<80;n++)R((n*97+st.tick)%720,(n*43)%480,1,1,rgba('#fff0c8',.07));D.hud.innerHTML='<b>무너울골</b> · 1장 무너울골 도착 · 낮<br>낮 조사: '+st.day+'/3 · 밤 행동: '+(st.night?'완료':'미완료');D.hint.innerHTML='WASD/방향키: 이동<br>Enter/Space/Z: 상호작용<br>대화 선택: 숫자키 또는 클릭'}function ref(){D.ph.textContent='무너울골 / 낮 / 1장 낮 조사';let a=Object.entries(st.stats),h='';for(let i=0;i<a.length;i+=2){let p=a[i],q=a[i+1]||['',''];h+='<span>'+p[0]+'</span><span class="val">'+p[1]+'</span><span>'+q[0]+'</span><span class="val">'+q[1]+'</span>'}D.me.innerHTML=h;D.of.innerHTML=st.of.map(v=>'<li>'+v+'</li>').join('');D.un.innerHTML=st.un.map(v=>'<li>'+v+'</li>').join('');D.cl.innerHTML=st.clues.map(v=>'<span class="pill">'+v+'</span>').join('')}function move(){if(st.dialog)return;let dx=0,dy=0;if(st.keys.ArrowLeft||st.keys.a)dx--;if(st.keys.ArrowRight||st.keys.d)dx++;if(st.keys.ArrowUp||st.keys.w)dy--;if(st.keys.ArrowDown||st.keys.s)dy++;if(dx||dy){let sp=.075/(dx&&dy?1.414:1),nx=st.p.x+dx*sp,ny=st.p.y+dy*sp;if(nx>1&&nx<W-2)st.p.x=nx;if(ny>1&&ny<H-2)st.p.y=ny}}function loop(){st.tick++;move();draw();requestAnimationFrame(loop)}document.addEventListener('keydown',e=>{st.keys[e.key]=true;if(['Enter',' ','z','Z'].includes(e.key)){e.preventDefault();if(st.dialog){let b=D.op.querySelector('button');if(b)b.click()}else inter()}if(/^[1-9]$/.test(e.key)&&st.dialog){let b=D.op.children[+e.key-1];if(b)b.click()}});document.addEventListener('keyup',e=>st.keys[e.key]=false);ref();loop()})();</script></body></html>
