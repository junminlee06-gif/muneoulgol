<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마지막 산제 확장 실험판 - 1장</title>
<style>
:root{--bg:#090806;--panel:#17120d;--panel2:#21180f;--line:#55422d;--text:#e6dac4;--muted:#a99b83;--accent:#d1a461;--bad:#a65a4d;--good:#758a62}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#2a2118,#090806 62%,#030302);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.5}.wrap{max-width:1180px;margin:0 auto;padding:18px;display:grid;grid-template-columns:720px 1fr;gap:16px}header{grid-column:1/-1;border-bottom:1px solid var(--line);padding-bottom:10px}h1{margin:0;font-size:24px}.sub,.small{color:var(--muted);font-size:13px}.game{position:relative;background:#160f0a;border:1px solid var(--line);box-shadow:0 12px 32px rgba(0,0,0,.5)}canvas{display:block;width:720px;height:480px;image-rendering:pixelated;background:#21170f}.hud{position:absolute;left:10px;top:10px;background:rgba(23,18,13,.88);border:1px solid var(--line);padding:8px 10px;font-size:13px;min-width:320px}.hint{position:absolute;right:10px;top:10px;background:rgba(23,18,13,.82);border:1px solid var(--line);padding:8px 10px;font-size:12px;color:var(--muted);text-align:right}.dialog{display:none;position:absolute;left:16px;right:16px;bottom:16px;max-height:350px;overflow:hidden;background:rgba(33,24,15,.98);border:2px solid #6e5a40;box-shadow:0 8px 0 rgba(0,0,0,.32),0 18px 34px rgba(0,0,0,.55);padding:14px}.speaker{font-weight:800;color:var(--accent);margin-bottom:6px}.text{white-space:pre-wrap;font-size:15px;margin-bottom:10px;max-height:126px;overflow:auto}.options{display:grid;gap:7px;max-height:180px;overflow:auto}button{font:inherit;color:var(--text);background:#35291f;border:1px solid #6e5a40;padding:8px 10px;text-align:left;cursor:pointer}button:hover,button:focus{background:#493728;outline:1px solid var(--accent)}button.primary{background:#554026;border-color:#c39b62}.report{display:none;position:absolute;inset:0;background:rgba(14,10,7,.98);z-index:7;padding:20px;overflow:auto}.report h2{margin-top:0;color:var(--accent)}.choices{display:grid;gap:8px;margin:10px 0}.card{background:rgba(23,18,13,.9);border:1px solid var(--line);padding:12px;margin-bottom:12px}.card h2{margin:0 0 8px;font-size:16px;color:var(--accent)}ul{margin:6px 0 0 18px;padding:0}li{font-size:13px;margin:4px 0}.meter{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);padding:3px 0}.tag{display:inline-block;border:1px solid var(--line);padding:2px 6px;margin:2px;font-size:12px;color:var(--muted)}.notice{color:#efd7a0}.ending{border-color:#9b7750;background:#251b11}@media(max-width:980px){.wrap{grid-template-columns:1fr}.game canvas{width:100%;height:auto}.hint{display:none}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>마지막 산제 확장 실험판: 1장 2일 구조</h1><div class="sub">기존 본편을 건드리지 않는 별도 실험판 · 보고서가 다음 날을 바꾸는 구조 테스트</div></header>
<section class="game"><canvas id="game" width="1440" height="960"></canvas><div class="hud" id="hud"></div><div class="hint">WASD/방향키: 이동<br>Enter/Space/Z: 조사<br>대화: 숫자키/클릭</div><div class="dialog" id="dialog"><div class="speaker" id="speaker"></div><div class="text" id="dialogText"></div><div class="options" id="options"></div></div><div class="report" id="report"><h2 id="reportTitle">보고서</h2><p class="small" id="reportIntro"></p><div id="reportChoices" class="choices"></div></div></section>
<aside><div class="card"><h2>진행 상태</h2><div id="stateBox" class="small"></div><div id="meters"></div></div><div class="card"><h2>공식 기록</h2><ul id="official"></ul></div><div class="card"><h2>비공식 기록</h2><ul id="unofficial"></ul></div><div class="card"><h2>단서</h2><div id="clues"></div></div><div class="card ending"><h2>보고서 영향</h2><div id="effects" class="small">아직 보고서가 제출되지 않았다.</div></div></aside>
</div>
<script>
(()=>{'use strict';
const c=document.getElementById('game'),ctx=c.getContext('2d');ctx.setTransform(2,0,0,2,0,0);ctx.imageSmoothingEnabled=false;const T=24,W=30,H=20;
const dom={hud:id('hud'),dialog:id('dialog'),speaker:id('speaker'),text:id('dialogText'),options:id('options'),report:id('report'),reportTitle:id('reportTitle'),reportIntro:id('reportIntro'),reportChoices:id('reportChoices'),stateBox:id('stateBox'),meters:id('meters'),official:id('official'),unofficial:id('unofficial'),clues:id('clues'),effects:id('effects')};
function id(x){return document.getElementById(x)}
const state={day:1,time:'낮',phase:'day1',player:{x:15,y:17,rx:15,ry:17},dialogOpen:false,reportOpen:false,visited:{},report:null,stats:{조사:0,기록:0,애도:0,경계:0,마을신뢰:0,막례신뢰:0,을파경계:0},official:[],unofficial:[],clues:[],effects:[],nightDone:false};
const places={day1:[{id:'shoe',name:'작은 짚신',x:15,y:14,r:1.7},{id:'chief',name:'촌장 을파',x:9,y:8,r:1.7},{id:'wolseon',name:'월선',x:20,y:9,r:1.7},{id:'makrye',name:'막례',x:22,y:15,r:1.7},{id:'office',name:'임시 관아',x:6,y:16,r:2}],day2:[{id:'office2',name:'임시 관아',x:6,y:16,r:2},{id:'reaction',name:'마을 반응',x:15,y:9,r:2},{id:'lead',name:'보고서가 만든 길',x:23,y:7,r:2},{id:'nightPlace',name:'밤에 볼 자리',x:22,y:15,r:2}],night2:[{id:'nightPlace',name:'밤 조사 지점',x:22,y:15,r:2},{id:'officeNight',name:'새벽 기록',x:6,y:16,r:2}]};
function add(arr,v){if(!arr.includes(v))arr.push(v)}function stat(k,d){state.stats[k]=(state.stats[k]||0)+d;refresh()}function rec(type,v){add(state[type],v);refresh()}function clue(v){add(state.clues,v);refresh()}function closeDialog(){state.dialogOpen=false;dom.dialog.style.display='none'}
function show(speaker,text,opts){state.dialogOpen=true;dom.speaker.textContent=speaker;dom.text.textContent=text;dom.options.innerHTML='';opts.forEach((o,i)=>{const b=document.createElement('button');b.textContent=(i+1)+'. '+o[0];b.onclick=o[1];dom.options.appendChild(b)});dom.dialog.style.display='block';refresh()}
function report(title,intro,items){state.reportOpen=true;dom.reportTitle.textContent=title;dom.reportIntro.textContent=intro;dom.reportChoices.innerHTML='';items.forEach(it=>{const b=document.createElement('button');b.textContent=it.label;b.onclick=()=>{it.run();state.reportOpen=false;dom.report.style.display='none';refresh()};dom.reportChoices.appendChild(b)});dom.report.style.display='block'}
function nearby(){const arr=places[state.phase]||[];let best=null,bd=99;for(const p of arr){const d=Math.hypot(state.player.x-p.x,state.player.y-p.y);if(d<(p.r||1.5)&&d<bd){best=p;bd=d}}return best}
function interact(){const p=nearby();if(!p)return show('해루','여기서는 특별히 살필 것이 없다.',[['돌아선다',closeDialog]]);if(state.phase==='day1')day1(p.id);else if(state.phase==='day2')day2(p.id);else if(state.phase==='night2')night2(p.id)}
function day1(pid){if(pid==='shoe')return show('작은 짚신','피는 적고, 발자국은 산 쪽으로 이어진다. 짚신끈에는 삭은 금줄 조각이 걸려 있다.',[['짚신과 피를 공식 기록에 올린다',()=>{rec('official','아이의 짚신과 적은 혈흔');clue('아이의 짚신');stat('기록',1);state.visited.shoe=true;closeDialog()}],['금줄 조각을 따로 챙긴다',()=>{rec('unofficial','짚신끈의 삭은 금줄');clue('금줄 조각');stat('경계',1);state.visited.shoe=true;closeDialog()}]]);
if(pid==='chief')return show('을파','“범 짓일 겁니다. 산길을 닫으면 됩니다.” 장부는 가지런하지만 산제 비용 칸만 비어 있다.',[['범 습격으로 보겠다고 한다',()=>{rec('official','촌장 진술: 범 습격 가능성');stat('마을신뢰',1);state.visited.chief=true;closeDialog()}],['산제 비용 장부를 묻는다',()=>{rec('unofficial','산제 비용 3년 공백');clue('산제 장부 공백');stat('을파경계',1);state.visited.chief=true;closeDialog()}]]);
if(pid==='wolseon')return show('월선','“그 짚신은 도리 것입니다. 하지만 아직 죽었다고 적지 마세요.”',[['아이 이름을 공식 기록에 남긴다',()=>{rec('official','아이 이름: 도리');clue('도리의 이름');stat('애도',1);state.visited.wolseon=true;closeDialog()}],['죽었다고 적지 않겠다고 약속한다',()=>{rec('unofficial','월선의 부탁: 도리를 죽은 자로 부르지 말 것');stat('애도',1);stat('마을신뢰',1);state.visited.wolseon=true;closeDialog()}]]);
if(pid==='makrye')return show('막례','“산은 기록을 못 하니 관아 사람이 온 거다. 믿지 말고 보아라.”',[['산제 이야기를 묻는다',()=>{rec('unofficial','검은등은 이름이 아니라 별칭');clue('찢어진 제문 조각');stat('막례신뢰',1);state.visited.makrye=true;closeDialog()}],['증거 없이 믿을 수 없다고 한다',()=>{rec('official','무당 진술: 산길 이상 주장');stat('기록',1);stat('막례신뢰',-1);state.visited.makrye=true;closeDialog()}]]);
if(pid==='office')return openDay1Report()}
function openDay1Report(){const count=['shoe','chief','wolseon','makrye'].filter(k=>state.visited[k]).length;if(count<2)return show('임시 관아','최소 두 곳은 살펴야 첫 보고서를 올릴 수 있다.',[['더 조사한다',closeDialog]]);report('1일차 보고서','무엇을 공식 진실로 올릴지 정한다. 이 선택이 2일차 마을 상태를 바꾼다.',[
{label:'범 습격 가능성이 높다',run:()=>applyReport('beast')},{label:'사람이 아이를 산 쪽으로 유인했다',run:()=>applyReport('human')},{label:'산제와 금줄의 흔적이 있다',run:()=>applyReport('rite')},{label:'마을 내부 은폐 가능성이 있다',run:()=>applyReport('cover')}
])}
function applyReport(kind){state.report=kind;state.day=2;state.phase='day2';state.time='낮';state.player.x=6;state.player.y=16;state.visited={};const data={beast:['범 습격 보고','사냥꾼이 마을에 들어왔다. 막례는 입을 닫는다.','사냥꾼 증언'],human:['유인 가능성 보고','관아 병졸이 마을 사람을 캐묻는다. 을파의 경계가 높아졌다.','지워진 발자국'],rite:['산제 흔적 보고','관아는 미신이라 비웃지만 막례가 밤에 부를 제문을 준다.','제문 조각'],cover:['은폐 가능성 보고','을파가 감시자를 붙인다. 대신 월선이 몰래 찾아온다.','월선의 밤 약속']};rec('official',data[kind][0]);state.effects=[data[kind][1]];clue(data[kind][2]);refresh();show('2일차 아침',data[kind][1]+'\n\n보고서가 마을의 하루를 바꾸었다.',[['2일차 조사를 시작한다',closeDialog]])}
function day2(pid){if(pid==='office2')return show('임시 관아','전날 보고서가 접수되었다. 관아의 시선은 이제 당신의 기록을 따라 움직인다.',[['기록을 확인한다',closeDialog]]);
if(pid==='reaction'){const msg={beast:'사냥꾼은 범 발자국만 찾으려 한다. 사람 발자국은 밟혀 흐려졌다.',human:'병졸들이 집집마다 묻고 다닌다. 아이 이름은 더 자주 입에 오른다.',rite:'막례는 말없이 찢어진 제문 한 줄을 건넨다. “검은 등 넘어, 이름은 두고.”',cover:'을파의 사람은 멀찍이 따라오고, 월선은 눈짓으로 우물 뒤를 가리킨다.'}[state.report];return show('마을 반응',msg,[['공식 반응으로 기록한다',()=>{rec('official','2일차 마을 반응: '+msg.slice(0,22));stat('기록',1);state.visited.reaction=true;closeDialog()}],['비공식 감각으로 남긴다',()=>{rec('unofficial','2일차 균열: '+msg.slice(0,22));stat('경계',1);state.visited.reaction=true;closeDialog()}]])}
if(pid==='lead'){const msg={beast:'사냥꾼의 덫은 산길이 아니라 방앗간 뒤 물길에 놓여 있다.',human:'지워진 발자국은 촌장집 뒤에서 다시 나타난다.',rite:'금줄은 우물에서 방앗간, 방앗간에서 산길로 이어진다.',cover:'월선은 “도리는 밤에 우물가 노래를 따라갔다”고 말한다.'}[state.report];return show('보고서가 만든 길',msg,[['단서를 챙긴다',()=>{clue('2일차 핵심 단서');state.visited.lead=true;stat('조사',1);closeDialog()}]])}
if(pid==='nightPlace'){const ok=state.visited.reaction&&state.visited.lead;if(!ok)return show('해질녘','마을 반응과 보고서가 만든 길을 모두 확인해야 밤 행동을 정할 수 있다.',[['낮 조사를 계속한다',closeDialog]]);state.phase='night2';state.time='밤';state.player.x=22;state.player.y=15;return show('2일차 밤','오늘 밤에는 한 곳만 볼 수 있다. 낮의 보고서가 만든 길을 따라갈 시간이다.',[['밤 조사에 들어간다',closeDialog]])}}
function night2(pid){if(pid==='nightPlace'){const msg={beast:'덫에 걸린 것은 범이 아니라 금줄에 묶인 낡은 이름패였다.',human:'어둠 속에서 사람 발자국과 아이 발자국이 나란히 이어진다.',rite:'물소리 사이로 산제 노래가 한 줄 되돌아온다.',cover:'월선은 아이 이름을 부르지 않고, 빈 짚신만 우물가에 놓는다.'}[state.report];return show('밤 조사',msg,[['새벽 기록으로 넘긴다',()=>{rec('unofficial','밤 조사: '+msg.slice(0,24));state.nightDone=true;state.phase='night2';state.player.x=6;state.player.y=16;closeDialog()}]])}
if(pid==='officeNight'){if(!state.nightDone)return show('새벽 기록','밤 조사를 마쳐야 새벽 정리를 할 수 있다.',[['돌아간다',closeDialog]]);return report('1장 새벽 정리','실험판은 여기서 1장 확장 구조를 마친다. 이 구조를 본편에 이식하면 각 장을 2~3일로 늘릴 수 있다.',[{label:'2장 구조로 넘어간다',run:()=>{state.reportOpen=false;dom.report.style.display='none';show('실험판 종료','1장 2일 구조가 끝났다. 다음 구현 단계는 2장 물소리 골짜기의 2일 구조다.',[['확인',closeDialog]])}}])}}
function draw(){ctx.clearRect(0,0,720,480);ctx.fillStyle='#25180f';ctx.fillRect(0,0,720,480);for(let y=0;y<H;y++)for(let x=0;x<W;x++){ctx.fillStyle=(x+y)%2?'#2b2015':'#302417';ctx.fillRect(x*T,y*T,T,T)}ctx.fillStyle='#6c5638';ctx.fillRect(4*T,15*T,22*T,T);ctx.fillRect(14*T,6*T,T,12*T);drawHouse(7,6,'을파');drawHouse(19,7,'월선');drawHouse(21,13,'막례');drawHouse(4,15,'관아');drawMarker(15,14,'짚신');if(state.phase!=='day1'){drawMarker(15,9,'반응');drawMarker(23,7,'길');drawMarker(22,15,'밤')}const loc=nearby();if(loc){ctx.strokeStyle='#e5c078';ctx.lineWidth=3;ctx.strokeRect((loc.x-1)*T,(loc.y-1)*T,T*2,T*2)}ctx.fillStyle='#d9c28f';ctx.beginPath();ctx.arc(state.player.rx*T,state.player.ry*T,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#20384a';ctx.fillRect(state.player.rx*T-5,state.player.ry*T+2,10,10)}
function drawHouse(x,y,label){ctx.fillStyle='#49321f';ctx.fillRect(x*T,y*T,T*3,T*2);ctx.fillStyle='#765034';ctx.fillRect(x*T-4,y*T-8,T*3+8,10);ctx.fillStyle='#d1a461';ctx.font='10px sans-serif';ctx.fillText(label,x*T,y*T-12)}function drawMarker(x,y,label){ctx.fillStyle='#9b7750';ctx.fillRect(x*T-6,y*T-6,12,12);ctx.fillStyle='#e6dac4';ctx.font='10px sans-serif';ctx.fillText(label,x*T-12,y*T-10)}
const keys=new Set();function norm(k){if(k==='ArrowUp'||k==='w'||k==='W')return'up';if(k==='ArrowDown'||k==='s'||k==='S')return'down';if(k==='ArrowLeft'||k==='a'||k==='A')return'left';if(k==='ArrowRight'||k==='d'||k==='D')return'right';return null}window.addEventListener('keydown',e=>{if(state.dialogOpen){const n=parseInt(e.key,10);if(n>=1&&n<=dom.options.children.length){dom.options.children[n-1].click();e.preventDefault()}return}if(state.reportOpen)return;const m=norm(e.key);if(m){keys.add(m);e.preventDefault()}if(['Enter',' ','z','Z'].includes(e.key)){interact();e.preventDefault()}});window.addEventListener('keyup',e=>{const m=norm(e.key);if(m)keys.delete(m)});
let last=performance.now();function frame(t){const dt=Math.min(32,t-last);last=t;if(!state.dialogOpen&&!state.reportOpen){let dx=0,dy=0;if(keys.has('up'))dy--;if(keys.has('down'))dy++;if(keys.has('left'))dx--;if(keys.has('right'))dx++;if(dx||dy){const l=Math.hypot(dx,dy);state.player.x=Math.max(1,Math.min(W-1,state.player.x+dx/l*dt*.006));state.player.y=Math.max(1,Math.min(H-1,state.player.y+dy/l*dt*.006))}}state.player.rx+=(state.player.x-state.player.rx)*.35;state.player.ry+=(state.player.y-state.player.ry)*.35;draw();refresh();requestAnimationFrame(frame)}
function refresh(){const loc=nearby();dom.hud.innerHTML='<b>무너울골</b> · 1장 확장 실험 · '+state.day+'일차 · '+state.time+'<br>'+phaseName()+(loc?'<br>상호작용: '+loc.name:'');dom.stateBox.innerHTML=phaseName()+'<br>보고서: '+(state.report||'미제출');dom.meters.innerHTML=Object.entries(state.stats).map(([k,v])=>'<div class="meter"><span>'+k+'</span><b>'+v+'</b></div>').join('');dom.official.innerHTML=state.official.map(x=>'<li>'+x+'</li>').join('');dom.unofficial.innerHTML=state.unofficial.map(x=>'<li>'+x+'</li>').join('');dom.clues.innerHTML=state.clues.map(x=>'<span class="tag">'+x+'</span>').join('');dom.effects.innerHTML=state.effects.length?state.effects.map(x=>'<div class="notice">'+x+'</div>').join(''):'아직 보고서가 제출되지 않았다.'}
function phaseName(){if(state.phase==='day1')return'1일차 낮 조사';if(state.phase==='day2')return'2일차 낮 변화';if(state.phase==='night2')return state.nightDone?'2일차 새벽 정리':'2일차 밤 행동';return state.phase}
show('고연우','무너울골 입구에 도착했다. 이번 실험판에서는 첫 장이 이틀로 늘어난다.\n\n첫날 보고서가 둘째 날의 마을 반응과 밤 조사 내용을 바꾼다.',[['조사 시작',closeDialog]]);requestAnimationFrame(frame);
})();
